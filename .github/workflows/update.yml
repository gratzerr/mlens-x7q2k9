name: cockpit update
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: cockpit-update
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: deps
        run: pip -q install google-auth
      - name: service-account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then echo "::error::Secret GCP_SA_KEY fehlt"; exit 1; fi
          printf '%s' "$GCP_SA_KEY" > /tmp/sa.json
      - name: fetch depot.xml from Google Drive
        env: { SA_KEY: /tmp/sa.json }
        working-directory: pipeline
        continue-on-error: true          # ohne Drive-Freigabe laeuft der Rest trotzdem
        run: python drive_fetch.py /tmp/depot.xml
      - name: pipeline
        env:
          SA_KEY: /tmp/sa.json
          DEPOT_XML: /tmp/depot.xml
          NO_PUSH: '1'
        working-directory: pipeline
        run: |
          python firestore_sync.py pull || true
          python pp_sync.py || echo "pp_sync uebersprungen (keine frische depot.xml) — letzte pp.json bleibt"
          python social_sync.py || true
          python ir_sweep.py || true
          python build.py
          python firestore_sync.py push || true
          cp cockpit.html ../index.html
      - name: commit & push
        run: |
          git config user.name "cockpit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "cloud update $(date -u +%F-%H%MZ)" || { echo "keine Aenderungen"; exit 0; }
          git pull --rebase -X ours || true
          git push
