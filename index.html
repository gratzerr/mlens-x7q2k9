<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Rafael's Portfolio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23101828'/%3E%3Cpath d='M12 44L26 30l10 8 16-20' fill='none' stroke='%233ecb63' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='52' cy='18' r='4.5' fill='%233ecb63'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --plane:#eef2f7; --surface:#ffffff; --surface-2:#f3f6fa;
    --ink:#101828; --ink-2:#475467; --muted:#8290a4;
    --grid:#eef1f6; --line:#cbd5e4; --border:rgba(16,24,40,.03);
    --up:#10b981; --up-bg:rgba(16,185,129,.13);
    --down:#d13438; --down-bg:rgba(209,52,56,.09);
    --accent:#3468d6;
    --chip:#eef2f7; --chip-ink:#3d4757;
    --confirmed:#10b981; --tentative:#a98600;
    --radius:16px;
    --shadow:0 2px 4px rgba(30,41,59,.04),0 14px 44px rgba(30,41,59,.08);
  }
  :root[data-theme="dark"]{ color-scheme:dark; }
  @media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --plane:#0f131c; --surface:#161c29; --surface-2:#1d2433;
    --ink:#eef1f6; --ink-2:#bfc7d4; --muted:#8b95a7;
    --grid:#232c3d; --line:#39445a; --border:rgba(255,255,255,.06);
    --up:#3ecb63; --up-bg:rgba(62,203,99,.13);
    --down:#f0625f; --down-bg:rgba(240,98,95,.13);
    --accent:#5b8ded;
    --chip:#212938; --chip-ink:#ccd4e0;
    --confirmed:#3ecb63; --tentative:#e0b23a;
    --shadow:0 1px 2px rgba(2,6,16,.5),0 14px 36px rgba(2,6,16,.38);
  }}
  :root[data-theme="dark"]{
    --plane:#0f131c; --surface:#161c29; --surface-2:#1d2433;
    --ink:#eef1f6; --ink-2:#bfc7d4; --muted:#8b95a7;
    --grid:#232c3d; --line:#39445a; --border:rgba(255,255,255,.06);
    --up:#3ecb63; --up-bg:rgba(62,203,99,.13);
    --down:#f0625f; --down-bg:rgba(240,98,95,.13);
    --accent:#5b8ded;
    --chip:#212938; --chip-ink:#ccd4e0;
    --confirmed:#3ecb63; --tentative:#e0b23a;
    --shadow:0 1px 2px rgba(2,6,16,.5),0 14px 36px rgba(2,6,16,.38);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--plane);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:26px 20px 80px}
  .tnum{font-variant-numeric:tabular-nums}

  header.top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:22px}
  .title{font-size:23px;font-weight:720;letter-spacing:-.4px;display:flex;align-items:center;gap:10px}
  .title .dot{width:11px;height:11px;border-radius:50%;background:var(--accent)}
  .sub{color:var(--muted);font-size:13px}
  .sub b{color:var(--ink-2);font-weight:600}
  .themebtn{border:1px solid var(--border);background:var(--surface);color:var(--ink-2);
    border-radius:10px;padding:7px 10px;font-size:13px;cursor:pointer;font-family:inherit;
    box-shadow:var(--shadow);display:inline-flex;align-items:center;gap:6px;transition:background .12s}
  .themebtn:hover{background:var(--surface-2)}
  .themebtn svg{width:15px;height:15px;display:block}

  .tabbar{position:sticky;top:0;z-index:40;display:flex;gap:4px;margin:0 0 20px;padding:5px;
    background:color-mix(in srgb, var(--surface) 82%, transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow);width:fit-content}
  .tabbar button{border:0;background:none;color:var(--muted);font:inherit;font-size:13.5px;font-weight:650;
    padding:8px 18px;border-radius:9px;cursor:pointer;transition:background .12s,color .12s}
  .tabbar button:hover{color:var(--ink)}
  .tabbar button.on{background:var(--accent);color:#fff}
  [data-tab]:not(.tabon){display:none!important}   /* .tabon keeps the element's own display */

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 19px 16px;box-shadow:var(--shadow)}
  .tile .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:650}
  .tile .val{font-size:29px;font-weight:740;margin-top:7px;letter-spacing:-.8px;font-variant-numeric:tabular-nums}
  .tile .note{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.55}
  .up{color:var(--up)} .down{color:var(--down)}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
  .panel h2{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);
    font-weight:680;margin:0 0 14px;display:flex;align-items:center;gap:8px}
  .panel h2 .live{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 0 3px var(--up-bg)}
  .cols{display:grid;grid-template-columns:1.35fr 1fr;gap:20px;align-items:start}
  .cols.eq{grid-template-columns:1fr 1fr;align-items:stretch}
  .cols.eq .panel{display:flex;flex-direction:column}
  .cols.eq .panel>div:last-child{flex:1;display:flex;flex-direction:column;justify-content:center}

  /* portfolio chart */
  .chartbox{position:relative}
  svg.line{display:block;width:100%;height:210px;overflow:visible}
  .cross{stroke:var(--line);stroke-width:1}
  .tip{position:absolute;pointer-events:none;background:var(--ink);color:var(--surface);
    padding:6px 9px;border-radius:7px;font-size:12.5px;transform:translate(-50%,-125%);
    white-space:nowrap;opacity:0;transition:opacity .08s;z-index:5}
  .tip .tv{font-weight:680}

  /* latest news feed */
  .feed{display:flex;flex-direction:column}
  .feed .fi{display:grid;grid-template-columns:78px 1fr;gap:12px;padding:11px 2px;border-top:1px solid var(--grid)}
  .feed .fi:first-child{border-top:0}
  .feed .fd{font-size:11.5px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;padding-top:2px}
  .feed .ft{font-size:14px;font-weight:600;line-height:1.4}
  .feed .ft a{text-decoration:none;border-bottom:1px solid var(--border)}
  .feed .ft a:hover{border-bottom-color:var(--accent);color:var(--accent)}
  .feed .fs{font-size:12.5px;color:var(--ink-2);margin-top:3px}
  .feed .fm{font-size:11.5px;color:var(--muted);margin-top:3px}
  .tkr{font-weight:700;font-size:11px;padding:1px 6px;border-radius:4px;color:#fff;vertical-align:middle}
  .tkr.neutral{background:var(--chip);color:var(--chip-ink)}
  .tkr.sec{background:var(--down);color:#fff}
  .social .si{display:block;padding:10px 2px;border-top:1px solid var(--grid)}
  .social .si:first-child{border-top:0}
  .social .sm{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .social .su{font-size:12px;font-weight:600;color:var(--ink-2)}
  .social .stime{font-size:11px;color:var(--muted);margin-left:auto}
  .social .sb{font-size:13px;line-height:1.4}
  .social .sent{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px}
  .social .sent.bull{background:var(--up-bg);color:var(--up)}
  .social .sent.bear{background:var(--down-bg);color:var(--down)}
  /* PP total-portfolio strip */
  .pprow{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start}
  .ppstat .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .ppstat .val{font-size:19px;font-weight:680;margin-top:3px}
  .ppstat .note{font-size:11.5px;color:var(--muted);margin-top:1px}
  .ppyears{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;margin-left:auto}
  .ppy{text-align:center;background:var(--surface-2);border-radius:8px;padding:6px 10px}
  .ppy .y{font-size:10.5px;color:var(--muted);font-weight:600}
  .ppy .r{font-size:13px;font-weight:680;margin-top:1px}
  .feedmax{max-height:560px;overflow-y:auto;scrollbar-width:thin}
  .feedmax::-webkit-scrollbar{width:6px}
  .feedmax::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

  /* allocation donut (interactive) */
  .donutwrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  .donut{width:230px;height:230px;flex:none}
  .donut path{transition:opacity .12s;cursor:pointer}
  .donut.hashot path{opacity:.28}
  .donut.hashot path.hot{opacity:1}
  .legend2{flex:1;min-width:200px;display:flex;flex-direction:column}
  .lg2{display:flex;align-items:center;gap:9px;padding:6px 7px;border-top:1px solid var(--grid);font-size:12.5px;border-radius:7px;cursor:default}
  .lg2:first-child{border-top:0}
  .lg2.hot{background:var(--surface-2)}
  .lg2 .dot{width:8px;height:8px;border-radius:2px;flex:none}
  .lg2 .lt{font-weight:650}
  .lg2 .lv{margin-left:auto;color:var(--muted);font-variant-numeric:tabular-nums}
  .lg2 .lp{width:52px;text-align:right;font-weight:650;font-variant-numeric:tabular-nums}
  /* performance by holding */
  .pf{display:flex;align-items:center;gap:10px;margin:7px 0}
  .pf .pft{width:48px;font-size:12.5px;font-weight:640;color:var(--ink-2)}
  .pfbar{flex:1;height:16px;position:relative;background:var(--surface-2);border-radius:4px}
  .pfmid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
  .pffill{position:absolute;top:2px;bottom:2px;border-radius:3px;min-width:2px}
  .pf .pfv{width:56px;text-align:right;font-size:12.5px;font-weight:640}
  .pf .pfg{width:76px;text-align:right;font-size:12px;font-weight:600;opacity:.85}

  /* timeline */
  .tl{display:flex;flex-direction:column;gap:2px;max-height:360px;overflow-y:auto}
  .tl-item{display:grid;grid-template-columns:76px 1fr;gap:10px;padding:8px 4px;border-top:1px solid var(--grid)}
  .tl-item:first-child{border-top:0}
  .tl-when{font-size:12px;color:var(--ink-2);font-weight:600;line-height:1.35}
  .tl-when .cf{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .tl-body .lb{font-size:13.5px;font-weight:600}
  .tl-body .lb .tkr{margin-right:6px}
  .tl-body .dt{font-size:12.5px;color:var(--muted);margin-top:1px}

  /* holdings */
  .hgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 19px;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .chead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .cname{display:flex;align-items:center;gap:9px;min-width:0}
  .cname .bd{width:10px;height:10px;border-radius:50%;flex:none}
  .cname .tk{font-size:16px;font-weight:720;letter-spacing:-.2px}
  .cname .nm{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cvals{text-align:right;flex:none}
  .cvals .px{font-size:15px;font-weight:660}
  .cvals .dc{font-size:12.5px;font-weight:640;margin-top:1px}
  .sparkrow{display:flex;align-items:center;gap:10px;margin:11px 0 2px}
  svg.spark{height:34px;flex:1;overflow:visible;cursor:crosshair}
  #sptip{position:fixed;transform:translate(-50%,-100%);background:var(--ink);color:var(--surface);
    padding:3px 8px;border-radius:6px;font-size:11.5px;font-weight:650;pointer-events:none;z-index:60;
    display:none;font-variant-numeric:tabular-nums;white-space:nowrap}
  .rng{width:120px;flex:none}
  .rng .rtrack{height:5px;background:var(--surface-2);border-radius:3px;position:relative;margin:8px 0 3px}
  .rng .rdot{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid var(--surface)}
  .rng .rlab{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .thesis{font-size:12.5px;color:var(--muted);margin:9px 0 0}
  .metaline{display:flex;gap:14px;margin:9px 0 2px;font-size:12px;color:var(--ink-2);flex-wrap:wrap}
  .metaline b{color:var(--ink);font-weight:660}
  .pulse{font-size:13px;color:var(--ink-2);background:var(--surface-2);border-radius:9px;padding:10px 11px;margin:10px 0 0;line-height:1.5}
  .seclab{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:660;margin:14px 0 7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--chip);color:var(--chip-ink);border-radius:20px;padding:4px 10px;font-size:12px;line-height:1.3;display:inline-flex;align-items:center;gap:5px}
  .chip .cf{width:7px;height:7px;border-radius:50%;flex:none}
  .chip .cw{font-weight:680}
  .news{list-style:none;margin:6px 0 0;padding:0;display:flex;flex-direction:column}
  .news li{padding:9px 0;border-top:1px solid var(--grid)}
  .news li:first-child{border-top:0}
  .news .nh{display:flex;gap:9px;align-items:baseline}
  .news .nd{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
  .news .nt{font-size:13.5px;font-weight:600;line-height:1.4}
  .news .nt a{text-decoration:none;border-bottom:1px solid var(--border)}
  .news .nt a:hover{border-bottom-color:var(--accent);color:var(--accent)}
  .news .ns{font-size:12.5px;color:var(--ink-2);margin-top:3px}
  .news .src{font-size:11.5px;color:var(--muted);margin-top:2px}
  .links{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;padding-top:12px;border-top:1px solid var(--grid)}
  .lk{font-size:12px;font-weight:600;text-decoration:none;border:1px solid var(--border);
    border-radius:7px;padding:5px 10px;color:var(--ink-2)}
  .lk:hover{border-color:var(--accent);color:var(--accent)}
  .chart-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  #chart-ret{font-size:13px;font-weight:600;margin-left:8px}
  #chart-ret .rv{font-weight:720}
  #chart-ret .rl{color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:11px}
  .tfsel{display:flex;gap:2px;background:var(--surface-2);border-radius:8px;padding:3px}
  .tfsel button{border:0;background:none;color:var(--ink-2);font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
  .tfsel button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .tfsel button:hover:not(.on){color:var(--ink)}
  /* holdings table (Parqet-style stacked cells) */
  .htable{width:100%;border-collapse:collapse;min-width:680px}
  .htable th{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
    font-weight:660;text-align:right;padding:2px 9px 7px;cursor:pointer;white-space:nowrap;user-select:none}
  .htable th:first-child{text-align:left;padding-left:2px}
  .htable th:hover{color:var(--ink)}
  .htable td{padding:9px;border-top:1px solid var(--grid);text-align:right;white-space:nowrap;vertical-align:middle}
  .htable tbody tr{transition:background .1s}
  .htable tbody tr:hover td{background:var(--surface-2)}
  .htable td:first-child{text-align:left;padding-left:2px}
  .htable .c1{font-weight:650;font-size:13.5px;font-variant-numeric:tabular-nums}
  .htable .c2{font-size:11.5px;color:var(--muted);margin-top:1px;font-variant-numeric:tabular-nums}
  .htable .hname{display:flex;align-items:center;gap:9px;min-width:0}
  .htable .hname .nm2{font-size:11.5px;color:var(--muted);max-width:150px;overflow:hidden;text-overflow:ellipsis}
  .htable tr.cashrow td{color:var(--muted)}
  .gearbtn{border:0;background:none;color:var(--muted);font-size:14px;cursor:pointer;padding:0 2px;margin-left:auto}
  .gearbtn:hover{color:var(--ink)}
  .htpop{position:absolute;right:14px;top:40px;z-index:20;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:10px 14px;box-shadow:0 8px 28px rgba(0,0,0,.18);font-size:13px}
  .htpop label{display:flex;gap:8px;align-items:center;padding:4px 0;cursor:pointer;white-space:nowrap}
  #lockov,#pingate{position:fixed;inset:0;background:var(--plane);z-index:100;display:flex;align-items:center;justify-content:center}
  #lockov .lockbox,#pingate .lockbox{text-align:center;color:var(--muted)}
  #lockov .lt1,#pingate .lt1{font-size:19px;font-weight:700;color:var(--ink);margin-top:12px}
  #lockov .lt2,#pingate .lt2{font-size:13.5px;margin-top:5px}
  /* performance widgets */
  #pf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .pfw-s{grid-column:span 1;min-width:0}
  .pfw-b{grid-column:1/-1}
  .pfw{position:relative;margin-bottom:0}
  .pfw-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
  .pfw-head h2{font-size:11px}
  .pfw-per{background:var(--chip);color:var(--chip-ink);border-radius:10px;padding:1px 8px;font-size:10px;letter-spacing:.3px;margin-left:4px}
  .pfw-ctl{display:flex;gap:2px;opacity:0;transition:opacity .15s}
  .pfw:hover .pfw-ctl{opacity:1}
  .pfw-ctl button{border:0;background:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 4px;border-radius:5px}
  .pfw-ctl button:hover{color:var(--ink);background:var(--surface-2)}
  .pfw-pop{position:absolute;top:34px;right:10px;z-index:50;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:10px 13px;box-shadow:0 8px 28px rgba(0,0,0,.18);min-width:170px}
  .pfw-pop select{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;
    padding:5px 8px;font:inherit;font-size:12.5px;color:var(--ink);margin-bottom:6px}
  .pfw-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:660;margin:6px 0 4px}
  .pfw-additem{padding:6px 8px;border-radius:7px;cursor:pointer;font-size:13px;white-space:nowrap}
  .pfw-additem:hover{background:var(--surface-2)}
  .pfw{cursor:grab}
  .pfw.dragging{opacity:.45}
  .pfw.dragover{outline:2px dashed var(--accent);outline-offset:3px}
  .pfw-dates input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:4px 8px;font:inherit;font-size:12px;color:var(--ink)}
  @media(max-width:860px){ #pf-grid{grid-template-columns:1fr 1fr} }
  /* activities */
  .act{display:grid;grid-template-columns:86px 78px 26px 1fr auto;gap:10px;align-items:center;padding:9px 2px;border-top:1px solid var(--grid);font-size:13px}
  .alogo{width:26px;height:26px;border-radius:7px;object-fit:contain;background:#fff;border:1px solid var(--border);display:block}
  .hlogo{width:30px;height:30px;border-radius:8px;object-fit:contain;background:#fff;border:1px solid var(--border);flex:none}
  .plogo{width:18px;height:18px;border-radius:5px;object-fit:contain;background:#fff;border:1px solid var(--border);flex:none}
  .nlogo{width:16px;height:16px;border-radius:4px;object-fit:contain;background:#fff;border:1px solid var(--border);vertical-align:-3px;margin-right:5px;display:inline-block}
  .llogo{width:16px;height:16px;border-radius:4px;object-fit:contain;background:#fff;border:1px solid var(--border);flex:none}
  .act:first-child{border-top:0}
  .act{transition:background .1s;border-radius:8px}
  .act:hover{background:var(--surface-2)}
  .act .ad{color:var(--muted);font-size:11.5px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .atype{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;text-align:center;letter-spacing:.3px}
  .atype.buy{background:var(--up-bg);color:var(--up)}
  .atype.sell{background:var(--down-bg);color:var(--down)}

th to the pivotal mid-2028 Phase 3 readout. The piece captures the central bull/bear tension in the name."}, {"date": "2026-07-02", "headline": "NKTR Stock Clocks Best Day In Over 2 Months As Investors Await Upcoming Clinical Data In Eczema", "source": "Stocktwits", "url": "https://stocktwits.com/news-articles/markets/equity/nktr-stock-clocks-best-day-in-over-2-months-as-investors-await-upcoming-clinical-data-in-eczema/cZm97YVR7jf", "summary": "NKTR posted its strongest single session in more than two months as traders positioned ahead of anticipated rezpeg eczema (atopic dermatitis) data and the imminent Phase 3 launch. The move reflected rebuilding conviction in the Treg-focused immunology pipeline after a volatile stretch, with volume signalling renewed institutional interest around the mid-year catalyst window."}, {"date": "2026-06-28", "headline": "Nektar Therapeutics Added to Russell 2000 Dynamic Index", "source": "MarketScreener", "url": "https://news.google.com/rss/articles/CBMivwFBVV95cUxPVnRJVmRQQUV3bkVDQjdLbGpCMFdzMHBkQ29fY0ZPTFJud01OclJhZFl1bmsybS01S2Exa3AyMDZ3OTRXWm9Dek9Ya181WHU0eEhCYUNZaEpkanoxQWc4Sk55OUNISm1rWFRiVHdwcUNheGxiR3BFeWM1WHdoM25nSHVuSjhlMHNxOGZvNWVWTnNEU2xpaGR6YndQcUZEMmR2X1BRd1RUaDhlWm5GS1VXNTNhZ0dkZ3Y5TGcwQ0tyOA", "summary": "NKTR was included in the FTSE Russell reconstitution, joining the Russell 2000 and related growth/value indices. Index inclusion adds passive-fund buying and improves liquidity and visibility, and the addition reflects the strong share-price recovery with NKTR up roughly 160% over the trailing year."}, {"date": "2026-06-24", "headline": "What a $1.2 Million Insider Sale Means for Nektar With Shares Up 160% This Past Year", "source": "The Motley Fool", "url": "https://news.google.com/rss/articles/CBMipAFBVV95cUxOcHBCZDNFOHhDOVdvTGNtNlBBWk1TNEMzX1U2YklwdXFNM2pkUWJJa1FILURKS3o0Zm96YVl2amNPSjBMbE1DbGpnX01pYWJCdEFPSmpDdXFvdlRxY0ZtdXEzSTBKazB1OEpxSGloQUxJVGVpVzVHZW9kSWtZQkQtWVg2dDFEUEk4eFBnbmRZUGpMN1U1VXlqYmljaHdBcHdKX0laTg", "summary": "Senior insiders including CEO Howard Robin and R&D chief Jonathan Zalevsky executed pre-scheduled 10b5-1 stock sales totalling over $1.2M after the stock's roughly 160% one-year run. The sales are automated diversification rather than discretionary signals, but the cadence drew attention given the elevated share price; insiders continue to hold meaningful equity tied to the rezpeg thesis."}], "catalysts": [{"when": "2026-Q3", "label": "Phase 3 ZENITH-AD initiation (atopic dermatitis)", "detail": "Nektar plans to launch the pivotal Phase 3 ZENITH-AD program for rezpeg in moderate-to-severe AD by the end of July 2026, starting with two biologic-naive studies; five studies planned in total. This is the program underpinning the long-term valuation, with a BLA targeted around 2029.", "confirmed": true}, {"when": "2026-08 (est.)", "label": "Q2 2026 earnings", "detail": "Next quarterly report with cash runway (over $1B after the April $373.8M raise) and pipeline/Phase 3 timing update. Exact date not yet officially confirmed.", "confirmed": false}, {"when": "2026-H2", "label": "REZOLVE-AA off-treatment durability (alopecia areata)", "detail": "Off-treatment/durability data after discontinuation in severe-to-very-severe alopecia areata - an important test of the persistence of rezpeg's effect and the second immunology indication. Rezpeg holds FDA Fast Track designation in severe AA.", "confirmed": true}, {"when": "2026-H2", "label": "Full REZOLVE-AD/AA data at a medical conference", "detail": "Nektar plans to present additional longer-term REZOLVE-AD (atopic dermatitis) and REZOLVE-AA (alopecia areata) Phase 2b data at a medical conference in H2 2026. Durability across monthly and quarterly dosing is the key readout.", "confirmed": true}, {"when": "mid-2028", "label": "First ZENITH-AD Phase 3 readout", "detail": "The initial registration-relevant Phase 3 efficacy readout for rezpeg in atopic dermatitis, the key value-inflection binary for the stock.", "confir ishes Phase I/II LX2006 Friedreich ataxia data in JAMA Cardiology", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/06/17/3313795/0/en/lexeo-therapeutics-announces-publication-in-jama-cardiology-of-phase-i-ii-data-for-lx2006-in-friedreich-ataxia.html", "summary": "Peer-reviewed JAMA Cardiology publication of pooled Phase I/II data (17 patients) showed roughly 28-33% left ventricular mass index improvement in abnormal-baseline cardiac cohorts, increased frataxin expression in all biopsied patients, and mFARS neurologic stabilization. This is the clinical foundation validating the pivotal cardiac program."}, {"date": "2026-06-15", "headline": "Lexeo announces FDA regulatory update and finalized SUNRISE-FA 2 registrational trial design", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/06/15/3311662/0/en/lexeo-therapeutics-announces-regulatory-update-and-registrational-trial-design-for-lx2006-gene-therapy-in-friedreich-ataxia.html", "summary": "The pivotal catalyst: Lexeo finalized the open-label SUNRISE-FA 2 protocol and statistical analysis plan (13 high-dose LX2006 patients plus 13 untreated controls, LVMI by cardiac MRI at 6 months as primary endpoint) with FDA aligned on an accelerated-approval BLA in 1H 2028. FDA confirmed no additional nonclinical bridging studies are needed and commercial-scale drug product is ready, materially de-risking the path to registration; management guided topline data to 2H 2027."}, {"date": "2026-05-11", "headline": "Lexeo reports Q1 2026 financial results and operational highlights", "source": "GlobeNewswire", "url": "https://ir.lexeotx.com/news-releases/news-release-details/lexeo-therapeutics-reports-first-quarter-2026-financial-results", "summary": "Q1 2026 EPS of -$0.25 beat consensus (-$0.31) and shares rose ~5%. The update reiterated cash runway and pipeline timelines, noting the SUNRISE-FA 2 protocol and SAP had been submitted to FDA and that Phase I/II interim data continued to show statistically significant mFARS improvement versus a propensity-matched control cohort."}], "catalysts": [{"when": "2026-Q3", "label": "SUNRISE-FA 2 enrollment ramp / first patients dosed", "detail": "Company guided to enrolling the first patient in the registrational LX2006 trial by end of June 2026, with commercial-scale drug product already available. Enrollment pace across the 13 treated / 13 control cohort is the key near-term operational catalyst.", "confirmed": true}, {"when": "2026-08-19", "label": "Q2 2026 earnings report", "detail": "Next quarterly results and pipeline update (date approximate, based on prior cadence); cash-runway commentary will be watched given ongoing cash burn.", "confirmed": false}, {"when": "2027-H2", "label": "SUNRISE-FA 2 topline data", "detail": "Pivotal readout of LX2006 in Friedreich ataxia cardiomyopathy (LVMI at 6 months), the key value-driving event ahead of a BLA.", "confirmed": true}, {"when": "2028-H1", "label": "LX2006 BLA submission (accelerated approval)", "detail": "Planned Biologics License Application to FDA under the accelerated-approval pathway based on SUNRISE-FA 2 evidence.", "confirmed": true}, {"when": "2026-H2", "label": "LX1001 APOE4 Alzheimer's program updates", "detail": "Continued development and enrollment updates for the APOE4-homozygous Alzheimer's gene therapy, a secondary pipeline catalyst.", "confirmed": false}], "pulse": "Sentiment has turned decisively positive over the past ~60 days: the mid-June regulatory update finalizing the open-label SUNRISE-FA 2 pivotal design with FDA alignment on a 1H 2028 accelerated-approval BLA, plus a peer-reviewed JAMA Cardiology publication of strong LX2006 cardiac data (28-33% LVMI improvement, frataxin expression in all biopsies), reset the story and drew Buy/Overweight reiterations from Stifel ($17 PT) and JPMorgan ($9). Analyst targets sit well above the depressed ~$5 share price, framing a wide bull-case gap, while attention now shifts Mizuho lifting its target to $68 and peers clustering in the mid-$60s to $80s. Consensus has swung firmly bullish (Strong Buy, median target ~$71), and retail chatter pushed toward the $150 mark.", "ticker": "QURE"}, {"date": "2026-07-10", "headline": "WGS Stock Slumps After Hours As Firm Predicts Lower Test Volume For Year", "source": "Stocktwits", "url": "https://stocktwits.com/news-articles/markets/equity/wgs-stock-slumps-after-hours-as-firm-predicts-lower-test-volume-for-year/cZQwLykReJu", "summary": "GeneDx shares fell after hours after the company signaled softer full-year exome and genome test volume than previously expected. The warning deepened demand concerns first flagged with the Q1 miss and is the freshest negative operational catalyst heading into the Q2 print.", "ticker": "WGS"}, {"date": "2026-07-10", "headline": "NeurAxis Declares Q2 2026 Stock Dividend on Series B Preferred Stock", "source": "TipRanks", "url": "https://www.tipranks.com/news/company-announcements/neuraxis-declares-q2-stock-dividend-on-series-b", "summary": "The board declared a Q2 2026 stock dividend on the Series B Preferred, payable in roughly 80,463 common shares on July 29 to holders of record July 21. This is routine non-cash preferred housekeeping that adds a small ongoing dilution drip rather than any operational news.", "ticker": "NRXS"}, {"date": "2026-07-10", "headline": "Analysts Maintain Delcath Systems Buy Ratings with $21 Target", "source": "Moomoo / The Globe and Mail", "url": "https://www.theglobeandmail.com/investing/markets/stocks/DCTH/pressreleases/35236095/craig-hallum-remains-a-buy-on-delcath-systems-dcth/", "summary": "Craig-Hallum and CCORF both reaffirmed Buy ratings on DCTH with price targets around $21, well above the current share price. Continued sell-side confidence rests on the HEPZATO commercial ramp and pipeline expansion.", "ticker": "DCTH"}, {"date": "2026-07-10", "headline": "Is Delcath Systems Inc (DCTH) a Bargain After 3.8% Drop? GF Value Says Un y and quarterly dosing sustaining EASI-75/90 responses and deepening EASI-100 rates. The readout reinforced the Treg-biologic thesis and capped a multi-week rally heading into the Phase 3 launch. Atopic dermatitis is the lead indication underpinning most of NKTR's pipeline value.", "ticker": "NKTR"}, {"date": "2026-07-09", "headline": "Delcath Systems Announces First Patient Dosed in Phase 2 Clinical Trial of HEPZATO in Liver-Dominant Metastatic Breast Cancer", "source": "Business Wire / BioSpace", "url": "https://www.businesswire.com/news/home/20260709141093/en/Delcath-Systems-Announces-First-Patient-Dosed-in-Phase-2-Clinical-Trial-of-HEPZATO-in-Liver-Dominant-Metastatic-Breast-Cancer", "summary": "First patient dosed at the European Institute of Oncology in Milan in the ~90-patient randomized DELUMA trial (NCT06875128) evaluating HEPZATO plus standard of care in HER2-negative liver-dominant metastatic breast cancer. This is the key pipeline expansion beyond ocular melanoma into a much larger indication.", "ticker": "DCTH"}, {"date": "2026-07-08", "headline": "NRXS Named Among 22 Biotech Stocks to Watch", "source": "TheStreet Pro", "url": "https://www.thestreet.com/", "summary": "A TheStreet Pro screen of 22 biotech and medtech names to watch featured NRXS, adding incremental retail visibility for the thinly traded micro-cap. This is media commentary rather than a company event or fundamental change.", "ticker": "NRXS"}, {"date": "2026-07-08", "headline": "FMR LLC (Fidelity) reports 3.94M-share holding in Tenax Therapeutics", "source": "StockTitan", "url": "https://www.stocktitan.net/news/TENX/", "summary": "A regulatory filing shows Fidelity's FMR LLC holding roughly 3.94 million TENX shares. Institutional accumulation of this scale signals rising large-holder conviction heading into the binary Phase 3 event.", "ticker": "TENX"}, {"date": "2026-07-07", "headline": "uniQure (QURE) CEO sells 21,082 shares after option exercise under 10b5-1 plan", "source": "StockTitan", "url": "https://www.stocktitan.net/sec-filings/QURE/form-4-uni-qure-n-v-insider-trading-activity-7c5938986f9c.html", "summary": "CEO Matthew Kapusta exercised options at $19.39 and sold 21,082 shares at an average ~$45.16 for about $952K under a pre-scheduled Rule 10b5-1 plan adopted in October 2025, leaving him with 519,227 shares. The pre-planned nature blunts the timing signal, but continued executive selling into the post-FDA rally remains a mild governance watch-item.", "ticker": "QURE"}, {"date": "2026-07-07", "headline": "Stifel maintains Lexeo Therapeutics (LXEO) at Buy, $17 price target", "source": "Futu / Moomoo", "url": "https://www.stocktitan.net/news/LXEO/", "summary": "Stifel reiterated a Buy rating with a $17 price target, more than triple the ~$5 share price, signaling continued sell-side conviction in the LX2006 accelerated-approval path after the June regulatory update. It adds to a post-catalyst chorus of bullish analyst reiterations.", "ticker": "LXEO"}, {"date": "2026-07-06", "headline": "Nektar Therapeutics (NKTR) Advances Autoimmune Pipeline, Is The Upside Already Priced In?", "source": "Simply Wall St", "url": "https://simplywall.st/stocks/us/pharmaceuticals-biotech/nasdaq-nktr/nektar-therapeutics/news/nektar-therapeutics-nktr-advances-autoimmune-pipeline-is-the", "summary": "An analysis weighed NKTR's sharp re-rating against the risk that the rezpeg immunology story - atopic dermatitis plus alopecia areata - is now largely priced in after a roughly 160% one-year run. It frames the debate as valuation versus a long, binary path to the pivotal mid-2028 Phase 3 readout. The piece captures the central bull/bear tension in the name.", "ticker": "NKTR"}, {"date": "2026-07-06", "headline": "Paradigm Capital names Perimeter and maintains Profound as healthcare Top Picks", "source": "BioTuesdays", "url": "https://biotuesdays.com/2026/07/06/paradigm-capital-names-perimeter-and-maintains-profound-as-healthcare-top-picks/", "summary": "Paradigm Capital initiated Perimeter as a healthcare Top Pick with a Speculative Buy and a C$0.95 price target (stock at C$0.275 on July 3). The analyst frames the March FDA approval of Claire as the accelerant for U.S. commercialization and flags M&A optionality, noting the stock trades at ~2.3x 2027e revenue versus ~10.3x average for comparable MedTech takeouts.", "ticker": "PINK"}, {"date": "2026-07-06", "headline": "LifeSci Capital Maintains Tenax With Buy, Raises Price Target to $35", "source": "Moomoo", "url": "https://www.moomoo.com/news/post/TENX", "summary": "LifeSci analyst Gaurav Maini reiterated a Buy and lifted the price target to $35, adding to a string of positive analyst actions. Sell-side coverage remains overwhelmingly constructive as the levosimendan readout approaches.", "ticker": "TENX"}, {"date": "2026-07-03", "headline": "Have insiders sold Lexeo Therapeutics shares recently?", "source": "Simply Wall St", "url": "https://simplywall.st/stocks/us/pharmaceuticals-biotech/nasdaq-lxeo/lexeo-therapeutics", "summary": "A cluster of early-July Form 4/144 filings showed several executives, including the CMO (~$98.6k), CEO and CFO, disposing of shares alongside RSU grants. The sizes were modest and largely automatic tax-cover sales, but insider selling right after a positive catalyst drew retail attention and is a mild sentiment negative.", "ticker": "LXEO"}, {"date": "2026-07-02", "headline": "ClearPoint Neuro CFO and CBO add ESPP shares via Form 4", "source": "Stock Titan", "url": "https://www.stocktitan.net/news/CLPT/", "summary": "The CFO acquired 1,085 shares and the CBO added 1,781 shares (now holding 110,263) through the employee stock purchase plan in early July. The insider accumulation is a modest alignment signal following the mid-June AMT-130 rally, though ESPP buys are routine and lower-conviction than open-market purchases.", "ticker": "CLPT"}, {"date": "2026-07-02", "headline": "NKTR Stock Clocks Best Day In Over 2 Months As Investors Await Upcoming Clinical Data In Eczema", "source": "Stocktwits", "url": "https://stocktwits.com/news-articles/markets/equity/nktr-stock-clocks-best-day-in-over-2-months-as-investors-await-upcoming-clinical-data-in-eczema/cZm97YVR7jf", "summary": "NKTR posted its strongest single session in more than two months as traders positioned ahead of anticipated rezpeg eczema (atopic dermatitis) data and the imminent Phase 3 launch. The move reflected rebuilding conviction in the Treg-focused immunology pipeline after a volatile stretch, with volume signalling renewed institutional interest around the mid-year catalyst window.", "ticker": "NKTR"}, {"date": "2026-07-02", "headline": "Tenax Therapeutics Announces Late-Breaking Presentation of LEVEL Clinical Trial Data at ESC Congress 2026", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/07/02/3321224/12401/en/tenax-therapeutics-announces-late-breaking-presentation-of-level-clinical-trial-data-at-esc-congress-2026.html", "summary": "The Phase 3 LEVEL results in PH-HFpEF secured a Late-Breaking Clinical Science slot at ESC Congress in Munich, to be presented Aug 29 at 11:15 CEST by Prof. Sanjiv Shah of Northwestern, with topline data still expected in August 2026. The prestigious venue anchors the central share-price catalyst to a defined window.", "ticker": "TENX"}, {"date": "2026-07-01", "headline": "ClearPoint Neuro CEO exercises options and sells 20,000 shares under 10b5-1 plan", "source": "Stock Titan", "url": "https://www.stocktitan.net/news/CLPT/", "summary": "CEO Joe Burnett exercised options and sold 20,000 shares under a pre-arranged 10b5-1 trading plan, following a larger 61,843-share option-related sale on June 22. The scheduled nature of the disposals tempers the read, but the string of CEO sales into strength is a mild governance watch-item against the otherwise bullish insider ESPP activity.", "ticker": "CLPT"}, {"date": "2026-06-30", "headline": "Orion Exercises Option to Serve as Primary Supplier of Oral Levosimendan; Sixth Amendment to License", "source": "StockTitan", "url": "https://www.stocktitan.net/news/TENX/", "summary": "Orion exercised its option to act as primary supplier of oral levosimendan for development and, if approved, commercial use, under a sixth amendment to the licensing agreement that also extended the US regulatory approval deadline. The deal secures long-term supply and eases commercialization/timeline pressure just ahead of the pivotal readout.", "ticker": "TENX"}, {"date": "2026-06-29", "headline": "NeurAxis, Inc. Added to Russell 3000E Growth Benchmark", "source": "MarketScreener / FTSE Russell", "url": "https://www.marketscreener.com/quote/stock/NEURAXIS-INC-165458376/", "summary": "NRXS was added to the Russell 3000E Growth benchmark in FTSE Russell's annual reconstitution, broadening passive-fund ownership and index visibility. The inclusion followed a 52-week high of $9.33 hit on June 27 amid the post-CPT-code rally.", "ticker": "NRXS"}, {"date": "2026-06-29", "headline": "Caribou Biosciences added to Russell 2000 and Russell Microcap indices", "source": "MarketScreener", "url": "https://news.google.com/rss/articles/CBMiugFBVV95cUxQVU1QcEhRQ3dEUUJ5XzV4SmpWRXhKWHZTVGNRV3VUdHZVSGV5Y3kzSW5ObHdmSkxnV0s0aXhNWE9CeFg5bGFnNFdqaGJUeDItQVVTYTRIdG1yNU9WbjByTTM0M2t5Q0lNTVVRVFVuSjlkMFppT1hNWm1wQWlXQVRGSDhBSFMwTEJzSWFIdHkwY3B5UnpCdmZLdVUtc1h1bVpJUktYUmdzdGRUeHVOeDlNbkk3ZC1Ka2VBeEE", "summary": "CRBU was added to the reconstituted Russell 2000, Russell Microcap and related value benchmark indices at the June 2026 rebalance. Index inclusion brings incremental passive fund ownership, a modest structural tailwind for this thinly traded micro-cap.", "ticker": "CRBU"}, {"date": "2026-06-28", "headline": "Nektar Therapeutics Added to Russell 2000 Dynamic Index", "source": "MarketScreener", "url": "https://news.google.com/rss/articles/CBMivwFBVV95cUxPVnRJVmRQQUV3bkVDQjdLbGpCMFdzMHBkQ29fY0ZPTFJud01OclJhZFl1bmsybS01S2Exa3AyMDZ3OTRXWm9Dek9Ya181WHU0eEhCYUNZaEpkanoxQWc4Sk55OUNISm1rWFRiVHdwcUNheGxiR3BFeWM1WHdoM25nSHVuSjhlMHNxOGZvNWVWTnNEU2xpaGR6YndQcUZEMmR2X1BRd1RUaDhlWm5GS1VXNTNhZ0dkZ3Y5TGcwQ0tyOA", "summary": "NKTR was included in the FTSE Russell reconstitution, joining the Russell 2000 and related growth/value indices. Index inclusion adds passive-fund buying and improves liquidity and visibility, and the addition reflects the strong share-price recovery with NKTR up roughly 160% over the trailing year.", "ticker": "NKTR"}, {"date": "2026-06-28", "headline": "Delcath Systems Added to Russell 2000 Value, 2500 Value, 3000 Value and Microcap Value Benchmarks", "source": "MarketScreener", "url": "https://www.marketscreener.com/quote/stock/DELCATH-SYSTEMS-INC-10396/", "summary": "DCTH was included in several Russell value benchmarks (Russell 2000 Value, 2500 Value, 3000 Value, Microcap Value and 2000 Defensive) in the annual reconstitution. Index membership broadens passive-fund ownership, visibility and liquidity for the small-cap name.", "ticker": "DCTH"}, {"date": "2026-06-25", "headline": "uniQure Announces Closing of Upsized $259 Million Public Offering", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/06/25/3317934/0/en/uniqure-announces-closing-of-upsized-public-offering-and-full-exercise-by-underwriters-of-option-to-purchase-additional-shares.html", "summary": "uniQure closed roughly 5.69M shares at $45.50 for about $259M gross after underwriters fully exercised the overallotment. Proceeds fund AMT-130 commercialization readiness, a potential launch, and the confirmatory study, de-risking the balance sheet ahead of the costly BLA phase while adding some dilution.", "ticker": "QURE"}, {"date": "2026-06-25", "headline": "J.P. Morgan maintains Lexeo Therapeutics at Overweight, $9 price target", "source": "Moomoo", "url": "https://www.moomoo.com/news", "summary": "JPMorgan reaffirmed Overweight (Buy) but trimmed its target to $9 (from $12) following the JAMA publication and pivotal trial-design finalization. The bulge-bracket endorsement reinforces confidence in the LX2006 regulatory pathway despite the lower target.", "ticker": "LXEO"}, {"date": "2026-06-24", "headline": "What a $1.2 Million Insider Sale Means for Nektar With Shares Up 160% This Past Year", "source": "The Motley Fool", "url": "https://news.google.com/rss/articles/CBMipAFBVV95cUxOcHBCZDNFOHhDOVdvTGNtNlBBWk1TNEMzX1U2YklwdXFNM2pkUWJJa1FILURKS3o0Zm96YVl2amNPSjBMbE1DbGpnX01pYWJCdEFPSmpDdXFvdlRxY0ZtdXEzSTBKazB1OEpxSGloQUxJVGVpVzVHZW9kSWtZQkQtWVg2dDFEUEk4eFBnbmRZUGpMN1U1VXlqYmljaHdBcHdKX0laTg", "summary": "Senior insiders including CEO Howard Robin and R&D chief Jonathan Zalevsky executed pre-scheduled 10b5-1 stock sales totalling over $1.2M after the stock's roughly 160% one-year run. The sales are automated diversification rather than discretionary signals, but the cadence drew attention given the elevated share price; insiders continue to hold meaningful equity tied to the rezpeg thesis.", "ticker": "NKTR"}, {"date": "2026-06-23", "headline": "Lake Street maintains ClearPoint Neuro at Buy, raises target to $30", "source": "Lake Street / Moomoo", "url": "https://seekingalpha.com/symbol/CLPT", "summary": "Lake Street reaffirmed its Buy rating and the Street-high $30 price target, framing ClearPoint as the primary picks-and-shovels supplier benefiting from uniQure's AMT-130 progress. The call reflects growing analyst conviction post-FDA news but leaves valuation heavily dependent on partner execution.", "ticker": "CLPT"}, {"date": "2026-06-22", "headline": "Guggenheim Maintains Buy on Tenax, Raises Price Target to $40 on Trial Confidence", "source": "GuruFocus", "url": "https://www.gurufocus.com/news/8925271/tenx-maintained-by-guggenheim-price-target-raised-to-40", "summary": "Guggenheim reiterated its Buy rating and raised the TENX price target from $34 to $40, citing growing confidence in the levosimendan program ahead of LEVEL. It followed Piper Sandler's earlier target hike, reinforcing broadly bullish sell-side sentiment into the data.", "ticker": "TENX"}, {"date": "2026-06-18", "headline": "Caribou shareholders reject officer exculpation proposal at annual meeting", "source": "Stock Titan", "url": "https://news.google.com/rss/articles/CBMisgFBVV95cUxPSUlNdkZ0QjFHQ2F1RDBoak03VlFqVnVTWUdVZkgzNHhaYU5lRks3WnNDUzVVd1k3bGZ5dHA0eHMtb2M0NEFaSUFIb1N0eG5wQXB0dTVGVEZNZUNfdFYtV2hpS3dwdmZ5RnowRnZhX081MENsX3FPWjlpbzJlZEV2eEE5UjYxZy1oSDRrZVQwMmdvMUdRM2M4NlBodTZEVm1xZGx0ckNWalMxNmVXaFFpT3dR", "summary": "At its 2026 annual meeting Caribou shareholders elected the director slate and ratified the auditor but voted down a proposed charter amendment extending liability exculpation to corporate officers. A governance signal reflecting some investor pushback rather than a fundamental driver.", "ticker": "CRBU"}, {"date": "2026-06-17", "headline": "uniQure Announces Plan for BLA Submission for AMT-130 in Huntington's Disease", "source": "GlobeNewswire (uniQure PR)", "url": "https://www.globenewswire.com/news-release/2026/06/17/3313322/0/en/uniqure-announces-plan-for-bla-submission-for-amt-130-in-huntington-s-disease.html", "summary": "In a pivotal Type B meeting the FDA agreed the ~3-year Phase I/II data (75% slowing of cUHDRS progression in the high-dose cohort versus external controls) can serve as the primary basis for a BLA under accelerated approval, reversing prior friction. Submission is planned for Q3 2026 and the stock jumped roughly 78% on the day; AMT-130 holds RMAT, Breakthrough Therapy and Fast Track designations, with a parallel UK MHRA filing also planned.", "ticker": "QURE"}, {"date": "2026-06-17", "headline": "GeneDx price target raised to $63 from $50 at Piper Sandler on coverage policy", "source": "TipRanks / Piper Sandler", "url": "https://www.tipranks.com/news/the-fly/genedx-price-target-raised-to-63-from-50-at-piper-sandler-thefly-news", "summary": "Piper Sandler lifted its price target to $63 from $50 after Carelon codified outpatient genome coverage, calling it a structural ASP de-risking event. The firm estimates the policy could add roughly $100 of incremental average selling price by the second half of 2027 as the exome-to-genome mix shifts.", "ticker": "WGS"}, {"date": "2026-06-17", "headline": "uniQure plans Q3 2026 BLA for AMT-130 after FDA accepts 3-year data for accelerated approval", "source": "GlobeNewswire / Investing.com", "url": "https://www.investing.com/news/stock-market-news/clearpoint-neuro-stock-surges-on-peers-fda-approval-plan-93CH-4747019", "summary": "In a Type B meeting the FDA said the 3-year Phase I/II analysis (showing a 75% slowing of disease progression at the high dose) is acceptable as the primary basis for a BLA under accelerated approval for AMT-130 in Huntington's disease, with submission planned for Q3 2026. AMT-130 is delivered directly into the brain via ClearPoint's SmartFlow cannula and navigation platform, so CLPT benefits directly; the stock surged 26-32% intraday, the single biggest catalyst of the period.", "ticker": "CLPT"}, {"date": "2026-06-17", "headline": "Lexeo publishes Phase I/II LX2006 Friedreich ataxia data in JAMA Cardiology", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/06/17/3313795/0/en/lexeo-therapeutics-announces-publication-in-jama-cardiology-of-phase-i-ii-data-for-lx2006-in-friedreich-ataxia.html", "summary": "Peer-reviewed JAMA Cardiology publication of pooled Phase I/II data (17 patients) showed roughly 28-33% left ventricular mass index improvement in abnormal-baseline cardiac cohorts, increased frataxin expression in all biopsied patients, and mFARS neurologic stabilization. This is the clinical foundation validating the pivotal cardiac program.", "ticker": "LXEO"}, {"date": "2026-06-16", "headline": "GeneDx Names Mark Gardner President", "source": "GeneDx / Yahoo Finance", "url": "https://news.google.com/rss/articles/CBMinAFBVV95cUxPMVdkS1hfOXlMSjFtMmhSUTF0TGZtQXBzTk0xRmw5cGwtZzRpdEpyaERIMF9UT3ZLNDJ2NzdWZ2F2RDVVYmI0QzYxaXpzZ2szZkExQlNjRTZFUU1wendETXpjaHZNc0lENE5NcERINVlITHpaSlZtbURDVEZvUlNQZ0lCVEhmZGhGOV9wWDlwMGsyVlVGWWdyQTYzYk4?oc=5", "summary": "GeneDx appointed Mark Gardner as President, effective June 15, 2026, reporting to CEO Katherine Stueland to lead commercial and operations at scale. The hire came amid the guidance reset and litigation, positioning new management to rebuild execution credibility.", "ticker": "WGS"}, {"date": "2026-06-16", "headline": "H.C. Wainwright reiterates Buy rating on Caribou Biosciences", "source": "Investing.com", "url": "https://news.google.com/rss/articles/CBMiwgFBVV95cUxONTk2b2hkMm9xY0p4dmw5eXU4T2dsVi11d2hVVWlnTkNlaTk2Nm1LQktORlIzaDlUYU9hUFA0ZUROajBrTUl1S0NMYUtxeVQ5anFFVFUtbDlNUm5iZ1kxbnQ4YW1fcTk3blNrSWt2QUthaFlkdkdsTW1SLS1wQ0FlTnA3NWNYbHlPbVR5NHNGWmYxS19wNlhHNU8tOC1OcVJDcWhLbHphY0hxOG9kMG5iWFlaUy1kR3dwdWd1ZkhCTWZiZw", "summary": "H.C. Wainwright reaffirmed a Buy rating following the EHA 2026 datasets, echoing Citi's Buy and $8 target. The sell side broadly views the vispa-cel and CB-011 results as validating Caribou's off-the-shelf CRISPR CAR-T, though targets embed successful financing of the pivotal program.", "ticker": "CRBU"}, {"date": "2026-06-15", "headline": "Perimeter Medical Imaging AI to Participate in the Planet MicroCap Showcase in Las Vegas", "source": "Perimeter IR / PR Newswire", "url": "https://ir.perimetermed.com/news-events/press-releases/detail/212/", "summary": "CEO Adrian Mendes presented Perimeter's post-FDA commercialization strategy and upcoming milestones at the Planet MicroCap Showcase on June 17. The appearance underscores the push for broader small-cap investor visibility following Claire's approval.", "ticker": "PINK"}, {"date": "2026-06-15", "headline": "Lexeo announces FDA regulatory update and finalized SUNRISE-FA 2 registrational trial design", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/06/15/3311662/0/en/lexeo-therapeutics-announces-regulatory-update-and-registrational-trial-design-for-lx2006-gene-therapy-in-friedreich-ataxia.html", "summary": "The pivotal catalyst: Lexeo finalized the open-label SUNRISE-FA 2 protocol and statistical analysis plan (13 high-dose LX2006 patients plus 13 untreated controls, LVMI by cardiac MRI at 6 months as primary endpoint) with FDA aligned on an accelerated-approval BLA in 1H 2028. FDA confirmed no additional nonclinical bridging studies are needed and commercial-scale drug product is ready, materially de-risking the path to registration; management guided topline data to 2H 2027.", "ticker": "LXEO"}, {"date": "2026-06-14", "headline": "Carelon adds outpatient genome sequencing coverage, lifting insured coverage to ~80%", "source": "Carelon Medical Benefits Management", "url": "https://guidelines.carelonmedicalbenefitsmanagement.com/whole-exome-sequencing-and-whole-genome-sequencing-2026-06-14-updated-2026-07-01/", "summary": "Carelon, the largest U.S. lab benefit manager, added genome sequencing under the same clinical criteria as exome for undiagnosed rare disease, raising insured genome coverage to nearly 80%. It is a structural volume and reimbursement tailwind and arguably the most important positive catalyst of the period, underpinning the view that the sell-off went too far.", "ticker": "WGS"}, {"date": "2026-06-13", "headline": "NeurAxis Stockholders Approve Directors and Equity Compensation Plans", "source": "The Globe and Mail", "url": "https://ir.neuraxis.com/", "summary": "At the June 10 annual meeting shareholders elected six directors and approved an increase to the equity incentive plan plus a new employee stock purchase plan. It is a governance milestone that matters mainly as a source of additional potential stock-comp dilution.", "ticker": "NRXS"}, {"date": "2026-06-13", "headline": "CagriSema Diabetes Data Boost Before FDA Decision", "source": "GLP1 Clinics", "url": "https://www.glp1clinics.org/blog/cagrisema-diabetes-data-fda-decision-2026-06-13", "summary": "New CagriSema diabetes data presented at the ADA 2026 Scientific Sessions (New Orleans, June 5-8) reinforced the GLP-1/amylin combination's profile, with weight loss of up to ~23% in trials. The readout strengthens Novo's case ahead of an expected Q4 2026 FDA decision on its next-generation obesity drug.", "ticker": "NVO"}, {"date": "2026-06-11", "headline": "Hedge Funder Eli Casdin Is Loading Up on GeneDx Shares", "source": "The Motley Fool", "url": "https://www.fool.com/coverage/filings/2026/06/11/hedge-funder-eli-casdin-is-loading-up-on-genedx-shares/", "summary": "Casdin Capital bought roughly 690,000 GeneDx shares for about $32.6 million over recent weeks, becoming the largest institutional holder with 3.7 million shares. The board-linked specialist's open-market accumulation into the crash is read as a contrarian vote of confidence against the litigation-driven sell-off.", "ticker": "WGS"}, {"date": "2026-06-11", "headline": "Caribou reports long-term vispa-cel (CB-010) data in second-line large B-cell lymphoma at EHA 2026", "source": "Caribou Biosciences / Yahoo Finance", "url": "https://investor.cariboubio.com/news-releases/news-release-details/caribou-biosciences-reports-long-term-vispa-cel-data-second-line", "summary": "Updated ANTLER data for vispa-cel (formerly CB-010) showed roughly 82% ORR, 67% CR and a 17.1-month median PFS in optimized-dose second-line LBCL patients, with no GvHD and minimal severe CRS. The durability supports Caribou's case that its allogeneic product can match approved autologous CAR-T ahead of the planned ANTLER-3 pivotal Phase 3.", "ticker": "CRBU"}, {"date": "2026-06-11", "headline": "Caribou reports CB-011 dose-escalation durability data at EHA 2026", "source": "Investing News Network", "url": "https://news.google.com/rss/articles/CBMi7AFBVV95cUxNRjJvTFQ2cWVlVDlPNkJPSWVsSmpIN25tX0x4azByZU5NeXhqc2N1Nk5SeTBOM1M4RGVWOG1LOHIyVDYxQUNEZ19DLWk0M3dPQVdVY0gxUF9TYWJVRXdjQ0QyaFVpbFdzRkZpNV9QQVp2dmJlemRSZkVmd0UyaUxrZnZXR1ZXLV9ka3BfejZaM1h1czg2c0tzWHV2Q0RIelduYmt1ZHRMTWJKUGFaYk0xVm8wRUlRcElsamFIaS1qRk83MTU2ZFM4OXpabDBfZzdXQ2RsREFuMTUxQW5DNllDOE1xZ25LQkRUc0EycQ", "summary": "CB-011 (anti-BCMA) posted a roughly 92% ORR, 75% or greater CR and 91% MRD negativity in BCMA-naive relapsed/refractory myeloma patients at the recommended expansion dose, with durable complete responses. The clean efficacy and safety profile positions the RMAT-designated program as pivotal-ready and is Caribou's most advanced myeloma catalyst.", "ticker": "CRBU"}, {"date": "2026-06-09", "headline": "Perimeter Selected for INOVAIT Pilot Fund to Advance AI for Breast Cancer Surgery", "source": "Perimeter IR / PR Newswire", "url": "https://ir.perimetermed.com/news-events/press-releases/detail/211/", "summary": "Perimeter secured up to ~C$148,000 from Canada's INOVAIT Pilot Fund plus C$100,000 in Mitacs funding to develop the next AI generation for Claire alongside the University of Toronto. The amount is small, but it is non-dilutive external validation of the AI platform.", "ticker": "PINK"}, {"date": "2026-06-08", "headline": "Perimeter Medical Imaging AI Closes Final Tranche of Non-Brokered Private Placement", "source": "Perimeter IR / PR Newswire", "url": "https://ir.perimetermed.com/news-events/press-releases/detail/210/", "summary": "Perimeter closed the final tranche of its convertible-debenture placement, bringing the total to C$6.04M. Insider alignment is strong: CEO Mendes subscribed C$2.76M and Chamath Palihapitiya's SC Master Holdings (Social Capital) C$2.78M, though the notes add potential dilution.", "ticker": "PINK"}, {"date": "2026-05-28", "headline": "NRXS: Record Q1 Revenue and Expanded Coverage Drive Growth in Pediatric and VA Neuromodulation Markets", "source": "Zacks Small-Cap Research", "url": "https://scr.zacks.com/", "summary": "Zacks reiterated a constructive view citing record Q1 revenue of $1.61M (+80% YoY) at roughly 86% gross margin, with expanding insurance coverage and the Veterans Affairs channel flagged as growth areas alongside pediatrics. The note frames the January Category I CPT code as the structural driver behind accelerating reimbursed volume.", "ticker": "NRXS"}, {"date": "2026-05-28", "headline": "Perimeter Announces First Quarter 2026 Financial Results", "source": "Perimeter IR / PR Newswire", "url": "https://ir.perimetermed.com/news-events/press-releases/detail/209/", "summary": "Q1 recurring revenue rose ~14% YoY to roughly $385k, operating expenses fell ~30% to $3.2M and the net loss narrowed to ~$3.0M. Cash at end of March was only ~$421k (before the ~$7.5M LIFE offering in May); Perimeter reported its first two commercial Claire placements and a funnel of ~50 qualified leads.", "ticker": "PINK"}, {"date": "2026-05-27", "headline": "ClearPoint enters 10-year focused-ultrasound partnership with Sungkyunkwan University, South Korea", "source": "ACCESS Newswire / ClearPoint IR", "url": "https://ir.clearpointneuro.com/", "summary": "The decade-long collaboration develops focused ultrasound for blood-brain-barrier opening, expanding ClearPoint's drug-delivery ecosystem and deepening its footprint in Asia. It is a strategic, long-dated bet that broadens the addressable market beyond MRI-guided direct injection, with limited near-term revenue impact.", "ticker": "CLPT"}, {"date": "2026-05-26", "headline": "Delcath Systems Announces Two ASCO 2026 Investigator Initiated Trials-in-Progress Abstracts", "source": "Business Wire / BioSpace", "url": "https://www.stocktitan.net/news/DCTH/delcath-systems-announces-two-asco-2026-investigator-initiated-dp5wpwdiapnc.html", "summary": "Two investigator-initiated trials-in-progress abstracts featuring HEPZATO were presented at the 2026 ASCO annual meeting, expanding clinical evidence and physician engagement. Reinforces the growing academic base supporting HEPZATO across indications.", "ticker": "DCTH"}, {"date": "2026-05-13", "headline": "Craig-Hallum Sticks to Its Buy Rating for NeurAxis, Inc. (NRXS)" const cvar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
/* Parqet-style hue sweep for the donut: deep blue -> indigo -> violet -> pink -> orange,
   assigned by portfolio weight (largest position starts the wheel) */
function isDarkTheme(){
  const t=document.documentElement.getAttribute('data-theme');
  return t? t==='dark' : window.matchMedia('(prefers-color-scheme:dark)').matches;
}
function colorFor(i){
  const hs=DATA.holdings.filter(h=>h.assetType!=='cash');
  const order=[...hs].sort((a,b)=>b.value-a.value);
  const h=DATA.holdings[i];
  const rank=Math.max(0,order.findIndex(x=>x&&h&&x.ticker===h.ticker));
  const n=Math.max(1,order.length-1);
  const hue=(212 + rank/n*195) % 360;               // 212° blue -> 407°%360 = 47° amber
  const [s,l]=isDarkTheme()?[50,52]:[54,44];        // Parqet-deep: richer, darker tones
  return `hsl(${hue.toFixed(0)} ${s}% ${l}%)`;
}

let _ccy = localStorage.getItem('pc-ccy')||'USD';
let _priv = localStorage.getItem('pc-priv')==='1';
const curSym = () => _ccy==='EUR' ? '€' : '$';
const inCcy = n => _ccy==='EUR' ? n/(DATA.usdPerEur||1.14) : n;
const MASK = '•••••';
const fmtUsd = n => { if(_priv) return MASK; const v=inCcy(n);
  return (v<0?'-':'')+curSym()+Math.abs(Math.round(v)).toLocaleString('en-US'); };
const fmtEur = fmtUsd; // alias
const fmtE = n => (n<0?'-':'')+'€'+Math.abs(Math.round(n)).toLocaleString('en-US'); // raw EUR (engine figures)

const fmtShort = n => { if(_priv) return '•••'; const v=inCcy(n); const a=Math.abs(v), s=v<0?'-':'';
  return a>=1e6? s+curSym()+(a/1e6).toFixed(2).replace(/\.?0+$/,'')+'M' : a>=1e3? s+curSym()+Math.round(a/1e3)+'k' : s+curSym()+Math.round(a); };
const maskable = s => _priv ? MASK : s;   // for native-currency strings (prices, activity amounts)
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  const tiles=[

function tfStartDate(k){
  const s=DATA.chartPP||[]; if(!s.length) return '';
  const last=s[s.length-1].d;
  if(k==='ytd') return last.slice(0,4)+'-01-01';
  const days={'1y':365,'6m':182,'3m':91,'1m':30}[k]||0;
  return new Date(new Date(last).getTime()-days*86400000).toISOString().slice(0,10);
}
function chartSlice(){
  const s=(DATA.chartPP||[]).filter(p=>p.v>0);
  if(curTf==='max'||!s.length) return s;
  const from=tfStartDate(curTf);
  const i=s.findIndex(p=>p.d>=from);
  return i<=0? s : s.slice(i-1);   // keep one base point so the period return starts at 0
}

       <stop offset="1" stop-color="${acc}" stop-opacity="0"/></linearGradient></defs>`+
    `<path d="${area}" fill="url(#g)"/>`+
    `<path d="${line}" fill="none" stroke="${acc}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`+
    `<circle cx="${X(pts[pts.length-1].d).toFixed(1)}" cy="${Y(val(pts[pts.length-1])).toFixed(1)}" r="4" fill="${acc}" stroke="${cvar('--surface')}" stroke-width="2"/>`+
    `<line class="cross" id="cx" x1="0" y1="${pad.t}" x2="0" y2="${yb}" style="opacity:0"/>`+
    `<circle id="cd" r="4.5" fill="${acc}" stroke="${cvar('--surface')}" stroke-width="2" style="opacity:0"/>`;
  const cx=svg.querySelector('#cx'), cd=svg.querySelector('#cd');
  function move(e){
    const r=svg.getBoundingClientRect();
    const mx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const targT=t0 + Math.max(0,Math.min(1,mx/r.width))*tspan;
    let bi=0,bd=1e18; for(let i=0;i<pts.length;i++){const dd=Math.abs(T(pts[i].d)-targT); if(dd<bd){bd=dd;bi=i;}}
    const p=pts[bi], px=X(p.d), py=Y(val(p));
    cx.setAttribute('x1',px);cx.setAttribute('x2',px);cx.style.opacity=1;
    cd.setAttribute('cx',px);cd.setAttribute('cy',py);cd.style.opacity=1;
    tip.style.opacity=1; tip.style.left=(px/W*r.width)+'px'; tip.style.top=(py/H*r.height)+'px';
    const dt=new Date(p.d).toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'});
    const tv=_priv?MASK:(curSym()+Math.abs(Math.round(val(p))).toLocaleString('en-US'));
    tip.innerHTML=`<span class="tv">${tv}</span> · ${dt}`;
  }
  svg.addEventListener('mousemove',move);
  svg.addEventListener('touchmove',move,{passive:true});
  svg.addEventListener('mouseleave',()=>{cx.style.opacity=0;cd.style.opacity=0;tip.style.opacity=0;});
}

/* ---- sparkline (per card): pixel-true, colored by DAY change, interactive hover ---- */
function sparkSvg(h){
  const sp=h.spark; if(!sp||sp.length<2) return '';
  const dayUp=(h.dayChange!=null?h.dayChange:(h.unrealizedReturn||0))>=0;   // intraday line -> day color
  const sym=h.liveCcy==='CAD'?'C$':'$';
  return `<svg class="spark" data-v="${sp.join(',')}" data-up="${dayUp?1:0}" data-sym="${sym}"></svg>`;
}
function getSpTip(){ let t=document.getElementById('sptip');
  if(!t){ t=document.createElement('div'); t.id='sptip'; document.body.appendChild(t); } return t; }
function hydrateSparks(){
  document.querySelectorAll('svg.spark[data-v]').forEach(svg=>{
    const vs=(svg.dataset.v||'').split(',').map(Number).filter(x=>!isNaN(x)); if(vs.length<2) return;
    const W=Math.max(80,Math.round(svg.clientWidth||200)), H=34, p=4;
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    const mn=Math.min(...vs), mx=Math.max(...vs);
    const X=i=>p+(i/(vs.length-1))*(W-2*p), Y=v=>p+(1-(v-mn)/(mx-mn||1))*(H-2*p);
    const col=svg.dataset.up==='1'?cvar('--up'):cvar('--down');
    const d=vs.map((v,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
    svg.innerHTML=`<path d="${d}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${X(vs.length-1).toFixed(1)}" cy="${Y(vs[vs.length-1]).toFixed(1)}" r="2.6" fill="${col}"/>
      <circle class="spcur" r="3.2" fill="${col}" stroke="${cvar('--surface')}" stroke-width="1.5" style="opacity:0"/>`;
    svg._geo={vs,X,Y,W};
    if(svg._hooked) return; svg._hooked=true;
    const tipEl=getSpTip();
    const move=e=>{
      const g=svg._geo, r=svg.getBoundingClientRect();
      const fx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
      const i=Math.max(0,Math.min(g.vs.length-1,Math.round(fx/r.width*(g.vs.length-1))));
      const cur=svg.querySelector('.spcur');
      cur.setAttribute('cx',g.X(i)); cur.setAttribute('cy',g.Y(g.vs[i])); cur.style.opacity=1;
      tipEl.style.display='block';
      tipEl.style.left=(r.left+g.X(i)/g.W*r.width)+'px'; tipEl.style.top=(r.top-6)+'px';
      tipEl.textContent=svg.dataset.sym+g.vs[i].toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});
    };
    svg.addEventListener('mousemove',move);
    svg.addEventListener('touchmove',move,{passive:true});
    svg.addEventListener('mouseleave',()=>{ svg.querySelector('.spcur').style.opacity=0; tipEl.style.display='none'; });
  });
}

/* Firebase Auth SDK loads lazily (compat build). On the CSP-locked artifact this
   fails silently — the artifact always carries baked data anyway. */
let _fbReady=null;
function fbInit(){
  if(_fbReady) return _fbReady;
  _fbReady=new Promise(res=>{
    const urls=['https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js',
                'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js'];
    let n=0;
    const next=()=>{ if(n>=urls.length){
        try{ firebase.initializeApp(FB_CFG);
          firebase.auth().onAuthStateChanged(u=>{ _user=u; onAuthChange(); });
          res(true); }catch(e){ res(false); } return; }
      const s=document.createElement('script'); s.src=urls[n++];
      s.onload=next; s.onerror=()=>res(false); document.head.appendChild(s); };
    next();
  });
  return _fbReady;
}
async function ownerSignIn(){
  const ok=await fbInit(); if(!ok) return alert('Google sign-in unavailable here');
  try{ await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  catch(e){ if(e&&e.code!=='auth/popup-closed-by-user') alert('Sign-in failed: '+(e.message||e)); }
}
function ownerSignOut(){ try{ firebase.auth().signOut(); }catch(e){} }

/* ---- Firestore REST (reads work anonymously while public; owner uses idToken) ---- */
function fsParse(j){
  const f=(j&&j.fields)||{};
  return { name:f.name?f.name.stringValue:_cfg.name,
           public:f.public?f.public.booleanValue!==false:true,
           owner:f.owner?f.owner.stringValue:'',
           data:f.data?f.data.stringValue:'' };
}
async function fsGet(withAuth){
  const h={};
  if(withAuth&&_user) h['Authorization']='Bearer '+await _user.getIdToken();
  const r=await fetch(FS_DOC+'?key='+FB_CFG.apiKey,{headers:h,cache:'no-store'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return fsParse(await r.json());
}
async function loadConfig(){
  try{
    const c=await fsGet(false);
    Object.assign(_cfg,{name:c.name,public:c.public,owner:c.owner});
  }catch(e){
    if(String(e.message).includes('403')){ _cfg.public=false; }   // private -> rules deny anon reads
    else return;                                                   // offline/CSP -> keep defaults
  }
  applyName(); applyVisibility();
  const i=document.getElementById('pnamein'); if(i) i.value=_cfg.name;
}
/* poll Firestore for the minute-fresh snapshot the cloud loop uploads — visitors get
   new engine data (~60s old) without waiting for a GitHub Pages redeploy */
async function fsDataPoll(){
  try{
    const c=await fsGet(isOwner());
    if(!c.data) return;
    const fresh=JSON.parse(c.data);
    if(fresh && fresh.generated && (!DATA.generated || fresh.generated>DATA.generated)){
      const live={};                             // keep client-side live enrichments
      DATA.holdings.forEach(h=>{ live[h.ticker]={lp:h.livePrice,dc:h.dayChange,hi:h.hi52,lo:h.lo52,sp:h.spark,pos:h.pos52}; });
      DATA=fresh;
      DATA.holdings.forEach(h=>{ const l=live[h.ticker]; if(l){ h.livePrice=l.lp; h.dayChange=l.dc; h.hi52=l.hi; h.lo52=l.lo; h.spark=l.sp; h.pos52=l.pos; } });
      Object.assign(_cfg,{name:c.name,public:c.public,owner:c.owner});
      renderKpis(); rerender(); applyName(); applyVisibility();
    }
  }catch(e){}
}
async function fsLoadData(){
  try{
    const c=await fsGet(true);
    Object.assign(_cfg,{name:c.name,public:c.public,owner:c.owner});
    if(c.data){ DATA=JSON.parse(c.data); applyName(); applyVisibility();
      document.querySelector('.wrap').style.display=''; boot(); }
  }catch(e){}
}
async function saveConfig(statusEl,name,pub){
  if(!_user){ statusEl.textContent='sign in with Google to save name/sharing'; statusEl.style.color='var(--down)'; return false; }
  try{
    const body={fields:{name:{stringValue:name},public:{booleanValue:pub!==false}}};
    const r=await fetch(FS_DOC+'?updateMask.fieldPaths=name&updateMask.fieldPaths=public&key='+FB_CFG.apiKey,
      {method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+await _user.getIdToken()},
       body:JSON.stringify(body)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    _cfg.name=name; _cfg.public=pub!==false;
    applyName(); applyVisibility();
    return true;
  }catch(e){
    statusEl.textContent=String(e.message).includes('403')?'not the owner account':'failed: '+e.message;
    statusEl.style.color='var(--down)';
    return false;
  }
}

/* ---- catalyst timeline ---- */
function catKey(w){
  w=(w||'').toLowerCase().trim();
  let m;
  if(m=w.match(/(20\d{2})-(\d{2})-(\d{2})/)) return m[1]+m[2]+m[3];          // exact date
  if(m=w.match(/(20\d{2})-(\d{2})(?!\d)/)) return m[1]+m[2]+'15';            // year-month
  if(m=w.match(/(20\d{2})[ -]*q([1-4])/)) return m[1]+['','03','06','09','12'][+m[2]]+'15';
  if(m=w.match(/q([1-4])[ -]*(20\d{2})/)) return m[2]+['','03','06','09','12'][+m[1]]+'15';
  const yr=(w.match(/(20\d{2})/)||[])[1];
  const mo={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  if(yr && (m=w.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/))){
    let d=15; if(/early/.test(w))d=5; else if(/late/.test(w))d=25;
    return yr+String(mo[m[1]]).padStart(2,'0')+String(d).padStart(2,'0');
  }
  if(yr){
    if(/h2|2h|second half/.test(w)) return yr+'0815';
    if(/h1|1h|first half/.test(w)) return yr+'0215';
    if(/\bend\b|year[- ]?end/.test(w)) return yr+'1215';
    if(/early/.test(w)) return yr+'0215';
    if(/mid/.test(w)) return yr+'0630';
    return yr+'1231';        // vague (bare year / ongoing / FY / multi-year) -> after concrete dates in that year
  }
  return '99999999';
}
function renderTimeline(){
  const today=new Date().toISOString().slice(0,10).replace(/-/g,'');
  const cats=[...DATA.catalysts]

    .sort((a,b)=>catKey(a.when).localeCompare(catKey(b.when)));

async function fetchYahoo(sym){
  // BARE path (no query string) — jina reliably proxies this; querystring URLs get
  // rate-blocked. Default range is 1d intraday, so we get a live today-sparkline +
  // meta.chartPreviousClose for the day-change.
  const url=JINA+"https://query1.finance.yahoo.com/v8/finance/chart/"+sym;
  const r=await fetch(url); const t=await r.text();
  const j=t.indexOf('{"chart"'); if(j<0) throw new Error('nojson');
  const d=JSON.parse(t.slice(j)); const res=d.chart.result[0]; const m=res.meta;
  const cl=(res.indicators.quote[0].close||[]).filter(x=>x!=null);
  const step=Math.max(1,Math.floor(cl.length/40));
  const spark=[]; for(let k=0;k<cl.length;k+=step) spark.push(+cl[k].toFixed(4));
  if(cl.length && spark[spark.length-1]!==+cl[cl.length-1].toFixed(4)) spark.push(+cl[cl.length-1].toFixed(4));
  return {price:m.regularMarketPrice, prevClose:m.chartPreviousClose,
          hi52:m.fiftyTwoWeekHigh, lo52:m.fiftyTwoWeekLow, spark, ccy:m.currency};
}

  let any=false;

    any=true; const h=secs[idx], y=r.value;
    h.livePrice=+y.price.toFixed(y.price<1?4:2);
    const pc=y.prevClose||y.price;
    h.dayChange = pc? +(((y.price-pc)/pc)*100).toFixed(2):0;
    if(y.hi52) h.hi52=y.hi52; if(y.lo52) h.lo52=y.lo52;
    if(h.hi52&&h.lo52&&h.hi52>h.lo52) h.pos52=+(((y.price-h.lo52)/(h.hi52-h.lo52))*100).toFixed(1);

async function refreshParqet(){
  const r=await fetch("https://api.parqet.com/v1/portfolios/assemble?useInclude=true&include=xirr&include=ttwror",
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({portfolioIds:[DATA.portfolioId],timeframe:"max",currency:"USD"})});
  if(!r.ok) return;
  const j=await r.json();
  const byId={}; (j.holdings||[]).forEach(h=>{ if(h.position&&h.position.currentValue>0) byId[h._id]=h; });
  // NOTE: ALL portfolio-level figures (returns, realized/unrealized gains) come from
  // the PP-exact engine (pp_sync.py over depot.xml) and are NOT overwritten by
  // Parqet anymore (Rafael 2026-07-11: "Parqet rechnet falsch"). Parqet is only
  // used for live per-holding market values below.
  // per-holding from Parqet (cash + NVO option stay as built from Portfolio Performance)
  DATA.holdings.forEach(h=>{
    const pq=byId[h.pid]; if(!pq) return;
    h.value=Math.round(pq.position.currentValue);
    const up=pq.performance&&pq.performance.unrealized;
    if(up){ h.unrealizedReturn=+up.returnNet.toFixed(1); h.totalGainNet=Math.round(up.gainNet); }
  });
  // total = live Parqet securities + PP option + PP net cash (can be negative = margin)
  DATA.totalValue=Math.round(DATA.holdings.reduce((s,h)=>s+h.value,0));
  DATA.cashPct=+(100*DATA.cashValue/DATA.totalValue).toFixed(1);
  DATA.holdings.forEach(h=>{ h.alloc=+(100*h.value/DATA.totalValue).toFixed(1); });
  liveState.lastParqet=new Date();
  renderKpis(); renderHoldingsTable(); renderAlloc(); renderPerfBars(); renderHoldings(); setBadge();
}

      if(!NEWS_DOMAINS.has(dom)) return;
      const title=(art.title||'').trim(); if(title.length<15) return;
      if(NEWS_JUNK.test(title)) return;
      if(first && !title.toLowerCase().includes(first)) return;   // company must appear in the headline
      all.push({ticker:h.ticker, headline:title, url:art.url, source:dom, date:gdeltDate(art.seendate)});
    });
  });
  // Merge fresh GDELT headlines on top of the curated research feed (curated is
  // always substantive; GDELT adds whatever is newer). Dedupe by title, newest first.
  const combined=[...all, ...DATA.latestNews];
  combined.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const seen=new Set(), dedup=[], perTkDay={};
  for(const n of combined){ const k=(n.headline||'').slice(0,55).toLowerCase().replace(/[^a-z0-9]/g,'');
    if(!k||seen.has(k))continue; seen.add(k);
    const dk=n.ticker+'|'+(n.date||'');                        // cap per ticker per DAY, not overall
    if((perTkDay[dk]=(perTkDay[dk]||0)+1)>5)continue;
    dedup.push(n); if(dedup.length>=25)break; }
  liveState.news=dedup; liveState.lastNews=new Date();
  renderFeed(); setBadge();
}

function relTime(iso){
  const then=new Date(iso).getTime(), now=Date.now(), m=Math.round((now-then)/60000);
  if(m<1)return 'now'; if(m<60)return m+'m'; const h=Math.round(m/60); if(h<24)return h+'h'; return Math.round(h/24)+'d';
}
const ST_SYM={PINK:"PYNKF"};   // Perimeter trades as PYNKF on Stocktwits
async function fetchStocktwits(tk){
  const r=await fetch(JINA+"https://api.stocktwits.com/api/2/streams/symbol/"+(ST_SYM[tk]||tk)+".json");
  const t=await r.text(); const i=t.indexOf('{"symbol"'); if(i<0) throw new Error('no');
  const d=JSON.parse(t.slice(i)); return d.messages||[];
}
function cleanBody(s){
  // Stocktwits ships HTML entities + raw links — decode the entities, drop the URLs
  return (s||'').replace(/&#39;|&apos;/g,"'").replace(/&quot;/g,'"').replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>').replace(/&amp;/g,'&')
    .replace(/https?:\/\/\S+/g,'').replace(/\s{2,}/g,' ').trim();
}
function renderSocial(){

  }).join('');

let _socialBusy=false, _socialRetry=[];
async function refreshSocial(){
  // FULL SWEEP per cycle: the jina proxy 429s parallel bursts but tolerates a
  // sequential drip (~1.2s gap). Sweep ALL tickers each cycle; 429'd tickers go
  // to the front of the next sweep. Per-ticker cache -> feed always merged/fresh.
  if(_socialBusy) return; _socialBusy=true;
  try{
    const secs=DATA.holdings.filter(h=>h.assetType!=='cash').map(h=>h.ticker);   // option = underlying's Stocktwits
    const order=[..._socialRetry.filter(t=>secs.includes(t)), ...secs.filter(t=>!_socialRetry.includes(t))];
    _socialRetry=[];
    liveState.socialBy=liveState.socialBy||{};
    let dirty=false;
    for(const tk of order){
      try{
        const a=await fetchStocktwits(tk);
        const msgs=[];
        a.forEach(m=>{
          const body=(m.body||'').trim();
          if((body.match(/\$[A-Za-z.]+/g)||[]).length>4) return;   // spammy multi-ticker blasts
          if(body.length<8) return;
          msgs.push({ticker:tk, user:m.user&&m.user.username, body,
            time:m.created_at, sentiment:m.entities&&m.entities.sentiment&&m.entities.sentiment.basic,
            likes:(m.likes&&m.likes.total)||0});
        });
        if(msgs.length){ liveState.socialBy[tk]=msgs; dirty=true; }
        else _socialRetry.push(tk);                                 // 429/empty -> first next cycle
      }catch(e){ _socialRetry.push(tk); }
      await new Promise(r=>setTimeout(r,1200));
    }
    if(dirty||Object.keys(liveState.socialBy).length){
      const all=Object.values(liveState.socialBy).flat();
      all.sort((a,b)=>new Date(b.time)-new Date(a.time));
      liveState.social=all.slice(0,40); liveState.lastSocial=new Date();
      try{localStorage.setItem('pc-social',JSON.stringify(liveState.socialBy));}catch(e){}
      renderSocial(); setBadge();
    }
  } finally { _socialBusy=false; }
}
function loadSocialCache(){
  // Instant-full feed on open: start from the baked-in snapshot (hourly job),
  // overlay any newer localStorage cache, live sweep refreshes from there.
  liveState.socialBy = Object.assign({}, DATA.social||{});
  try{ const by=JSON.parse(localStorage.getItem('pc-social')||'null');
    if(by) for(const [tk,msgs] of Object.entries(by)){

      if(!cur || (msgs[0]&&cur[0]&&new Date(msgs[0].time)>new Date(cur[0].time))) liveState.socialBy[tk]=msgs;
    }
  }catch(e){}
  const all=Object.values(liveState.socialBy).flat();
  if(all.length){ all.sort((a,b)=>new Date(b.time)-new Date(a.time)); liveState.social=all.slice(0,40); }
}

/* ===== SEC EDGAR live filing watcher — INSTANT IR alerts =====================
   Every material filing (8-K/6-K press release, offering, big stake) hits SEC
   EDGAR within minutes of publication. We poll data.sec.gov via the jina proxy,
   detect new filings, and fire: a sticky BREAKING banner + a top-of-feed item +
   a desktop notification (works even when this tab is backgrounded). */
// CIK map is built dynamically by build.py from SEC's ticker directory, so any newly
// bought US ticker is watched automatically (no manual list to maintain).
let SEC_CIK={};   // filled in boot() — DATA may still be encrypted at parse time
const SEC_FORMS={"8-K":"material event","6-K":"material event","424B5":"offering","424B3":"offering",
  "424B4":"offering","FWP":"offering","S-1":"registration","S-1/A":"registration",
  "SC 13D":"activist stake","SC 13D/A":"activist stake","SC 13G":"5%+ stake"};
async function fetchSec(cik){
  const r=await fetch(JINA+"https://data.sec.gov/submissions/CIK"+cik+".json");
  const t=await r.text(); const i=t.indexOf('{"cik"'); if(i<0) throw new Error('blocked');
  const d=JSON.parse(t.slice(i)); const f=d.filings.recent; const out=[];
  for(let k=0;k<Math.min(20,(f.form||[]).length);k++){
    if(SEC_FORMS[f.form[k]]) out.push({form:f.form[k],acc:f.accessionNumber[k],date:f.filingDate[k],
      time:f.acceptanceDateTime[k]||f.filingDate[k],desc:f.primaryDocDescription[k]||""});
  }
  return out;
}
function secUrl(cik,acc){ return "https://www.sec.gov/Archives/edgar/data/"+String(+cik)+"/"+acc.replace(/-/g,'')+"/"; }

async function refreshSEC(){
  if(_secBusy) return; _secBusy=true;
  try{
    const tickers=Object.keys(SEC_CIK);
    if(_secSeen===null){
      // first run: silent baseline sweep of ALL tickers (don't alert on history)
      _secSeen=_loadSeen(); const cold=_secSeen.size===0;
      for(const tk of tickers){
        try{(await fetchSec(SEC_CIK[tk])).forEach(fl=>{ if(cold) _secSeen.add(fl.acc); });}catch(e){}
        await new Promise(r=>setTimeout(r,1000));
      }
      _saveSeen(); return;
    }
    const batch=[]; for(let k=0;k<3;k++) batch.push(tickers[(_secIdx+k)%tickers.length]);
    _secIdx=(_secIdx+3)%tickers.length;
    for(const tk of batch){

        if(_secSeen.has(fl.acc)) continue; _secSeen.add(fl.acc); alertSec(tk,fl); } }catch(e){}

  } finally { _secBusy=false; }
}
