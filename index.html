<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Rafael's Portfolio</title>
<style>
  :root{
    --plane:#f4f5f2; --surface:#fcfcfb; --surface-2:#f7f7f4;
    --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
    --grid:#e6e5df; --line:#c9c8c1; --border:rgba(11,11,11,.10);
    --up:#0a7a24; --up-bg:rgba(10,122,36,.10);
    --down:#c62f2f; --down-bg:rgba(198,47,47,.10);
    --accent:#2a78d6;
    --chip:#eef0ee; --chip-ink:#3a3a37;
    --confirmed:#0a7a24; --tentative:#a98600;
  }
  :root[data-theme="dark"]{ color-scheme:dark; }
  @media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --plane:#0d0d0d; --surface:#181817; --surface-2:#201f1e;
    --ink:#f4f3ef; --ink-2:#c3c2b7; --muted:#8f8d86;
    --grid:#2c2c2a; --line:#3a3a37; --border:rgba(255,255,255,.12);
    --up:#37c24d; --up-bg:rgba(55,194,77,.14);
    --down:#f0625f; --down-bg:rgba(240,98,95,.14);
    --accent:#3987e5;
    --chip:#262624; --chip-ink:#cfcec6;
    --confirmed:#37c24d; --tentative:#e0b23a;
  }}
  :root[data-theme="dark"]{
    --plane:#0d0d0d; --surface:#181817; --surface-2:#201f1e;
    --ink:#f4f3ef; --ink-2:#c3c2b7; --muted:#8f8d86;
    --grid:#2c2c2a; --line:#3a3a37; --border:rgba(255,255,255,.12);
    --up:#37c24d; --up-bg:rgba(55,194,77,.14);
    --down:#f0625f; --down-bg:rgba(240,98,95,.14);
    --accent:#3987e5;
    --chip:#262624; --chip-ink:#cfcec6;
    --confirmed:#37c24d; --tentative:#e0b23a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--plane);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 16px 64px}
  .tnum{font-variant-numeric:tabular-nums}

  header.top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .title{font-size:22px;font-weight:680;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
  .title .dot{width:11px;height:11px;border-radius:50%;background:var(--accent)}
  .sub{color:var(--muted);font-size:13px}
  .sub b{color:var(--ink-2);font-weight:600}
  .themebtn{border:1px solid var(--border);background:var(--surface);color:var(--ink-2);
    border-radius:8px;padding:6px 11px;font-size:13px;cursor:pointer;font-family:inherit}
  .themebtn:hover{background:var(--surface-2)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px}
  .tile .lab{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .tile .val{font-size:26px;font-weight:680;margin-top:6px;letter-spacing:-.4px}
  .tile .note{font-size:12.5px;color:var(--ink-2);margin-top:3px}
  .up{color:var(--up)} .down{color:var(--down)}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:16px}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
    font-weight:660;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .panel h2 .live{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 0 3px var(--up-bg)}
  .cols{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;align-items:start}
  .cols.eq{grid-template-columns:1fr 1fr;align-items:stretch}
  .cols.eq .panel{display:flex;flex-direction:column}
  .cols.eq .panel>div:last-child{flex:1;display:flex;flex-direction:column;justify-content:center}

  /* portfolio chart */
  .chartbox{position:relative}
  svg.line{display:block;width:100%;height:210px;overflow:visible}
  .cross{stroke:var(--line);stroke-width:1}
  .tip{position:absolute;pointer-events:none;background:var(--ink);color:var(--surface);
    padding:6px 9px;border-radius:7px;font-size:12.5px;transform:translate(-50%,-125%);
    white-space:nowrap;opacity:0;transition:opacity .08s;z-index:5}
  .tip .tv{font-weight:680}

  /* latest news feed */
  .feed{display:flex;flex-direction:column}
  .feed .fi{display:grid;grid-template-columns:78px 1fr;gap:12px;padding:11px 2px;border-top:1px solid var(--grid)}
  .feed .fi:first-child{border-top:0}
  .feed .fd{font-size:11.5px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;padding-top:2px}
  .feed .ft{font-size:14px;font-weight:600;line-height:1.4}
  .feed .ft a{text-decoration:none;border-bottom:1px solid var(--border)}
  .feed .ft a:hover{border-bottom-color:var(--accent);color:var(--accent)}
  .feed .fs{font-size:12.5px;color:var(--ink-2);margin-top:3px}
  .feed .fm{font-size:11.5px;color:var(--muted);margin-top:3px}
  .tkr{font-weight:700;font-size:11px;padding:1px 6px;border-radius:4px;color:#fff;vertical-align:middle}
  .tkr.neutral{background:var(--chip);color:var(--chip-ink)}
  .tkr.sec{background:var(--down);color:#fff}
  .social .si{display:block;padding:10px 2px;border-top:1px solid var(--grid)}
  .social .si:first-child{border-top:0}
  .social .sm{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .social .su{font-size:12px;font-weight:600;color:var(--ink-2)}
  .social .stime{font-size:11px;color:var(--muted);margin-left:auto}
  .social .sb{font-size:13px;line-height:1.4}
  .social .sent{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px}
  .social .sent.bull{background:var(--up-bg);color:var(--up)}
  .social .sent.bear{background:var(--down-bg);color:var(--down)}
  /* PP total-portfolio strip */
  .pprow{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start}
  .ppstat .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .ppstat .val{font-size:19px;font-weight:680;margin-top:3px}
  .ppstat .note{font-size:11.5px;color:var(--muted);margin-top:1px}
  .ppyears{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;margin-left:auto}
  .ppy{text-align:center;background:var(--surface-2);border-radius:8px;padding:6px 10px}
  .ppy .y{font-size:10.5px;color:var(--muted);font-weight:600}
  .ppy .r{font-size:13px;font-weight:680;margin-top:1px}
  .feedmax{max-height:560px;overflow-y:auto;scrollbar-width:thin}
  .feedmax::-webkit-scrollbar{width:6px}
  .feedmax::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

  /* allocation donut (interactive) */
  .donutwrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  .donut{width:230px;height:230px;flex:none}
  .donut path{transition:opacity .12s;cursor:pointer}
  .donut.hashot path{opacity:.28}
  .donut.hashot path.hot{opacity:1}
  .legend2{flex:1;min-width:200px;display:flex;flex-direction:column}
  .lg2{display:flex;align-items:center;gap:9px;padding:6px 7px;border-top:1px solid var(--grid);font-size:12.5px;border-radius:7px;cursor:default}
  .lg2:first-child{border-top:0}
  .lg2.hot{background:var(--surface-2)}
  .lg2 .dot{width:8px;height:8px;border-radius:2px;flex:none}
  .lg2 .lt{font-weight:650}
  .lg2 .lv{margin-left:auto;color:var(--muted);font-variant-numeric:tabular-nums}
  .lg2 .lp{width:52px;text-align:right;font-weight:650;font-variant-numeric:tabular-nums}
  /* performance by holding */
  .pf{display:flex;align-items:center;gap:10px;margin:7px 0}
  .pf .pft{width:48px;font-size:12.5px;font-weight:640;color:var(--ink-2)}
  .pfbar{flex:1;height:16px;position:relative;background:var(--surface-2);border-radius:4px}
  .pfmid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
  .pffill{position:absolute;top:2px;bottom:2px;border-radius:3px;min-width:2px}
  .pf .pfv{width:56px;text-align:right;font-size:12.5px;font-weight:640}

  /* timeline */
  .tl{display:flex;flex-direction:column;gap:2px;max-height:360px;overflow-y:auto}
  .tl-item{display:grid;grid-template-columns:76px 1fr;gap:10px;padding:8px 4px;border-top:1px solid var(--grid)}
  .tl-item:first-child{border-top:0}
  .tl-when{font-size:12px;color:var(--ink-2);font-weight:600;line-height:1.35}
  .tl-when .cf{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .tl-body .lb{font-size:13.5px;font-weight:600}
  .tl-body .lb .tkr{margin-right:6px}
  .tl-body .dt{font-size:12.5px;color:var(--muted);margin-top:1px}

  /* holdings */
  .hgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 16px;display:flex;flex-direction:column}
  .chead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .cname{display:flex;align-items:center;gap:9px;min-width:0}
  .cname .bd{width:10px;height:10px;border-radius:50%;flex:none}
  .cname .tk{font-size:16px;font-weight:720;letter-spacing:-.2px}
  .cname .nm{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cvals{text-align:right;flex:none}
  .cvals .px{font-size:15px;font-weight:660}
  .cvals .dc{font-size:12.5px;font-weight:640;margin-top:1px}
  .sparkrow{display:flex;align-items:center;gap:10px;margin:11px 0 2px}
  svg.spark{height:34px;flex:1;overflow:visible}
  .rng{width:120px;flex:none}
  .rng .rtrack{height:5px;background:var(--surface-2);border-radius:3px;position:relative;margin:8px 0 3px}
  .rng .rdot{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid var(--surface)}
  .rng .rlab{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .thesis{font-size:12.5px;color:var(--muted);margin:9px 0 0}
  .metaline{display:flex;gap:14px;margin:9px 0 2px;font-size:12px;color:var(--ink-2);flex-wrap:wrap}
  .metaline b{color:var(--ink);font-weight:660}
  .pulse{font-size:13px;color:var(--ink-2);background:var(--surface-2);border-radius:9px;padding:10px 11px;margin:10px 0 0;line-height:1.5}
  .seclab{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:660;margin:14px 0 7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--chip);color:var(--chip-ink);border-radius:20px;padding:4px 10px;font-size:12px;line-height:1.3;display:inline-flex;align-items:center;gap:5px}
  .chip .cf{width:7px;height:7px;border-radius:50%;flex:none}
  .chip .cw{font-weight:680}
  .news{list-style:none;margin:6px 0 0;padding:0;display:flex;flex-direction:column}
  .news li{padding:9px 0;border-top:1px solid var(--grid)}
  .news li:first-child{border-top:0}
  .news .nh{display:flex;gap:9px;align-items:baseline}
  .news .nd{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
  .news .nt{font-size:13.5px;font-weight:600;line-height:1.4}
  .news .nt a{text-decoration:none;border-bottom:1px solid var(--border)}
  .news .nt a:hover{border-bottom-color:var(--accent);color:var(--accent)}
  .news .ns{font-size:12.5px;color:var(--ink-2);margin-top:3px}
  .news .src{font-size:11.5px;color:var(--muted);margin-top:2px}
  .links{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;padding-top:12px;border-top:1px solid var(--grid)}
  .lk{font-size:12px;font-weight:600;text-decoration:none;border:1px solid var(--border);
    border-radius:7px;padding:5px 10px;color:var(--ink-2)}
  .lk:hover{border-color:var(--accent);color:var(--accent)}
  .chart-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  #chart-ret{font-size:13px;font-weight:600;margin-left:8px}
  #chart-ret .rv{font-weight:720}
  #chart-ret .rl{color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:11px}
  .tfsel{display:flex;gap:2px;background:var(--surface-2);border-radius:8px;padding:3px}
  .tfsel button{border:0;background:none;color:var(--ink-2);font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
  .tfsel button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .tfsel button:hover:not(.on){color:var(--ink)}
  /* activities */
  .act{display:grid;grid-template-columns:86px 78px 26px 1fr auto;gap:10px;align-items:center;padding:9px 2px;border-top:1px solid var(--grid);font-size:13px}
  .alogo{width:26px;height:26px;border-radius:7px;object-fit:contain;background:#fff;border:1px solid var(--border);display:block}
  .hlogo{width:30px;height:30px;border-radius:8px;object-fit:contain;background:#fff;border:1px solid var(--border);flex:none}
  .plogo{width:18px;height:18px;border-radius:5px;object-fit:contain;background:#fff;border:1px solid var(--border);flex:none}
  .nlogo{width:16px;height:16px;border-radius:4px;object-fit:contain;background:#fff;border:1px solid var(--border);vertical-align:-3px;margin-right:5px;display:inline-block}
  .llogo{width:16px;height:16px;border-radius:4px;object-fit:contain;background:#fff;border:1px solid var(--border);flex:none}
  .cname .tk .bd{display:inline-block;margin-right:6px;vertical-align:1px}
  .act:first-child{border-top:0}
  .act .ad{color:var(--muted);font-size:11.5px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .atype{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;text-align:center;letter-spacing:.3px}
  .atype.buy{background:var(--up-bg);color:var(--up)}
  .atype.sell{background:var(--down-bg);color:var(--down)}
  .atype.div{background:rgba(42,120,214,.12);color:var(--accent)}
  .atype.oth{background:var(--chip);color:var(--chip-ink)}
  .act .amain{min-width:0}
  .act .aname{font-weight:640}
  .act .asub{font-size:11.5px;color:var(--muted)}
  .act .aval{text-align:right;font-weight:640;white-space:nowrap}
  .act .aval .fee{display:block;font-size:10.5px;color:var(--muted);font-weight:500}
  .breaking{position:sticky;top:8px;z-index:30;background:var(--down);color:#fff;padding:10px 14px;
    border-radius:11px;margin-bottom:14px;display:none;align-items:center;gap:9px;font-size:13.5px;font-weight:600;
    box-shadow:0 6px 22px rgba(198,47,47,.35)}
  .breaking a{color:#fff;text-decoration:underline;font-weight:700}
  .breaking .x{margin-left:auto;cursor:pointer;opacity:.85;font-weight:800;padding:0 4px}
  .secbtn{border:1px solid var(--border);background:var(--surface);color:var(--ink-2);border-radius:8px;
    padding:6px 11px;font-size:13px;cursor:pointer;font-family:inherit;margin-right:8px}
  .secbtn:hover{background:var(--surface-2)}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.4px;vertical-align:middle;margin-right:4px}
  .badge.snap{background:var(--chip);color:var(--muted)}
  .badge.live{background:var(--up-bg);color:var(--up)}
  .badge.live .pulse-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--up);margin-right:5px;vertical-align:middle;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media(prefers-reduced-motion:reduce){.badge.live .pulse-dot{animation:none}}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:26px;line-height:1.6}
  .morebtn{background:none;border:0;color:var(--accent);font-size:12.5px;font-weight:600;cursor:pointer;padding:8px 0 0;font-family:inherit}

  @media(max-width:860px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .cols,.cols.eq{grid-template-columns:1fr}
    .hgrid{grid-template-columns:1fr}
    .wrap{padding:16px 12px 48px}
    .sparkrow{flex-direction:column;align-items:stretch;gap:8px}
    .rng{width:auto}
  }
</style>

<div class="wrap">
  <div class="breaking" id="breaking"></div>
  <header class="top">
    <div>
      <div class="title"><span class="dot"></span>Rafael's Portfolio</div>
      <div class="sub"><span id="livebadge" class="badge snap">Snapshot</span> As of <b id="asof"></b> · <span id="hcount"></span> positions</div>
    </div>
    <div><button class="secbtn" id="secalertbtn" style="display:none">🔔 SEC alerts</button><button class="themebtn" id="themebtn">Theme</button></div>
  </header>

  <div class="kpis" id="kpis"></div>

  <div class="cols">
    <div class="panel">
      <h2><span class="live"></span>Latest News</h2>
      <div class="feed" id="feed"></div>
    </div>
    <div class="panel">
      <h2><span class="live"></span>Social buzz · Stocktwits</h2>
      <div class="feed social" id="social"></div>
    </div>
  </div>

  <div class="panel">
    <div class="chart-head">
      <h2 style="margin:0">Portfolio Value <span id="chart-ret"></span></h2>
      <div class="tfsel" id="tfsel"></div>
    </div>
    <div class="chartbox">
      <svg class="line" id="chart" preserveAspectRatio="none"></svg>
      <div class="tip" id="tip"></div>
    </div>
  </div>

  <div class="cols eq">
    <div class="panel">
      <h2>Allocation</h2>
      <div id="allocdonut"></div>
    </div>
    <div class="panel">
      <h2>Performance by Holding</h2>
      <div id="perfbars"></div>
    </div>
  </div>

  <div class="cols">
    <div class="panel" style="grid-column:1 / -1">
      <h2><span class="live"></span>Activities</h2>
      <div class="feedmax" id="activities"></div>
      <button class="morebtn" id="actmore" style="display:none">Load more</button>
    </div>
  </div>

  <div class="panel" style="background:none;border:0;padding:0">
    <h2 style="margin-left:2px">Positions &amp; News</h2>
    <div class="hgrid" id="holdings"></div>
  </div>

  <div class="foot" id="foot"></div>

pzTExONEhhUVZ2Y2F1WC1GWkNsZTJra0hvdWRoSzNTRDRsaEU1amxNSjBWSlVEdEI5?oc=5", "summary": "Roche discontinued both of its Huntington's disease programs after clinical results showed biomarker changes did not translate into patient benefit. This clears a major competitor from the HD field ahead of uniQure's planned Q3 AMT-130 BLA, but also renews scrutiny of how well surrogate readouts predict clinical outcomes in Huntington's."}, {"date": "2026-07-10", "headline": "Mizuho raises uniQure stock price target to $68 on FDA meeting optimism", "source": "Investing.com", "url": "https://www.investing.com/equities/uniqure-nv", "summary": "Mizuho lifted its price target from $35 to $68, citing positive FDA feedback on the accelerated-approval pathway. It joins a wave of sharp target hikes (RBC ~$65, H.C. Wainwright ~$80, Stifel $71) after the June re-rating. Sell-side sentiment has flipped decisively bullish."}, {"date": "2026-07-09", "headline": "uniQure soars as Cantor upgrades on plans to seek gene therapy nod", "source": "MSN / Investing.com", "url": "https://www.pharmaceutical-technology.com/news/uniqure-to-seek-approval-of-huntingtons-gene-therapy-after-fda-u-turn/", "summary": "Cantor Fitzgerald upgraded the stock as uniQure moves to concretely prepare the AMT-130 BLA. It underscores that analyst sentiment has clearly turned positive following the FDA pivot. Momentum remains strong into the Q3 filing window."}, {"date": "2026-06-25", "headline": "uniQure Closes Upsized $259 Million Public Offering", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/06/25/3317934/0/en/uniqure-announces-closing-of-upsized-public-offering-and-full-exercise-by-underwriters-of-option-to-purchase-additional-shares.html", "summary": "uniQure closed ~5.69M shares at $45.50 for ~$259M gross after underwriters fully exercised the overallotment. Proceeds fund AMT-130 commercialization readiness, a potential launch, and the confirmatory study. The raise de-risks the balance sheet ahead of the costly BLA phase but adds dilution."}, {"date": "2026-06-17", "headline": "uniQure Announces Plan for BLA Submission for AMT-130 in Huntington's Disease", "source": "GlobeNewswire (uniQure PR)", "url": "https://www.stocktitan.net/news/QURE/uni-qure-announces-plan-for-bla-submission-for-amt-130-in-huntington-jh4bm1tmrf3p.html", "summary": "The pivotal event: the FDA now agrees the ~3-year Phase I/II data can serve as the primary basis for a BLA seeking accelerated approval, reversing prior friction with the agency. Submission is planned for Q3 2026, and the stock jumped roughly +78% on the day. AMT-130 holds RMAT, Breakthrough Therapy and Fast Track designations."}, {"date": "2026-06-17", "headline": "FDA Allows AMT-130 Data to Support Planned BLA; UK MHRA filing also planned", "source": "NeurologyLive", "url": "https://www.neurologylive.com/view/fda-allows-amt-130-huntington-disease-data-support-planned-bla-submission-under-accelerated-approval-pathway", "summary": "The high-dose AMT-130 cohort met its primary endpoint at 3 years with 75% slowing of cUHDRS progression versus Enroll-HD external controls. The FDA aims to pre-align on a confirmatory study, potentially using a concurrent standard-of-care control instead of a sham surgery. uniQure also plans a parallel UK MHRA marketing application, opening a second approval market."}, {"date": "2026-06-12", "headline": "uniQure hit by wave of high-level insider stock sales ahead of FDA news", "source": "TipRanks", "url": "https://www.tipranks.com/stocks/qure/insider-trading", "summary": "Several directors and officers sold shares on June 11-12, including a CCO sale of ~16,000 shares near $27 - just before the FDA-driven jump. On a 12-month basis insiders have net sold materially more than bought. A mildly dampening governance signal against an otherwise euphoric tape."}], "catalysts": [{"when": "2026-07-28", "label": "Q2 2026 earnings (est.)", "detail": "uniQure reports second-quarter results; watch BLA progress, post-raise cash runway, and commercial-readiness spend. Consensus around -$0.75 EPS. Date estimated from historical pattern.", "confirmed": false}, {"when": "2026-Q3", "label": "AMT-130 BLA submission (FDA)", "detail": "The key driver: uniQure plans to file the BLA for AMT-130 in Huntington's under the accelerated-approval pathway in Q3 2026.", "confirmed": true}, {"when": "2026-Q3", "label": "UK MHRA marketing application", "detail": "Parallel marketing authorization application to the UK MHRA based on the same 3-year data, opening a second approval market.", "confirmed": false}, {"when": "2026-Q3", "label": "FDA confirmatory-study design alignment", "detail": "Pre-alignment with the FDA on the required post-approval confirmatory trial, potentially using a concurrent standard-of-care control rather than a sham procedure.", "confirmed": false}, {"when": "2027", "label": "Potential accelerated approval / PDUFA", "detail": "If the BLA is accepted with priority review, an FDA decision on the first-ever Huntington's gene therapy could land in 2027.", "confirmed": false}], "pulse": "QURE's story flipped completely after the June 17 FDA agreement: the agency accepted the ~3-year AMT-130 data (75% slowing of cUHDRS) as the basis for an accelerated-approval BLA, sending shares up ~78% and triggering a wave of upgrades (Mizuho $68, RBC ~$65, H.C. Wainwright ~$80). Management moved fast to lock in ~$259M via an upsized offering, removing balance-sheet risk ahead of a potential first commercial launch while adding dilution. The setup is now catalyst-rich and binary, hinging on the Q3 2026 BLA filing, the parallel UK MHRA application, and confirmatory-study alignment, with the ~July 28 Q2 print as the next checkpoint. Sentiment is euphoric and first-mover optimism is high, though insider selling into the run and rich targets warrant caution. This trades as a regulatory-momentum story stock, highly volatile and event-driven rather than fundamentals-driven."}, ry supplier beneficiary of uniQure's AMT-130 progress. It reflects growing analyst confidence after the FDA news, though it leaves the stock's valuation heavily dependent on partner execution."}, {"date": "2026-06-17", "headline": "uniQure plans Q3 2026 BLA for AMT-130 after FDA accepts 3-year data for accelerated approval", "source": "GlobeNewswire / uniQure", "url": "https://www.globenewswire.com/news-release/2026/06/17/3313322/0/en/uniqure-announces-plan-for-bla-submission-for-amt-130-in-huntington-s-disease.html", "summary": "In a Type B meeting the FDA said the 3-year Phase I/II analysis is acceptable as the primary basis for a BLA under accelerated approval for AMT-130 in Huntington's disease, with submission planned for Q3 2026. AMT-130 is delivered directly into the brain via ClearPoint's SmartFlow cannula and navigation platform, so CLPT benefits directly as the delivery partner. Both stocks surged, with CLPT up roughly 26-32% intraday - the single biggest catalyst of the period."}, {"date": "2026-05-27", "headline": "ClearPoint enters 10-year focused-ultrasound partnership with Sungkyunkwan University, South Korea", "source": "ACCESS Newswire / ClearPoint IR", "url": "https://ir.clearpointneuro.com/", "summary": "The decade-long collaboration develops focused ultrasound for blood-brain-barrier opening, expanding ClearPoint's drug-delivery ecosystem and deepening its footprint in Asia. It is a strategic, long-dated bet that broadens the addressable market beyond MRI-guided direct injection, with limited near-term revenue impact."}, {"date": "2026-05-13", "headline": "Q1 2026 results: record $12.1M revenue (+43% YoY), FY guide $52-56M; Velocity Alpha MR drill earns CE mark", "source": "StockTitan / ClearPoint IR", "url": "https://www.stocktitan.net/news/CLPT/clear-point-neuro-reports-first-quarter-2026-ikpfdd0o41q8.html", "summary": "Record quarterly revenue of about $12.1M grew 43% year over year (16% organic, boosted by IRRAflow), though revenue and EPS of $(0.32) missed estimates. Management reaffirmed FY2026 revenue guidance of $52-56M with an installed base now above 175 centers, and the CE-marked Velocity Alpha MR high-speed surgical drill (later used clinically for the first time) extended the neurosurgery hardware portfolio."}], "catalysts": [{"when": "2026-08-11", "label": "Q2 2026 earnings (after market close)", "detail": "Next quarterly report; watch organic growth, IRRAflow integration, cash burn and confirmation of the $52-56M FY guide. Date follows the historical mid-August cadence and is not yet formally confirmed.", "confirmed": false}, {"when": "2026-Q3", "label": "uniQure AMT-130 BLA submission", "detail": "uniQure plans to file the BLA for AMT-130 in Huntington's under accelerated approval as early as Q3/October 2026; ClearPoint's SmartFlow cannula is the delivery device, making this the key partner milestone.", "confirmed": true}, {"when": "2027-mid", "label": "Potential FDA decision on AMT-130", "detail": "Assuming a Q3 2026 filing and rolling review, an FDA decision could arrive around mid-2027; approval of a first Huntington's gene therapy would establish recurring per-procedure delivery revenue for ClearPoint.", "confirmed": false}, {"when": "FY2026", "label": "Revenue guidance $52-56M", "detail": "Management's full-year target implies continued double-digit growth; meeting or raising it is viewed as a share-price catalyst.", "confirmed": true}, {"when": "2026-Q4", "label": "Velocity Alpha drill / navigation rollout", "detail": "Continued commercialization of the CE-marked, FDA-cleared Velocity Alpha MR drill and navigation systems (including the Health Canada license) into new hospital sites to drive hardware and consumable placements.", "confirmed": false}], "pulse": "CLPT's setup improved markedly over the last 45 days, driven almost entirely by partner uniQure's mid-June regulatory win: the FDA's acceptance of 3-year AMT-130 data for an accelerated-approval BLA (targeted Q3 2026) sent the stock up 26-32% and revived the platform bull case. Analysts are predominantly bullish (Lake Street Street-high at $30), yet the operating picture is mixed - record Q1 revenue and 43% growth, but a top- and bottom-line miss and an unprofitable, partner-dependent model. The biggest upside remains optionality on gene therapies reaching the market rather than standalone fundamentals. Sentiment is constructive and momentum-positive, with modest executive ESPP buying, though a director sale and the multi-year path to an actual AMT-130 approval temper enthusiasm. Near term, the August 11 Q2 print and confirmation of the uniQure BLA filing are the catalysts to watch; between partner headlines the stock tends to consolidate."}, "livePrice": 17.88, "dayChange": 3.41, "hi52": 30.1, "lo52": 8.27, "spark": [15.65, 14.65, 14.01, 14.2, 13.42, 13.94, 13.46, 13.37, 13.58, 14.15, 15.16, 9.8, 9.25, 11.32, 10.79, 9.61, 9.51, 9.39, 9.1, 9.38, 8.96, 10.38, 11.79, 10.99, 11.21, 11.18, 11.1, 12.82, 12.19, 11.13, 11.7, 11.5, 12.64, 14.32, 13.59, 13.44, 16.81, 18.53, 18.48, 18.72, 17.48, 17.88], "pos52": 44.0}, {"pid": "hld_69958ddb69baa58c8f1f8c4d", "ticker": "NRXS", "name": "Neuraxis", "assetType": "security", "value": 215100, "unrealizedReturn": 31.4, "totalGainNet": 51455, "thesis": "IB-Stim / PENFS neuromodulation (pediatrics)", "ySym": "NRXS", "gquery": "Neuraxis", "links": {"ir": "https://ir.neuraxis.com/", "stocktwits": "https://stocktwits.com/symbol/NRXS", "x": "https://x.com/search?q=%24NRXS&f=live", "finviz": "https://finviz.com/quote.ashx?t=NRXS"}, "alloc": 9.1, "logos": ["data:image/svg+xml;base64,PCEtLSBieSBUcmFkaW5nVmlldyAtLT48c3ZnIHdpZHRoPSI1NiIgaGVpZ2h0PSI1NiIgdmlld0JveD0iMCAwIDU2IDU2IiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxwYXRoIGZpbGw9IiNGMEYzRkEiIGQ9Ik0wIDBoNTZ2NTZIMHoiLz48cGF0aCBkPSJtNTEuNDUgMjUuOC4xNS0uNWMuNzYtMi40NS0xLjUzLTMuNTctMy4xNi00LjA2LTEuNTEtLjQ2LTMuMTItLjctNC42NC0uODItMS43LS4xNC0zLjQ0LS4yLTUuMjUtLjE2YTEyNC40NiAxMjQuNDYgMCAwIDAtMTIuMzMuODVsLS4wMS0uMDRjM after fresh positive rezpegaldesleukin (rezpeg) readouts in moderate-to-severe atopic dermatitis reinforced the Treg-biologic thesis. The move capped a multi-week rally driven by durable REZOLVE-AD efficacy and momentum into the Phase 3 launch. Atopic dermatitis is the lead indication underpinning most of NKTR's pipeline value.", "ticker": "NKTR"}, {"date": "2026-07-09", "headline": "Delcath Systems Announces First Patient Dosed in Phase 2 Clinical Trial of HEPZATO in Liver-Dominant Metastatic Breast Cancer", "source": "BusinessWire", "url": "https://www.businesswire.com/news/home/20260709141093/en/Delcath-Systems-Announces-First-Patient-Dosed-in-Phase-2-Clinical-Trial-of-HEPZATO-in-Liver-Dominant-Metastatic-Breast-Cancer", "summary": "First patient dosed at the European Institute of Oncology in Milan in the ~90-patient randomized DELUMA trial (NCT06875128) evaluating HEPZATO plus standard of care in HER2-negative metastatic breast cancer. Marks a key pipeline expansion beyond ocular melanoma into a much larger indication.", "ticker": "DCTH"}, {"date": "2026-07-09", "headline": "William Blair Maintains Tenax Therapeutics With Buy Rating", "source": "Futu/Moomoo", "url": "https://www.moomoo.com/news/post/TENX", "summary": "William Blair reiterated its Buy rating ahead of the LEVEL Phase 3 topline readout. Sell-side coverage remains almost uniformly bullish as the pivotal August catalyst approaches.", "ticker": "TENX"}, {"date": "2026-07-08", "headline": "NRXS Named Among 22 Biotech Stocks to Watch", "source": "TheStreet Pro", "url": "https://www.thestreet.com/", "summary": "A TheStreet Pro screen of 22 biotech/medtech names to watch featured NRXS, adding incremental retail visibility for the thinly traded micro-cap. Media commentary rather than a company event.", "ticker": "NRXS"}, {"date": "2026-07-08", "headline": "FMR LLC (Fidelity) reports 3.94M-share holding in Tenax Therapeutics", "source": "StockTitan", "url": "https://www.stocktitan.net/news/TENX/", "summary"  potential: the stock trades at 2.3x 2027e revenue, while comparable MedTech acquisitions paid 10.3x on average.", "ticker": "PINK"}, {"date": "2026-07-06", "headline": "LifeSci Capital Maintains Tenax With Buy, Raises Price Target to $35", "source": "Moomoo", "url": "https://seekingalpha.com/symbol/TENX", "summary": "LifeSci analyst Gaurav Maini reiterated a Buy and lifted the price target to $35 (after Piper Sandler's earlier move to $50), reflecting continued sell-side confidence in the levosimendan program.", "ticker": "TENX"}, {"date": "2026-07-03", "headline": "ClearPoint Neuro outlines growth ambitions in precision neurosurgery", "source": "ad-hoc-news.de", "url": "https://news.google.com/rss/search?q=ClearPoint+Neuro", "summary": "Management reiterated its multi-year roadmap across navigation, therapy delivery and its expanding biologics/drug-delivery services ecosystem. The messaging supports the reaffirmed FY2026 revenue guidance of $52-56M and reinforces the razor-and-blade model of hardware placements plus recurring per-procedure consumables.", "ticker": "CLPT"}, {"date": "2026-07-03", "headline": "NKTR Stock Clocks Best Day In Over 2 Months As Investors Await Upcoming Clinical Data In Eczema", "source": "Asianet Newsable", "url": "https://news.google.com/rss/articles/CBMi7AFBVV95cUxQQlZRdWpPeS1JRnhsejFITnhzRGZlLXF1bXg1UWdHWnZOSm5Ybi1LS2l6NFFicVU4YkhtSXJhU3JvWVBMX2dlenVqYnR5eDBRUjd3VnhSU1JTNXBrUi1hcmRRMjdKd1VYcktvX3I0bTVRbzZ3eHlBaWdDSGRTNUpObUhWM2lFVkxGdjg3R1BiSjNxTU5qVHd4NFoxSERPWG80TEI2RHdNVkFhYnJkNDVOQ1RXdVFUcDFIWTEyRWhDYWVZQ0liTnZZYmIxY01CQ0drbnZYdTJCMmtkc25VNG5rSTlNNTdHWTR5a3JsQ9IB8gFBVV95cUxPa0l0cjhoUC1CbFEzY3dVLU1GTW5wZWExR2lpLUc3dG5VT0ZtLXNZeWZTb1hObTRuMnNPR3pWcDFJXzVzRXkzQy1JLXdOeXd6UXV4WjZqNkYzcHdNdnJTY2Y1cUVCeVNTQ2ppWW4yWVhkUjVuOUJPU0U4ZkNJMlhYaF9jelJhcVg0OHhyOWtoU09wZ09lbHc1STJWM1ItQmQzWmxDRG1HeW1NNTJGcGQwRWxuUHhfbDFOcnVqc3dvZXVNdjBjVzc4OGNOeUlPTjVyWVlqZDdsb2Jhd2JUVGF4QTMwSHZXWDd1cGYwOU1TOWhSUQ", "summary": "NKTR posted its strongest single session in more than two months as traders positioned ahead of anticipated rezpeg eczema (atopic dermatitis) data and the Phase 3 launch. The rally reflected rebuilding conviction in the Treg-focused immunology pipeline after a volatile stretch. Volume and momentum signalled renewed institutional interest around the mid-year catalyst window.", "ticker": "NKTR"}, {"date": "2026-07-02", "headline": "ClearPoint executives (CEO, CBO, CFO) add ESPP shares via Form 4", "source": "Stock Titan", "url": "https://news.google.com/rss/search?q=ClearPoint+Neuro+insider", "summary": "Multiple senior officers acquired shares through the employee stock purchase plan in early July, a modest insider-alignment signal following the mid-June AMT-130 rally. The same window also saw one director-level disposition (~$388K), so the net insider read is constructive but mixed rather than uniformly bullish.", "ticker": "CLPT"}, {"date": "2026-07-02", "headline": "Tenax Therapeutics Announces Late-Breaking Presentation of LEVEL Clinical Trial Data at ESC Congress 2026", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/07/02/3321224/12401/en/tenax-therapeutics-announces-late-breaking-presentation-of-level-clinical-trial-data-at-esc-congress-2026.html", "summary": "The Phase 3 LEVEL results in PH-HFpEF secured a Late-Breaking Clinical Science slot at ESC Congress in Munich, to be presented Aug 29 by Prof. Sanjiv Shah, with topline data expected in August 2026. The prestigious venue pins the central share-price catalyst to a defined date.", "ticker": "TENX"}, {"date": "2026-07-01", "headline": "Cluster of early-July insider RSU vestings and tax-driven share sales (CMO, CEO, CFO, COO)", "source": "Investing.com / Stock Titan / Simply Wall St", "url": "https://www.investing.com/equities/lexeo-therapeutics", "summary": "Form 4/144 filings showed several executives, including the CMO (~$98.6k) and CEO, disposing of shares alongside RSU grants in early July. The sizes w const liveState = {news:null, fx:1.37, lastPrice:null, lastNews:null};
const cvar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
/* monochrome steel-blue ramp, shaded by portfolio weight (largest = deepest) */
function isDarkTheme(){
  const t=document.documentElement.getAttribute('data-theme');
  return t? t==='dark' : window.matchMedia('(prefers-color-scheme:dark)').matches;
}
function colorFor(i){
  const hs=DATA.holdings.filter(h=>h.assetType!=='cash');
  const order=[...hs].sort((a,b)=>b.value-a.value);
  const h=DATA.holdings[i];
  const rank=Math.max(0,order.findIndex(x=>x&&h&&x.ticker===h.ticker));
  const n=Math.max(1,order.length-1);
  const [l0,l1]=isDarkTheme()?[72,34]:[24,70];      // big -> deep, small -> pale
  const L=l0+(l1-l0)*rank/n;
  return `hsl(214 34% ${L.toFixed(0)}%)`;
}
const fmtUsd = n => (n<0?'-':'')+'$'+Math.abs(Math.round(n)).toLocaleString('en-US');
const fmtEur = fmtUsd; // alias (values are USD from Parqet)
const fmtE = n => (n<0?'-':'')+'€'+Math.abs(Math.round(n)).toLocaleString('en-US'); // real EUR (PP figures)
const fmtPct = n => (n>0?'+':'')+n.toFixed(1)+'%';
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const tIdx = tk => DATA.holdings.findIndex(x=>x.ticker===tk);
const enDate = s => new Date(s).toLocaleDateString('en-US',{month:'short',day:'2-digit'});

/* ---- KPI tiles ---- */
function renderKpis(){
  const d=DATA;
  // capital gains from the PP-exact FIFO engine (depot.xml), USD at tx-date FX
  const un=d.ppUnrealizedUsd!=null?d.ppUnrealizedUsd:d.netGainUnrealized;
  const rl=d.ppRealizedUsd!=null?d.ppRealizedUsd:d.realizedAllTime;
  const gn=(un||0)>=0, rz=(rl||0)>=0;
  const tiles=[
    {lab:'Portfolio Value', val:fmtUsd(d.totalValue), note:'USD · '+(d.holdings.length-1)+' positions · net cash '+fmtUsd(d.cashValue)},
    {lab:'Unrealized Gain', val:fmtUsd(un), note:'current holdings · FIFO vs cost', cls:gn?'up':'down'},
    {lab:'Realized Gain', val:fmtUsd(rl), note:'booked from sells since 2022', cls:rz?'up':'down'},
    {lab:'Return YTD', val:fmtPct(d.ttwrorYtd||0), note:'since inception (2022) '+fmtPct(d.since2022!=null?d.since2022:(d.pp&&d.pp.ppReferenceTtwror)||0)+'<br>IRR '+(d.izf||0).toFixed(1)+'%', cls:(d.ttwrorYtd||0)>=0?'up':'down'},
  ];
  document.getElementById('kpis').innerHTML = tiles.map(t=>
    `<div class="tile"><div class="lab">${t.lab}</div>
     <div class="val ${t.cls||''}">${t.val}</div><div class="note">${t.note}</div></div>`).join('');
}

/* ---- PP total-portfolio strip (from depot.xml via pp_sync.py) ---- */
function renderPP(){
  const p=DATA.pp; if(!p) return;
  const panel=document.getElementById('pppanel'); panel.style.display='';
  const fmtE=n=>'€'+Math.abs(Math.round(n)).toLocaleString('en-US');
  const sq=p.holdings.filter(h=>h.account!=='IBKR');
  const sqVal=sq.reduce((s,h)=>s+h.valueEur,0);
  const years=Object.entries(p.yearlyReturnsApprox||{}).map(([y,r])=>{
    const up=r>=0;
    return `<div class="ppy"><div class="y">${y}</div><div class="r ${up?'up':'down'}">${fmtPct(r)}</div></div>`;
  }).join('');
  document.getElementById('ppcontent').innerHTML=`
    <div class="ppstat"><div class="lab">Total securities</div><div class="val">${fmtE(p.totalSecuritiesEur)}</div>
      <div class="note">${p.holdings.length} positions · both accounts</div></div>
    <div class="ppstat"><div class="lab">TTWROR since 2022</div><div class="val up">+${p.ppReferenceTtwror.toFixed(1)}%</div>
      <div class="note">PP app ${esc(p.ppReferenceDate)} · auto-approx ${fmtPct(p.ttwrorApproxSince2022)}</div></div>
    <div class="ppstat"><div class="lab">Dividend sleeve (SQ)</div><div class="val">${fmtE(sqVal)}</div>
      <div class="note">${sq.length} positions</div></div>
    <div class="ppyears">${years}</div>`;
}

/* ---- portfolio net-worth chart (PP engine over depot.xml — NOT Parqet) ---- */
function tfStartDate(k){
  const s=DATA.chartPP||[]; if(!s.length) return '';
  const last=s[s.length-1].d;
  if(k==='ytd') return last.slice(0,4)+'-01-01';
  const days={'1y':365,'6m':182,'3m':91,'1m':30}[k]||0;
  return new Date(new Date(last).getTime()-days*86400000).toISOString().slice(0,10);
}
function chartSlice(){
  const s=(DATA.chartPP||[]).filter(p=>p.v>0);
  if(curTf==='max'||!s.length) return s;
  const from=tfStartDate(curTf);
  const i=s.findIndex(p=>p.d>=from);
  return i<=0? s : s.slice(i-1);   // keep one base point so the period return starts at 0
}
function renderChartRet(pts){
  const el=document.getElementById('chart-ret'); if(!el||pts.length<2) return;
  const tw=((1+pts[pts.length-1].r)/(1+pts[0].r)-1)*100;
  const lab=(TFS.find(t=>t.k===curTf)||{}).l||curTf;
  el.innerHTML=`<span class="rl">TTWROR ${esc(lab)}</span> <span class="rv ${tw>=0?'up':'down'}">${fmtPct(tw)}</span>`;
}
function renderChart(){
  const svg=document.getElementById('chart'), tip=document.getElementById('tip');
  const box=svg.getBoundingClientRect(); const W=box.width||900, H=220;
  const pad={l:0,r:0,t:14,b:22};
  const pts=chartSlice();
  renderChartRet(pts);
  if(pts.length<2){svg.innerHTML='';return;}
  const T=d=>new Date(d).getTime();
  const t0=T(pts[0].d), t1=T(pts[pts.length-1].d), tspan=(t1-t0)||1;
  const spanDays=tspan/86400000;
  const vs=pts.map(p=>p.v); const vmin=Math.min(...vs), vmax=Math.max(...vs);
  const X=d=>pad.l + (T(d)-t0)/tspan*(W-pad.l-pad.r);
  const Y=v=>pad.t + (1-(v-vmin)/(vmax-vmin||1))*(H-pad.t-pad.b);
  const line=pts.map((p,i)=>`${i?'L':'M'}${X(p.d).toFixed(1)},${Y(p.v).toFixed(1)}`).join(' ');
  const area=line+` L${X(pts[pts.length-1].d).toFixed(1)},${H-pad.b} L${X(pts[0].d).toFixed(1)},${H-pad.b} Z`;
  const acc=cvar('--accent'), gc=cvar('--grid'), mc=cvar('--muted');
  // y gridlines at NICE round steps ($250k / $500k / ...), compact labels ($1.5M)
  let grid='';
  {
    const span=(vmax-vmin)||1, raw=span/4;
    const mag=Math.pow(10,Math.floor(Math.log10(raw)));
    const step=[1,2,2.5,5,10].map(m=>m*mag).find(s=>span/s<=5)||5*mag;
    const fmtTick=v=> v>=1e6? '$'+(v/1e6).toFixed(v%1e6?1:0).replace(/\.0$/,'')+'M'
                    : v>=1e3? '$'+Math.round(v/1e3)+'k' : '$'+Math.round(v);
    for(let v=Math.ceil(vmin/step)*step; v<=vmax+1e-9; v+=step){
      const y=Y(v).toFixed(1);
      if(+y<pad.t+8||+y>H-pad.b-2) continue;
      grid+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="${gc}" stroke-width="1"/>`+
            `<text x="4" y="${(+y-4)}" fill="${mc}" font-size="10.5" font-family="system-ui">${fmtTick(v)}</text>`;
    }
  }
  // x time axis: year ticks for long spans, month ticks for short
  let xlab='';
  const yb=H-pad.b, ybt=H-5;
  if(spanDays>420){
    const y0=new Date(pts[0].d).getUTCFullYear(), y1=new Date(pts[pts.length-1].d).getUTCFullYear();
    for(let yr=y0+1;yr<=y1;yr++){ const dx=X(yr+'-01-01T00:00:00Z'); if(dx<8||dx>W-8)continue;
      xlab+=`<line x1="${dx.toFixed(1)}" y1="${pad.t}" x2="${dx.toFixed(1)}" y2="${yb}" stroke="${gc}" stroke-width="1" stroke-dasharray="2 3"/>`+
            `<text x="${(dx+3).toFixed(1)}" y="${ybt}" fill="${mc}" font-size="10.5" font-family="system-ui">${yr}</text>`;}
  } else {
    const step = spanDays>200?2:1;   // months between labels
    let cur=new Date(pts[0].d); cur=new Date(Date.UTC(cur.getUTCFullYear(),cur.getUTCMonth()+1,1));
    const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    while(cur.getTime()<=t1){ const dx=X(cur.toISOString()); if(dx>8&&dx<W-8){
      xlab+=`<line x1="${dx.toFixed(1)}" y1="${pad.t}" x2="${dx.toFixed(1)}" y2="${yb}" stroke="${gc}" stroke-width="1" stroke-dasharray="2 3"/>`+
            `<text x="${(dx+3).toFixed(1)}" y="${ybt}" fill="${mc}" font-size="10.5" font-family="system-ui">${MN[cur.getUTCMonth()]}${cur.getUTCMonth()===0?" '"+String(cur.getUTCFullYear()).slice(2):''}</text>`;}
      cur=new Date(Date.UTC(cur.getUTCFullYear(),cur.getUTCMonth()+step,1)); }
  }
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML = grid + xlab +
    `<defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
       <stop offset="0" stop-color="${acc}" stop-opacity="0.18"/>
       <stop offset="1" stop-color="${acc}" stop-opacity="0"/></linearGradient></defs>`+
    `<path d="${area}" fill="url(#g)"/>`+
    `<path d="${line}" fill="none" stroke="${acc}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`+
    `<circle cx="${X(pts[pts.length-1].d).toFixed(1)}" cy="${Y(pts[pts.length-1].v).toFixed(1)}" r="4" fill="${acc}" stroke="${cvar('--surface')}" stroke-width="2"/>`+
    `<line class="cross" id="cx" x1="0" y1="${pad.t}" x2="0" y2="${yb}" style="opacity:0"/>`+
    `<circle id="cd" r="4.5" fill="${acc}" stroke="${cvar('--surface')}" stroke-width="2" style="opacity:0"/>`;
  const cx=svg.querySelector('#cx'), cd=svg.querySelector('#cd');
  function move(e){
    const r=svg.getBoundingClientRect();
    const mx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const targT=t0 + Math.max(0,Math.min(1,mx/r.width))*tspan;
    let bi=0,bd=1e18; for(let i=0;i<pts.length;i++){const dd=Math.abs(T(pts[i].d)-targT); if(dd<bd){bd=dd;bi=i;}}
    const p=pts[bi], px=X(p.d), py=Y(p.v);
    cx.setAttribute('x1',px);cx.setAttribute('x2',px);cx.style.opacity=1;
    cd.setAttribute('cx',px);cd.setAttribute('cy',py);cd.style.opacity=1;
    tip.style.opacity=1; tip.style.left=(px/W*r.width)+'px'; tip.style.top=(py/H*r.height)+'px';
    const dt=new Date(p.d).toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'});
    tip.innerHTML=`<span class="tv">${fmtUsd(p.v)}</span> · ${dt}`;
  }
  svg.addEventListener('mousemove',move);
  svg.addEventListener('touchmove',move,{passive:true});
  svg.addEventListener('mouseleave',()=>{cx.style.opacity=0;cd.style.opacity=0;tip.style.opacity=0;});
}

/* ---- sparkline (per card) ---- */
function sparkSvg(spark, up){
  if(!spark||spark.length<2) return '';
  const W=200,H=34,p=3;
  const mn=Math.min(...spark), mx=Math.max(...spark);
  const X=i=>p+(i/(spark.length-1))*(W-2*p);
  const Y=v=>p+(1-(v-mn)/(mx-mn||1))*(H-2*p);
  const col=up?cvar('--up'):cvar('--down');
  const d=spark.map((v,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(spark.length-1).toFixed(1)}" cy="${Y(spark[spark.length-1]).toFixed(1)}" r="2.6" fill="${col}"/></svg>`;
}

/* ---- allocation donut (interactive: hover slice/row -> details in the center) ---- */
function renderAlloc(){
  const el=document.getElementById('allocdonut'); if(!el) return;
  const hs=[...DATA.holdings].filter(h=>h.value>0).sort((a,b)=>b.value-a.value);   // sorted by weight, largest first
  const total=hs.reduce((s,h)=>s+h.value,0)||1;
  const cx=115,cy=115,r=101,rin=66; let a0=-Math.PI/2, segs='';
  const colOf=h=>h.assetType==='cash'?cvar('--muted'):colorFor(tIdx(h.ticker));
  hs.forEach((h,ai)=>{
    const frac=h.value/total, a1=a0+frac*2*Math.PI;
    const gap=frac>0.008?0.016:0;                       // small surface gap between slices
    const b0=a0+gap, b1=a1-gap;
    const x0=cx+r*Math.cos(b0), y0=cy+r*Math.sin(b0), x1=cx+r*Math.cos(b1), y1=cy+r*Math.sin(b1);
    const xi1=cx+rin*Math.cos(b1), yi1=cy+rin*Math.sin(b1), xi0=cx+rin*Math.cos(b0), yi0=cy+rin*Math.sin(b0);
    const laf=(b1-b0)>Math.PI?1:0;
    segs+=`<path data-ai="${ai}" d="M${x0.toFixed(2)},${y0.toFixed(2)} A${r},${r} 0 ${laf} 1 ${x1.toFixed(2)},${y1.toFixed(2)} L${xi1.toFixed(2)},${yi1.toFixed(2)} A${rin},${rin} 0 ${laf} 0 ${xi0.toFixed(2)},${yi0.toFixed(2)} Z" fill="${colOf(h)}"/>`;
    a0=a1;
  });
  // negative cash (margin) can't be a slice — net it into the center total + its own legend row
  const cash=DATA.holdings.find(h=>h.assetType==='cash'&&h.value<0);
  const net=total+(cash?cash.value:0);
  const legend=hs.map((h,ai)=>`<div class="lg2" data-ai="${ai}"><span class="dot" style="background:${colOf(h)}"></span>
    ${logoImg(h.logos,'llogo')}<span class="lt">${esc(h.ticker)}</span>
    <span class="lv">${fmtUsd(h.value)}</span><span class="lp">${(100*h.value/total).toFixed(1)}%</span></div>`).join('')
    +(cash?`<div class="lg2" data-ai="cash"><span class="dot" style="background:${cvar('--down')}"></span>
    <span class="llogo" style="visibility:hidden"></span><span class="lt">Cash · margin</span>
    <span class="lv">${fmtUsd(cash.value)}</span><span class="lp down">${(100*cash.value/total).toFixed(1)}%</span></div>`:'');
  el.innerHTML=`<div class="donutwrap">
    <svg viewBox="0 0 230 230" class="donut" id="donutsvg">${segs}
      <text id="dc1" x="115" y="105" text-anchor="middle" fill="${cvar('--ink')}" font-size="21" font-weight="700" font-family="system-ui"></text>
      <text id="dc2" x="115" y="126" text-anchor="middle" fill="${cvar('--muted')}" font-size="12" font-weight="600" font-family="system-ui"></text>
      <text id="dc3" x="115" y="143" text-anchor="middle" fill="${cvar('--muted')}" font-size="11" font-family="system-ui"></text></svg>
    <div class="legend2">${legend}</div></div>`;
  const svg=el.querySelector('#donutsvg');
  const c1=el.querySelector('#dc1'), c2=el.querySelector('#dc2'), c3=el.querySelector('#dc3');
  const setCenter=ai=>{
    if(ai===null){ c1.textContent=fmtUsd(net); c2.textContent=hs.filter(h=>h.assetType!=='cash').length+' positions';
      c3.textContent=cash?('net of '+fmtUsd(cash.value)+' margin'):''; }
    else if(ai==='cash'){ c1.textContent=fmtUsd(cash.value); c2.textContent='Cash · margin';
      c3.textContent='gross '+fmtUsd(total)+' → net '+fmtUsd(net); }
    else { const h=hs[ai]; c1.textContent=fmtUsd(h.value); c2.textContent=h.ticker; c3.textContent=(100*h.value/total).toFixed(1)+'% of invested'; }
  };

  const mark=ai=>{
    svg.classList.toggle('hashot',ai!==null&&ai!=='cash');
    svg.querySelectorAll('path').forEach(p=>p.classList.toggle('hot',p.dataset.ai===String(ai)));
    el.querySelectorAll('.lg2').forEach(g=>g.classList.toggle('hot',g.dataset.ai===String(ai)));
    setCenter(ai);
  };
  setCenter(null);
  [...svg.querySelectorAll('path'),...el.querySelectorAll('.lg2')].forEach(n=>{
    n.addEventListener('mouseenter',()=>mark(n.dataset.ai==='cash'?'cash':+n.dataset.ai));
    n.addEventListener('mouseleave',()=>mark(null));
  });
}

/* ---- catalyst timeline ---- */
function catKey(w){
  w=(w||'').toLowerCase().trim();
  let m;
  if(m=w.match(/(20\d{2})-(\d{2})-(\d{2})/)) return m[1]+m[2]+m[3];          // exact date
  if(m=w.match(/(20\d{2})-(\d{2})(?!\d)/)) return m[1]+m[2]+'15';            // year-month
  if(m=w.match(/(20\d{2})[ -]*q([1-4])/)) return m[1]+['','03','06','09','12'][+m[2]]+'15';
  if(m=w.match(/q([1-4])[ -]*(20\d{2})/)) return m[2]+['','03','06','09','12'][+m[1]]+'15';
  const yr=(w.match(/(20\d{2})/)||[])[1];
  const mo={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  if(yr && (m=w.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/))){
    let d=15; if(/early/.test(w))d=5; else if(/late/.test(w))d=25;
    return yr+String(mo[m[1]]).padStart(2,'0')+String(d).padStart(2,'0');
  }
  if(yr){
    if(/h2|2h|second half/.test(w)) return yr+'0815';
    if(/h1|1h|first half/.test(w)) return yr+'0215';
    if(/\bend\b|year[- ]?end/.test(w)) return yr+'1215';
    if(/early/.test(w)) return yr+'0215';
    if(/mid/.test(w)) return yr+'0630';
    return yr+'1231';        // vague (bare year / ongoing / FY / multi-year) -> after concrete dates in that year
  }
  return '99999999';
}
function renderTimeline(){
  const cats=[...DATA.catalysts].sort((a,b)=>catKey(a.when).localeCompare(catKey(b.when)));
  document.getElementById('timeline').innerHTML = cats.map(c=>{

}

  btn.addEventListener('click',()=>{

    el.title=(liveState.lastParqet?'portfolio '+t(liveState.lastParqet):'')+(liveState.lastPrice?' · prices '+t(liveState.lastPrice):'')+(liveState.lastNews?' · news '+t(liveState.lastNews):'');
  }
}

async function fetchYahoo(sym){
  // BARE path (no query string) — jina reliably proxies this; querystring URLs get
  // rate-blocked. Default range is 1d intraday, so we get a live today-sparkline +
  // meta.chartPreviousClose for the day-change.
  const url=JINA+"https://query1.finance.yahoo.com/v8/finance/chart/"+sym;
  const r=await fetch(url); const t=await r.text();
  const j=t.indexOf('{"chart"'); if(j<0) throw new Error('nojson');
  const d=JSON.parse(t.slice(j)); const res=d.chart.result[0]; const m=res.meta;
  const cl=(res.indicators.quote[0].close||[]).filter(x=>x!=null);
  const step=Math.max(1,Math.floor(cl.length/40));
  const spark=[]; for(let k=0;k<cl.length;k+=step) spark.push(+cl[k].toFixed(4));
  if(cl.length && spark[spark.length-1]!==+cl[cl.length-1].toFixed(4)) spark.push(+cl[cl.length-1].toFixed(4));
  return {price:m.regularMarketPrice, prevClose:m.chartPreviousClose,
          hi52:m.fiftyTwoWeekHigh, lo52:m.fiftyTwoWeekLow, spark, ccy:m.currency};
}

async function refreshPrices(){

    if(h.hi52&&h.lo52&&h.hi52>h.lo52) h.pos52=+(((y.price-h.lo52)/(h.hi52-h.lo52))*100).toFixed(1);

}

/* ---- LIVE PORTFOLIO from Parqet (holdings, values, gains, IRR) ---- */
async function refreshParqet(){
  const r=await fetch("https://api.parqet.com/v1/portfolios/assemble?useInclude=true&include=xirr&include=ttwror",
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({portfolioIds:[DATA.portfolioId],timeframe:"max",currency:"USD"})});
  if(!r.ok) return;
  const j=await r.json();
  const byId={}; (j.holdings||[]).forEach(h=>{ if(h.position&&h.position.currentValue>0) byId[h._id]=h; });
  // NOTE: ALL portfolio-level figures (returns, realized/unrealized gains) come from
  // the PP-exact engine (pp_sync.py over depot.xml) and are NOT overwritten by
  // Parqet anymore (Rafael 2026-07-11: "Parqet rechnet falsch"). Parqet is only
  // used for live per-holding market values below.
  // per-holding from Parqet (cash + NVO option stay as built from Portfolio Performance)
  DATA.holdings.forEach(h=>{
    const pq=byId[h.pid]; if(!pq) return;
    h.value=Math.round(pq.position.currentValue);
    const up=pq.performance&&pq.performance.unrealized;
    if(up){ h.unrealizedReturn=+up.returnNet.toFixed(1); h.totalGainNet=Math.round(up.gainNet); }
  });
  // total = live Parqet securities + PP option + PP net cash (can be negative = margin)
  DATA.totalValue=Math.round(DATA.holdings.reduce((s,h)=>s+h.value,0));
  DATA.cashPct=+(100*DATA.cashValue/DATA.totalValue).toFixed(1);
  DATA.holdings.forEach(h=>{ h.alloc=+(100*h.value/DATA.totalValue).toFixed(1); });
  liveState.lastParqet=new Date();
  renderKpis(); renderAlloc(); renderPerfBars(); renderHoldings(); setBadge();
}

function gdeltDate(s){ return (s&&s.length>=8)? s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8):''; }
async function fetchGdelt(q){
  const u="https://api.gdeltproject.org/api/v2/doc/doc?query="+encodeURIComponent('"'+q+'"')+
    "&mode=ArtList&maxrecords=12&format=json&sort=DateDesc&sourcelang=english";
  const r=await fetch(u); const j=await r.json(); return j.articles||[];
}
async function refreshNews(){
  const secs=DATA.holdings.filter(h=>h.assetType!=='cash');
  const results=await Promise.allSettled(secs.map(h=>fetchGdelt(h.gquery).then(a=>({h,a}))));
  const all=[];
  results.forEach(r=>{ if(r.status!=='fulfilled')return; const {h,a}=r.value;
    a.forEach(art=>{
      const dom=(art.domain||'').replace(/^www\./,'');
      if(!NEWS_DOMAINS.has(dom)) return;
      const title=(art.title||'').trim(); if(title.length<15) return;
      all.push({ticker:h.ticker, headline:title, url:art.url, source:dom, date:gdeltDate(art.seendate)});
    });
  });
  // Merge fresh GDELT headlines on top of the curated research feed (curated is
  // always substantive; GDELT adds whatever is newer). Dedupe by title, newest first.
  const combined=[...all, ...DATA.latestNews];
  combined.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const seen=new Set(), dedup=[];
  for(const n of combined){ const k=(n.headline||'').slice(0,55).toLowerCase().replace(/[^a-z0-9]/g,'');
    if(!k||seen.has(k))continue; seen.add(k); dedup.push(n); if(dedup.length>=25)break; }
  liveState.news=dedup; liveState.lastNews=new Date();
  renderFeed(); setBadge();
}

/* ---- Social feed (Stocktwits via jina proxy) ---- */
function relTime(iso){
  const then=new Date(iso).getTime(), now=Date.now(), m=Math.round((now-then)/60000);
  if(m<1)return 'now'; if(m<60)return m+'m'; const h=Math.round(m/60); if(h<24)return h+'h'; return Math.round(h/24)+'d';
}
const ST_SYM={PINK:"PYNKF"};   // Perimeter trades as PYNKF on Stocktwits
async function fetchStocktwits(tk){
  const r=await fetch(JINA+"https://api.stocktwits.com/api/2/streams/symbol/"+(ST_SYM[tk]||tk)+".json");
  const t=await r.text(); const i=t.indexOf('{"symbol"'); if(i<0) throw new Error('no');
  const d=JSON.parse(t.slice(i)); return d.messages||[];
}
function renderSocial(){
  const items=(liveState.social||[]).slice(0,24);
  const el=document.getElementById('social'); if(!el) return;
  el.classList.add('feedmax');
  if(!items.length){ el.innerHTML=''; return; }
  el.innerHTML=items.map(m=>{

    return `<div class="si">
      <div class="sm">${logoImg(tickerLogos(m.ticker),'nlogo')}<span class="tkr neutral">${esc(m.ticker)}</span>
        <span class="su">@${esc(m.user)}</span>${sent}<span class="stime">${relTime(m.time)}</span></div>
      <div class="sb">${esc(m.body)}</div></div>`;
  }).join('');
}
let _socialBusy=false, _socialRetry=[];
async function refreshSocial(){
  // FULL SWEEP per cycle: the jina proxy 429s parallel bursts but tolerates a
  // sequential drip (~1.2s gap). Sweep ALL tickers each cycle; 429'd tickers go
  // to the front of the next sweep. Per-ticker cache -> feed always merged/fresh.
  if(_socialBusy) return; _socialBusy=true;
  try{
    const secs=DATA.holdings.filter(h=>h.assetType!=='cash').map(h=>h.ticker);   // option = underlying's Stocktwits
    const order=[..._socialRetry.filter(t=>secs.includes(t)), ...secs.filter(t=>!_socialRetry.includes(t))];
    _socialRetry=[];
    liveState.socialBy=liveState.socialBy||{};
    let dirty=false;
    for(const tk of order){
      try{
        const a=await fetchStocktwits(tk);
        const msgs=[];
        a.forEach(m=>{
          const body=(m.body||'').trim();
          if((body.match(/\$[A-Za-z.]+/g)||[]).length>4) return;   // spammy multi-ticker blasts
          if(body.length<8) return;
          msgs.push({ticker:tk, user:m.user&&m.user.username, body,
            time:m.created_at, sentiment:m.entities&&m.entities.sentiment&&m.entities.sentiment.basic,
            likes:(m.likes&&m.likes.total)||0});
        });
        if(msgs.length){ liveState.socialBy[tk]=msgs; dirty=true; }
        else _socialRetry.push(tk);                                 // 429/empty -> first next cycle
      }catch(e){ _socialRetry.push(tk); }
      await new Promise(r=>setTimeout(r,1200));
    }
    if(dirty||Object.keys(liveState.socialBy).length){
      const all=Object.values(liveState.socialBy).flat();
      all.sort((a,b)=>new Date(b.time)-new Date(a.time));
      liveState.social=all.slice(0,40); liveState.lastSocial=new Date();
      try{localStorage.setItem('pc-social',JSON.stringify(liveState.socialBy));}catch(e){}
      renderSocial(); setBadge();
    }
  } finally { _socialBusy=false; }
}
function loadSocialCache(){
  // Instant-full feed on open: start from the baked-in snapshot (hourly job),
  // overlay any newer localStorage cache, live sweep refreshes from there.
  liveState.socialBy = Object.assign({}, DATA.social||{});
  try{ const by=JSON.parse(localStorage.getItem('pc-social')||'null');
    if(by) for(const [tk,msgs] of Object.entries(by)){
      const cur=liveState.socialBy[tk];
      if(!cur || (msgs[0]&&cur[0]&&new Date(msgs[0].time)>new Date(cur[0].time))) liveState.socialBy[tk]=msgs;
    }
  }catch(e){}
  const all=Object.values(liveState.socialBy).flat();
  if(all.length){ all.sort((a,b)=>new Date(b.time)-new Date(a.time)); liveState.social=all.slice(0,40); }
}

/* ===== SEC EDGAR live filing watcher — INSTANT IR alerts =====================
   Every material filing (8-K/6-K press release, offering, big stake) hits SEC
   EDGAR within minutes of publication. We poll data.sec.gov via the jina proxy,
   detect new filings, and fire: a sticky BREAKING banner + a top-of-feed item +
   a desktop notification (works even when this tab is backgrounded). */
// CIK map is built dynamically by build.py from SEC's ticker directory, so any newly
// bought US ticker is watched automatically (no manual list to maintain).
const SEC_CIK=DATA.secCik||{};
const SEC_FORMS={"8-K":"material event","6-K":"material event","424B5":"offering","424B3":"offering",
  "424B4":"offering","FWP":"offering","S-1":"registration","S-1/A":"registration",
  "SC 13D":"activist stake","SC 13D/A":"activist stake","SC 13G":"5%+ stake"};
async function fetchSec(cik){
  const r=await fetch(JINA+"https://data.sec.gov/submissions/CIK"+cik+".json");
  const t=await r.text(); const i=t.indexOf('{"cik"'); if(i<0) throw new Error('blocked');
  const d=JSON.parse(t.slice(i)); const f=d.filings.recent; const out=[];
  for(let k=0;k<Math.min(20,(f.form||[]).length);k++){
    if(SEC_FORMS[f.form[k]]) out.push({form:f.form[k],acc:f.accessionNumber[k],date:f.filingDate[k],
      time:f.acceptanceDateTime[k]||f.filingDate[k],desc:f.primaryDocDescription[k]||""});
  }
  return out;
}
function secUrl(cik,acc){ return "https://www.sec.gov/Archives/edgar/data/"+String(+cik)+"/"+acc.replace(/-/g,'')+"/"; }
let _secSeen=null,_secIdx=0,_secBusy=false;
function _loadSeen(){ try{return new Set(JSON.parse(localStorage.getItem('pc-sec-seen')||'[]'));}catch(e){return new Set();} }
function _saveSeen(){ try{localStorage.setItem('pc-sec-seen',JSON.stringify([..._secSeen].slice(-500)));}catch(e){} }
function alertSec(tk,fl){
  const label=SEC_FORMS[fl.form]||fl.form, url=secUrl(SEC_CIK[tk],fl.acc);
  liveState.secNews=liveState.secNews||[];
  liveState.secNews.unshift({ticker:tk, headline:tk+" files "+fl.form+" ("+label+")"+(fl.desc?": "+fl.desc:""),
    url, source:"SEC EDGAR — just filed", date:(fl.time||fl.date).slice(0,10), _sec:true});
  liveState.secNews=liveState.secNews.slice(0,12);
  const b=document.getElementById('breaking');
  if(b){ b.style.display='flex';
    b.innerHTML='🔴 <b>NEW SEC FILING</b> · '+esc(tk)+' '+esc(fl.form)+' ('+esc(label)+')'+(fl.desc?' — '+esc(fl.desc):'')+
      ' · <a href="'+esc(url)+'" target="_blank" rel="noopener">open filing ↗</a>'+
      '<span class="x" title="dismiss">✕</span>';
    b.querySelector('.x').onclick=()=>{b.style.display='none';}; }
  try{ if(window.Notification && Notification.permission==='granted')
    new Notification("📄 "+tk+" — "+fl.form+" filed with SEC",
      {body:(fl.desc||label)+" · tap to open the cockpit", tag:fl.acc, requireInteraction:true}); }catch(e){}
  renderFeed(); setBadge();
}
async function refreshSEC(){
  if(_secBusy) return; _secBusy=true;
  try{
    const tickers=Object.keys(SEC_CIK);
    if(_secSeen===null){
      // first run: silent baseline sweep of ALL tickers (don't alert on history)
      _secSeen=_loadSeen(); const cold=_secSeen.size===0;
      for(const tk of tickers){
        try{(await fetchSec(SEC_CIK[tk])).forEach(fl=>{ if(cold) _secSeen.add(fl.acc); });}catch(e){}
        await new Promise(r=>setTimeout(r,1000));
      }
      _saveSeen(); return;
    }
    const batch=[]; for(let k=0;k<3;k++) batch.push(tickers[(_secIdx+k)%tickers.length]);
    _secIdx=(_secIdx+3)%tickers.length;
    for(const tk of batch){
      try{ for(const fl of await fetchSec(SEC_CIK[tk])){
        if(_secSeen.has(fl.acc)) continue; _secSeen.add(fl.acc); alertSec(tk,fl); } }catch(e){}
      await new Promise(r=>setTimeout(r,1200));
    }
    _saveSeen();
  } finally { _secBusy=false; }
}
function initSecAlerts(){
  const btn=document.getElementById('secalertbtn'); if(!btn) return;
  if(!('Notification' in window)) return;
  const sync=()=>{ btn.style.display = Notification.permission==='granted' ? 'none':'inline-block';
    btn.textContent = Notification.permission==='denied' ? '🔕 alerts blocked' : '🔔 enable SEC alerts'; };
  sync();
  btn.onclick=()=>{ Notification.requestPermission().then(sync); };
}

/* ---- Activities (live from Parqet, like the Parqet app) ---- */
let _actItems=[], _actRawOffset=0, _actTotal=0;
// Cash transfers in Parqet are fictional (artifact of modeling the NVO option) — real
// cash lives in Portfolio Performance. Hide cash activities; show only real trades/dividends.
function isCashAct(a){ return actTicker(a)==='Cash' || /cash/i.test(a.holdingAssetType||''); }
const CCY_SYM={USD:"$",EUR:"€",CAD:"C$",GBP:"£"};
function actIsin(a){ return a.isin||(a.asset&&a.asset.identifier)||''; }
function actSec(a){ return DATA.secByIsin&&DATA.secByIsin[actIsin(a)]; }   // any security ever traded (depot.xml)
/* ---- company logos: <img> with a fallback chain (Parqet CDN -> favicon -> hide) ---- */
window._lerr=function(el){ const a=(el.dataset.alt||'').split('|').filter(Boolean);
  if(a.length){ el.src=a.shift(); el.dataset.alt=a.join('|'); } else el.style.visibility='hidden'; };
function logoImg(cands,cls){
  if(!cands||!cands.length) return `<span class="${cls}" style="visibility:hidden"></span>`;
  return `<img class="${cls}" src="${esc(cands[0])}" alt="" loading="lazy"
    data-alt="${esc(cands.slice(1).join('|'))}" onerror="window._lerr(this)">`;
}
function tickerLogos(tk){ const h=DATA.holdings.find(x=>x.ticker===tk); return (h&&h.logos)||[]; }
function actTicker(a){
  const byPid=DATA.holdings.find(h=>h.pid===a.holding);
  if(byPid) return byPid.ticker;
  if(a.holdingAssetType && /cash/i.test(a.holdingAssetType)) return "Cash";
  if(!actIsin(a) && !a.asset && Math.abs((+a.price||1)-1)<1e-9) return "Cash";
  const sec=actSec(a);
  if(sec&&sec.tk) return sec.tk;
  if(a.asset&&(a.asset.ticker||a.asset.symbol)) return a.asset.ticker||a.asset.symbol;
  if(a.assetName) return a.assetName;
  if(sec&&sec.name) return sec.name;
  return actIsin(a)||"—";
}
function actName(a){
  const byPid=DATA.holdings.find(h=>h.pid===a.holding);
  const sec=actSec(a);
  return (byPid&&byPid.name)||(sec&&sec.name)||(a.asset&&a.asset.name)||"";
}
function actLogo(a,tk){
  const cur=tickerLogos(tk);                       // current holding -> curated chain (incl. overrides)
  if(cur.length) return logoImg(cur,'alogo');
  const isin=actIsin(a)||(DATA.isinByTicker&&DATA.isinByTicker[tk])||'';
  const cands=[];
  if(isin) cands.push("https://assets.parqet.com/logos/isin/"+isin+"?format=png&size=64");
  if(tk&&tk!=="Cash"&&tk!=="—") cands.push("https://assets.parqet.com/logos/symbol/"+encodeURIComponent(tk.split(' ')[0])+"?format=png&size=64");
  return logoImg(cands,'alogo');
}
function actCls(t){
  if(t==="Buy")return "buy"; if(t==="Sell")return "sell";
  if(/Dividend|Interest/.test(t))return "div"; return "oth";
}
function renderActivities(){
  const el=document.getElementById('activities'); if(!el)return;
  el.innerHTML=_actItems.map(a=>{
    const sym=CCY_SYM[a.currency]||(a.currency+" ");
    const dt=new Date(a.datetime).toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'2-digit'});
    const tk=actTicker(a), nm=actName(a);
    const isTrade=(a.type==="Buy"||a.type==="Sell")&&a.shares&&a.price;
    const sub=isTrade? (Number(a.shares).toLocaleString('en-US')+" @ "+sym+(+a.price).toLocaleString('en-US',{maximumFractionDigits:4}))
      : (a.shares&&a.price!==1? Number(a.shares).toLocaleString('en-US')+" units":"");
    const sign=a.type==="Buy"?"−":a.type==="Sell"||/Dividend|Interest/.test(a.type)?"+":"";
    return `<div class="act">
      <div class="ad">${dt}</div>
      <div class="atype ${actCls(a.type)}">${esc(a.type.replace(/([a-z])([A-Z])/g,'$1 $2').toUpperCase())}</div>
      ${actLogo(a,tk)}
      <div class="amain"><div class="aname">${esc(tk)}${nm&&nm!==tk?' <span class="asub">'+esc(nm)+'</span>':''}</div>
        ${sub?`<div class="asub">${esc(sub)}</div>`:''}</div>
      <div class="aval tnum">${sign}${sym}${(+a.amount).toLocaleString('en-US',{maximumFractionDigits:2})}</div>
    </div>`;
  }).join('');
  const btn=document.getElementById('actmore');
  if(btn){ btn.style.display=_actRawOffset<_actTotal?'':'none';
    btn.textContent='Load more ('+Math.max(0,_actTotal-_actRawOffset).toLocaleString('en-US')+' older)'; }
}
async function fetchActivities(offset){
  const r=await fetch("https://api.parqet.com/v1/activities?portfolioIds="+DATA.portfolioId+"&limit=50&offset="+offset);
  if(!r.ok) throw new Error(r.status);
  return await r.json();
}
async function refreshActivities(){
  try{
    const j=await fetchActivities(0);
    _actTotal=j.totalCount||0;
    const page=(j.activities||[]);
    const known=new Set(_actItems.map(a=>a._id));
    const fresh=page.filter(a=>!known.has(a._id)&&!isCashAct(a));  // new trades on top, cash hidden
    if(fresh.length) _actItems=[...fresh, ..._actItems];
    if(page.length>_actRawOffset) _actRawOffset=page.length;       // first page consumed
    renderActivities();
  }catch(e){}
}
async function loadMoreActivities(){
  try{
    const j=await fetchActivities(_actRawOffset);
    const page=(j.activities||[]);
    const known=new Set(_actItems.map(a=>a._id));
    _actItems=[..._actItems, ...page.filter(a=>!known.has(a._id)&&!isCashAct(a))];
    _actRawOffset+=page.length;
    renderActivities();
  }catch(e){}
}

function startLive(){

  setInterval(()=>refreshSocial().catch(()=>{}), 90000);    // social sweep (Stocktwits) every 90s
  setInterval(()=>refreshSEC().catch(()=>{}), 90000);       // SEC EDGAR filing watch every 90s
