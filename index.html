<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Portfolio Cockpit</title>
<style>
  :root{
    --plane:#f4f5f2; --surface:#fcfcfb; --surface-2:#f7f7f4;
    --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
    --grid:#e6e5df; --line:#c9c8c1; --border:rgba(11,11,11,.10);
    --up:#0a7a24; --up-bg:rgba(10,122,36,.10);
    --down:#c62f2f; --down-bg:rgba(198,47,47,.10);
    --accent:#2a78d6;
    --chip:#eef0ee; --chip-ink:#3a3a37;
    --s1:#2a78d6;--s2:#1baf7a;--s3:#c98500;--s4:#008300;--s5:#4a3aa7;--s6:#d03b3b;--s7:#c85f88;--s8:#d1521f;
    --confirmed:#0a7a24; --tentative:#a98600;
  }
  :root[data-theme="dark"]{ color-scheme:dark; }
  @media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
    --plane:#0d0d0d; --surface:#181817; --surface-2:#201f1e;
    --ink:#f4f3ef; --ink-2:#c3c2b7; --muted:#8f8d86;
    --grid:#2c2c2a; --line:#3a3a37; --border:rgba(255,255,255,.12);
    --up:#37c24d; --up-bg:rgba(55,194,77,.14);
    --down:#f0625f; --down-bg:rgba(240,98,95,.14);
    --accent:#3987e5;
    --chip:#262624; --chip-ink:#cfcec6;
    --s1:#3987e5;--s2:#199e70;--s3:#e0a53a;--s4:#3fae3f;--s5:#9085e9;--s6:#e66767;--s7:#d55181;--s8:#e07a4d;
    --confirmed:#37c24d; --tentative:#e0b23a;
  }}
  :root[data-theme="dark"]{
    --plane:#0d0d0d; --surface:#181817; --surface-2:#201f1e;
    --ink:#f4f3ef; --ink-2:#c3c2b7; --muted:#8f8d86;
    --grid:#2c2c2a; --line:#3a3a37; --border:rgba(255,255,255,.12);
    --up:#37c24d; --up-bg:rgba(55,194,77,.14);
    --down:#f0625f; --down-bg:rgba(240,98,95,.14);
    --accent:#3987e5;
    --chip:#262624; --chip-ink:#cfcec6;
    --s1:#3987e5;--s2:#199e70;--s3:#e0a53a;--s4:#3fae3f;--s5:#9085e9;--s6:#e66767;--s7:#d55181;--s8:#e07a4d;
    --confirmed:#37c24d; --tentative:#e0b23a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--plane);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 16px 64px}
  .tnum{font-variant-numeric:tabular-nums}

  header.top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .title{font-size:22px;font-weight:680;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
  .title .dot{width:11px;height:11px;border-radius:50%;background:var(--accent)}
  .sub{color:var(--muted);font-size:13px}
  .sub b{color:var(--ink-2);font-weight:600}
  .themebtn{border:1px solid var(--border);background:var(--surface);color:var(--ink-2);
    border-radius:8px;padding:6px 11px;font-size:13px;cursor:pointer;font-family:inherit}
  .themebtn:hover{background:var(--surface-2)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 15px}
  .tile .lab{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .tile .val{font-size:26px;font-weight:680;margin-top:6px;letter-spacing:-.4px}
  .tile .note{font-size:12.5px;color:var(--ink-2);margin-top:3px}
  .up{color:var(--up)} .down{color:var(--down)}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:16px}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
    font-weight:660;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .panel h2 .live{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 0 3px var(--up-bg)}
  .cols{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;align-items:start}

  /* portfolio chart */
  .chartbox{position:relative}
  svg.line{display:block;width:100%;height:210px;overflow:visible}
  .cross{stroke:var(--line);stroke-width:1}
  .tip{position:absolute;pointer-events:none;background:var(--ink);color:var(--surface);
    padding:6px 9px;border-radius:7px;font-size:12.5px;transform:translate(-50%,-125%);
    white-space:nowrap;opacity:0;transition:opacity .08s;z-index:5}
  .tip .tv{font-weight:680}

  /* latest news feed */
  .feed{display:flex;flex-direction:column}
  .feed .fi{display:grid;grid-template-columns:78px 1fr;gap:12px;padding:11px 2px;border-top:1px solid var(--grid)}
  .feed .fi:first-child{border-top:0}
  .feed .fd{font-size:11.5px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;padding-top:2px}
  .feed .ft{font-size:14px;font-weight:600;line-height:1.4}
  .feed .ft a{text-decoration:none;border-bottom:1px solid var(--border)}
  .feed .ft a:hover{border-bottom-color:var(--accent);color:var(--accent)}
  .feed .fs{font-size:12.5px;color:var(--ink-2);margin-top:3px}
  .feed .fm{font-size:11.5px;color:var(--muted);margin-top:3px}
  .tkr{font-weight:700;font-size:11px;padding:1px 6px;border-radius:4px;color:#fff;vertical-align:middle}
  .social .si{display:block;padding:10px 2px;border-top:1px solid var(--grid)}
  .social .si:first-child{border-top:0}
  .social .sm{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .social .su{font-size:12px;font-weight:600;color:var(--ink-2)}
  .social .stime{font-size:11px;color:var(--muted);margin-left:auto}
  .social .sb{font-size:13px;line-height:1.4}
  .social .sent{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px}
  .social .sent.bull{background:var(--up-bg);color:var(--up)}
  .social .sent.bear{background:var(--down-bg);color:var(--down)}
  /* PP total-portfolio strip */
  .pprow{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start}
  .ppstat .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .ppstat .val{font-size:19px;font-weight:680;margin-top:3px}
  .ppstat .note{font-size:11.5px;color:var(--muted);margin-top:1px}
  .ppyears{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;margin-left:auto}
  .ppy{text-align:center;background:var(--surface-2);border-radius:8px;padding:6px 10px}
  .ppy .y{font-size:10.5px;color:var(--muted);font-weight:600}
  .ppy .r{font-size:13px;font-weight:680;margin-top:1px}
  .feedmax{max-height:560px;overflow-y:auto;scrollbar-width:thin}
  .feedmax::-webkit-scrollbar{width:6px}
  .feedmax::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

  /* allocation donut */
  .donutwrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .donut{width:180px;height:180px;flex:none}
  .legend{flex:1;min-width:140px;display:grid;grid-template-columns:1fr 1fr;gap:3px 14px}
  .lg{display:flex;align-items:center;gap:7px;font-size:12.5px}
  .lg .dot{width:9px;height:9px;border-radius:2px;flex:none}
  .lg .lt{font-weight:600;color:var(--ink-2)}
  .lg .lp{margin-left:auto;color:var(--muted);font-weight:600}
  /* performance by holding */
  .pf{display:flex;align-items:center;gap:10px;margin:7px 0}
  .pf .pft{width:48px;font-size:12.5px;font-weight:640;color:var(--ink-2)}
  .pfbar{flex:1;height:16px;position:relative;background:var(--surface-2);border-radius:4px}
  .pfmid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
  .pffill{position:absolute;top:2px;bottom:2px;border-radius:3px;min-width:2px}
  .pf .pfv{width:56px;text-align:right;font-size:12.5px;font-weight:640}

  /* timeline */
  .tl{display:flex;flex-direction:column;gap:2px;max-height:360px;overflow-y:auto}
  .tl-item{display:grid;grid-template-columns:76px 1fr;gap:10px;padding:8px 4px;border-top:1px solid var(--grid)}
  .tl-item:first-child{border-top:0}
  .tl-when{font-size:12px;color:var(--ink-2);font-weight:600;line-height:1.35}
  .tl-when .cf{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
  .tl-body .lb{font-size:13.5px;font-weight:600}
  .tl-body .lb .tkr{margin-right:6px}
  .tl-body .dt{font-size:12.5px;color:var(--muted);margin-top:1px}

  /* holdings */
  .hgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 16px;display:flex;flex-direction:column}
  .chead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .cname{display:flex;align-items:center;gap:9px;min-width:0}
  .cname .bd{width:10px;height:10px;border-radius:50%;flex:none}
  .cname .tk{font-size:16px;font-weight:720;letter-spacing:-.2px}
  .cname .nm{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cvals{text-align:right;flex:none}
  .cvals .px{font-size:15px;font-weight:660}
  .cvals .dc{font-size:12.5px;font-weight:640;margin-top:1px}
  .sparkrow{display:flex;align-items:center;gap:10px;margin:11px 0 2px}
  svg.spark{height:34px;flex:1;overflow:visible}
  .rng{width:120px;flex:none}
  .rng .rtrack{height:5px;background:var(--surface-2);border-radius:3px;position:relative;margin:8px 0 3px}
  .rng .rdot{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid var(--surface)}
  .rng .rlab{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .thesis{font-size:12.5px;color:var(--muted);margin:9px 0 0}
  .metaline{display:flex;gap:14px;margin:9px 0 2px;font-size:12px;color:var(--ink-2);flex-wrap:wrap}
  .metaline b{color:var(--ink);font-weight:660}
  .pulse{font-size:13px;color:var(--ink-2);background:var(--surface-2);border-radius:9px;padding:10px 11px;margin:10px 0 0;line-height:1.5}
  .seclab{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:660;margin:14px 0 7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--chip);color:var(--chip-ink);border-radius:20px;padding:4px 10px;font-size:12px;line-height:1.3;display:inline-flex;align-items:center;gap:5px}
  .chip .cf{width:7px;height:7px;border-radius:50%;flex:none}
  .chip .cw{font-weight:680}
  .news{list-style:none;margin:6px 0 0;padding:0;display:flex;flex-direction:column}
  .news li{padding:9px 0;border-top:1px solid var(--grid)}
  .news li:first-child{border-top:0}
  .news .nh{display:flex;gap:9px;align-items:baseline}
  .news .nd{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
  .news .nt{font-size:13.5px;font-weight:600;line-height:1.4}
  .news .nt a{text-decoration:none;border-bottom:1px solid var(--border)}
  .news .nt a:hover{border-bottom-color:var(--accent);color:var(--accent)}
  .news .ns{font-size:12.5px;color:var(--ink-2);margin-top:3px}
  .news .src{font-size:11.5px;color:var(--muted);margin-top:2px}
  .links{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;padding-top:12px;border-top:1px solid var(--grid)}
  .lk{font-size:12px;font-weight:600;text-decoration:none;border:1px solid var(--border);
    border-radius:7px;padding:5px 10px;color:var(--ink-2)}
  .lk:hover{border-color:var(--accent);color:var(--accent)}
  .chart-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  #chart-ret{font-size:13px;font-weight:600;margin-left:8px}
  #chart-ret .rv{font-weight:720}
  #chart-ret .rl{color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:11px}
  .tfsel{display:flex;gap:2px;background:var(--surface-2);border-radius:8px;padding:3px}
  .tfsel button{border:0;background:none;color:var(--ink-2);font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit}
  .tfsel button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .tfsel button:hover:not(.on){color:var(--ink)}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.4px;vertical-align:middle;margin-right:4px}
  .badge.snap{background:var(--chip);color:var(--muted)}
  .badge.live{background:var(--up-bg);color:var(--up)}
  .badge.live .pulse-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--up);margin-right:5px;vertical-align:middle;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @media(prefers-reduced-motion:reduce){.badge.live .pulse-dot{animation:none}}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:26px;line-height:1.6}
  .morebtn{background:none;border:0;color:var(--accent);font-size:12.5px;font-weight:600;cursor:pointer;padding:8px 0 0;font-family:inherit}

  @media(max-width:860px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .cols{grid-template-columns:1fr}
    .hgrid{grid-template-columns:1fr}
    .wrap{padding:16px 12px 48px}
    .sparkrow{flex-direction:column;align-items:stretch;gap:8px}
    .rng{width:auto}
  }
</style>

<div class="wrap">
  <header class="top">
    <div>
      <div class="title"><span class="dot"></span>Portfolio Cockpit</div>
      <div class="sub"><span id="livebadge" class="badge snap">Snapshot</span> As of <b id="asof"></b> · <span id="hcount"></span> positions · Prices: Yahoo · News: GDELT + research · Portfolio: Parqet</div>
    </div>
    <button class="themebtn" id="themebtn">Theme</button>

  <div class="kpis" id="kpis"></div>

  <div class="panel">

      <h2 style="margin:0">Portfolio Value <span id="chart-ret"></span></h2>
      <div class="tfsel" id="tfsel"></div>
    </div>
    <div class="chartbox">
      <svg class="line" id="chart" preserveAspectRatio="none"></svg>
      <div class="tip" id="tip"></div>
    </div>
  </div>

  <div class="cols">
    <div class="panel">
      <h2>Allocation</h2>
      <div id="allocdonut"></div>
    </div>
    <div class="panel">
      <h2>Performance by Holding</h2>
      <div id="perfbars"></div>
    </div>
  </div>

  <div class="panel" style="background:none;border:0;padding:0">
    <h2 style="margin-left:2px">Positions &amp; News</h2>
    <div class="hgrid" id="holdings"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

e": "2026-06-29", "headline": "GeneDx price target raised to $74 from $70 at Guggenheim (Buy)", "source": "Guggenheim / Investing.com", "url": "https://stockanalysis.com/stocks/wgs/", "summary": "Guggenheim nudges its price target higher and reaffirms the Buy rating - a sign that at least some analysts see the growth story intact, even as other firms cut their targets after the Q1 miss.", "ticker": "WGS"}, {"date": "2026-06-29", "headline": "NeurAxis Added to Russell 3000E Growth Benchmark", "source": "MarketScreener / FTSE Russell", "url": "https://www.marketscreener.com/quote/stock/NEURAXIS-INC-165458376/", "summary": "In the course of the annual Russell reconstitution, NRXS was added to the Russell 3000E Growth benchmark. This brings passive index buying and more institutional visibility - the stock marked its 52-week high of $9.33 on June 27.", "ticker": "NRXS"}, {"date": "2026-06-29", "headline": "Delcath Systems added to Russell 2000 Value and Russell 3000 Value Benchmarks", "source": "MarketScreener", "url": "https://www.marketscreener.com/quote/stock/DELCATH-SYSTEMS-INC-10396/", "summary": "As part of the annual Russell reconstitution, DCTH was added to several value benchmarks. This brings passive index-fund demand and higher institutional visibility.", "ticker": "DCTH"}, {"date": "2026-06-29", "headline": "Caribou Biosciences added to Russell Microcap Value Benchmark Index", "source": "MarketScreener", "url": "https://www.marketscreener.com/quote/stock/CARIBOU-BIOSCIENCES-INC-125041251/", "summary": "Index inclusion in the annual Russell reconstitution can add modest passive/index-fund buying, a small technical positive for a micro-cap. Caribou was also confirmed to present at the H.C. Wainwright Cell Therapy Conference the same week.", "ticker": "CRBU"}, {"date": "2026-06-25", "headline": "uniQure Closes $259 Million Public Offering of Ordinary Shares", "source": "Quiver Quantitative", "url": "https://www.quiverquant.com/", "summary": "The capital raise, initially priced at $225M, was upsized to roughly $259M including the over-allotment and closed. Fresh capital cushions the balance sheet ahead of the costly BLA phase, but means dilution for existing shareholders.", "ticker": "QURE"}, {"date": "2026-06-25", "headline": "J.P. Morgan Maintains Lexeo Therapeutics With Overweight Rating, Target Price $9", "source": "Moomoo", "url": "https://www.moomoo.com/news", "summary": "JPMorgan reaffirmed Overweight (Buy) with a $9 target following the JAMA publication and trial-design finalization, adding a bulge-bracket endorsement to the post-catalyst analyst chorus.", "ticker": "LXEO"}, {"date": "2026-06-24", "headline": "What a $1.2 Million Insider Sale Means for Nektar With Shares Up 160% This Past Year", "source": "The Motley Fool", "url": "https://www.fool.com/quote/nasdaq/nktr/", "summary": "The head of research sold about $1.2M of stock via a 10b5-1 plan after the price rose 160% within a year. Pre-planned insider selling after a strong rally, but a point that nervous investors are watching.", "ticker": "NKTR"}, {"date": "2026-06-24", "headline": "Cantor Fitzgerald reiterates Tenax Therapeutics Overweight rating", "source": "Investing.com", "url": "https://www.investing.com/equities/tenax-therapeutics", "summary": "Cantor reaffirms Overweight, underpinning the uniformly positive sell-side coverage (8 Buy, 0 Hold, 0 Sell) ahead of the data readout.", "ticker": "TENX"}, {"date": "2026-06-23", "headline": "Piper Sandler raises GeneDx price target to $63 from $50 on new coverage policy", "source": "Piper Sandler / Investing.com", "url": "https://m.au.investing.com/news/stock-market-news/piper-sandler-raises-genedx-stock-price-target-on-coverage-policy-93CH-4500562", "summary": "Piper Sandler reacts positively to the new Carelon reimbursement coverage and raises its price target (Overweight). It confirms that the expanded reimbursement is seen as a structural growth driver.", "ticker": "WGS"}, {"date": "2026-06-23", "headline": "Lake Street Maintains ClearPoint Neuro With Buy Rating, Target Price $30", "source": "Lake Street / Moomoo", "url": "https://seekingalpha.com/symbol/CLPT", "summary": "Lake Street reaffirms Buy and, at $30, sets the highest price target on the Street - analysts see ClearPoint as the main beneficiary of uniQure's progress. It signals growing analyst confidence after the AMT-130 news jump.", "ticker": "CLPT"}, {"date": "2026-06-23", "headline": "3 Biotech Takeover Targets Wall Street Is Watching After the Apogee Deal", "source": "24/7 Wall St.", "url": "https://247wallst.com/", "summary": "NKTR is named as a possible takeover candidate in immunology following the Apogee acquisition. M&A speculation provides additional tailwind for the stock.", "ticker": "NKTR"}, {"date": "2026-06-22", "headline": "GeneDx: Why I Think The Selloff Went Too Far", "source": "Seeking Alpha", "url": "https://seekingalpha.com/symbol/WGS", "summary": "A bullish counterpoint to the litigation wave: the author argues the 49% crash was overdone, since volume growth and reimbursement expansion remain intact. It illustrates the divided view in the market.", "ticker": "WGS"}, {"date": "2026-06-22", "headline": "Lexeo Therapeutics's LX2006 Has A Viable Regulatory Pathway And Timeline", "source": "Seeking Alpha", "url": "https://seekingalpha.com/symbol/LXEO", "summary": "Analyst deep-dive arguing the finalized SUNRISE-FA 2 design and FDA alignment give LX2006 a credible accelerated-approval route, framing the current valuation as attractive versus the 2028 BLA opportunity.", "ticker": "LXEO"}, {"date": "2026-06-18", "headline": "ClearPoint Neuro: AMT-130's FDA Reversal Revives The Bull Case", "source": "Seeking Alpha", "url": "https://seekingalpha.com/symbol/CLPT", "summary": "The stock jumped as much as 26% over two days because the FDA pivot on uniQure's AMT-130 revives the thesis that CLPT stands to earn significantly as the delivery/navigation partner for a potential first Huntington's gene therapy. It shows how tightly CLPT is tied to partner milestones.", "ticker": "CLPT"}, {"date": "2026-06-17", "headline": "uniQure Announces Plan for BLA Submission for AMT-130 in Huntington's Disease", "source": "StockTitan", "url": "https://www.stocktitan.net/news/QURE/", "summary": "The pivotal event: in a Type B meeting, the FDA accepted the three-year data from the Phase I/II study as the primary basis for an accelerated approval; submission planned for Q3 2026. This reverses the FDA's earlier dismissive stance - the stock jumped roughly +78% the same day.", "ticker": "QURE"}, {"date": "2026-06-17", "headline": "uniQure plans MHRA Marketing Authorization Application for AMT-130 in the UK", "source": "Stocktwits", "url": "https://stocktwits.com/symbol/QURE", "summary": "In parallel with the U.S. pathway, uniQure plans an MAA with the UK's MHRA for Q3 2026, backed by three-year data showing roughly 75% slowing of disease progression in the high-dose group. This opens up a second approval market.", "ticker": "QURE"}, {"date": "2026-06-17", "headline": "ClearPoint Neuro Shares Jump as FDA Progress for uniQure Therapy Highlights Platform Value", "source": "Investing.com", "url": "https://www.investing.com/news/stock-market-news/clearpoint-neuro-stock-surges-on-peers-fda-approval-plan-93CH-4747019", "summary": "uniQure announced it will file a BLA in Q3 2026 for accelerated approval of AMT-130 in Huntington's (QURE +~70%). AMT-130 is delivered via ClearPoint's navigation and SmartFlow cannula, so CLPT benefits directly as a supplier - the most important catalyst of the period.", "ticker": "CLPT"}, {"date": "2026-06-17", "headline": "Lexeo Therapeutics Announces Publication in JAMA Cardiology of Phase I/II Data for LX2006 in Friedreich Ataxia", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/06/17/3313795/0/en/Lexeo-Therapeutics-Announces-Publication-in-JAMA-Cardiology-of-Phase-I-II-Data-for-LX2006-in-Friedreich-Ataxia.html", "summary": "Peer-reviewed JAMA Cardiology publication of pooled Phase I/II data (17 patients) showed ~28-33% LVMI improvement in abnormal-baseline cardiac cohorts, increased frataxin expression in all biopsied patients, and mFARS neurologic stabilization - the clinical foundation for the pivotal program.", "ticker": "LXEO"}, {"date": "2026-06-17", "headline": "Caribou Biosciences stockholders reject officer exculpation proposal at annual meeting", "source": "Stock Titan", "url": "https://www.stocktitan.net/sec-filings/CRBU/8-k-caribou-biosciences-inc-reports-material-event-22e59997acc3.html", "summary": "At the June 17 annual meeting shareholders elected three Class II directors and ratified Deloitte, but voted down a proposal to add officer-exculpation protection. A governance signal rather than a fundamental driver.", "ticker": "CRBU"}, {"date": "2026-06-16", "headline": "GeneDx Names Mark Gardner President to Lead Its Next Phase of Scale and Growth", "source": "GeneDx / Yahoo Finance", "url": "https://finance.yahoo.com/quote/WGS/", "summary": "Mark Gardner becomes president as of June 15 and reports to CEO Katherine Stueland; he is to lead the commercial and operations teams toward scalable growth. An important signal for operational execution after the Fabric Genomics debacle.", "ticker": "WGS"}, {"date": "2026-06-16", "headline": "H.C. Wainwright reiterates Caribou Biosciences Buy rating after EHA data", "source": "Investing.com", "url": "https://www.investing.com/news/analyst-ratings/hc-wainwright-reiterates-caribou-biosciences-stock-rating-at-buy-93CH-4744535", "summary": "Following the EHA readouts, H.C. Wainwright kept its Buy rating and $11 target, reinforcing sell-side confidence in the allogeneic CAR-T thesis versus a low single-digit share price.", "ticker": "CRBU"}, {"date": "2026-06-15", "headline": "Perimeter to Participate in the Planet MicroCap Showcase in Las Vegas", "source": "Perimeter IR / PR Newswire", "url": "https://ir.perimetermed.com/news-events/press-releases/detail/212/", "summary": "CEO Adrian Mendes presented the commercialization strategy and upcoming milestones on June 17. It shows the focus on greater visibility with small-cap investors following the FDA approval.", "ticker": "PINK"}, {"date": "2026-06-15", "headline": "Lexeo Therapeutics Announces Regulatory Update and Registrational Trial Design for LX2006 Gene Therapy in Friedreich Ataxia", "source": "GlobeNewswire", "url": "https://www.globenewswire.com/news-release/2026/06/15/3311662/0/en/lexeo-therapeutics-announces-regulatory-update-and-registrational-trial-design-for-lx2006-gene-therapy-in-friedreich-ataxia.html", "summary": "The pivotal catalyst: Lexeo finalized the SUNRISE-FA 2 protocol and statistical analysis plan with FDA aligned on an accelerated-approval BLA in 2028; FDA confirmed no additional nonclinical bridging studies are needed and commercial-scale drug product is ready, de-risking the path to registration.", "ticker": "LXEO"}, {"date": "2026-06-14", "headline": "Carelon adds outpatient genome sequencing coverage, lifting insured coverage to ~80%", "source": "Carelon / GenomeWeb", "url": "https://www.genomeweb.com/", "summary": "Carelon, the largest U.S. lab benefit manager, adds genome sequencing to its reimbursement policies, raising the share of insured patients with genome coverage to nearly 80%. A structural tailwind and arguably the most important positive catalyst of the period.", "ticker": "WGS"}, {"date": "2026-06-14", "headline": "Caribou Reports Dose Escalation Durability Data for CB-011 at EHA 2026", "source": "Caribou Biosciences IR / Investing News Network", "url": "https://investor.cariboubio.com/news-releases/news-release-details/caribou-biosciences-reports-dose-escalation-durability-data-cb", "summary": "CB-011 (BCMA CAR-T for multiple myeloma) showed an 83% complete response rate, 91% MRD negativity, and 50% of patients maintaining a complete response at 15 months in heavily pretreated BCMA-naive patients. Strong durability supports the ongoing CaMMouflage dose-expansion cohort and the drug's RMAT designation.", "ticker": "CRBU"}, {"date": "2026-06-13", "headline": "NeurAxis Stockholders Approve Directors and Equity Compensation Plans", "source": "The Globe and Mail (TipRanks)", "url": "https://ir.neuraxis.com/", "summary": "At the annual meeting on June 10, six directors were elected, along with a significant increase to the equity incentive plan and a new ESPP. Relevant because of the additional potential dilution from stock-based compensation.", "ticker": "NRXS"}, {"date": "2026-06-12", "headline": "UniQure Rocked by Wave of High-Level Insider Stock Sales", "source": "TipRanks", "url": "https://www.tipranks.com/news/insider-trading/", "summary": "Several directors sold shares on June 11-12; CCO Kylie O'Keefe sold about 16,000 shares at ~$27 - just before the FDA jump. On a 12-month basis, insiders have net sold roughly $11M more than they bought, which is a mildly dampening signal.", "ticker": "QURE"}, {"date": "2026-06-12", "headline": "Piper Sandler raises Tenax Therapeutics price target on trial data", "source": "Investing.com", "url": "https://www.investing.com/equities/tenax-therapeutics", "summary": "Piper Sandler raises its price target (reported to as high as $50) based on trial/powering data - currently the highest target on the Street and an expression of high expectations for LEVEL.", "ticker": "TENX"}, {"date": "2026-06-11", "headline": "Caribou Reports Long-Term Vispa-cel (CB-010) Data in 2L Large B-Cell Lymphoma at EHA 2026", "source": "GlobeNewswire / Fierce Biotech", "url": "https://www.globenewswire.com/news-release/2026/06/11/3310427/0/en/caribou-biosciences-reports-long-term-vispa-cel-data-in-second-line-large-b-cell-lymphoma-at-eha-2026.html", "summary": "Vispa-cel (renamed CB-010) delivered durable efficacy (roughly 82% response) with a clean safety profile, with the company arguing its off-the-shelf CAR-T performs on par with approved autologous therapies. This is the core bull case validating the allogeneic platform ahead of the pivotal ANTLER-3 trial.", "ticker": "CRBU"}, {"date": "2026-06-09", "headline": "Perimeter Selected for INOVAIT Pilot Fund to Advance AI for Breast Cancer Surgery", "source": "Perimeter IR / PR Newswire", "url": "https://ir.perimetermed.com/news-events/press-releases/detail/211/", "summary": "Perimeter receives up to ~C$148,000 from the Canadian INOVAIT Pilot Fund plus C$100,000 in Mitacs funding to develop the next AI generation for Claire with the University of Toronto. A small amount, but non-dilutive validation of the AI platform.", "ticker": "PINK"}, {"date": "2026-06-08", "headline": "Perimeter Closes Final Tranche of Non-Brokered Private Placement", "source": "Perimeter IR / PR Newswire", "url": "https://ir.perimetermed.com/news-events/press-releases/detail/210/", "summary": "Final tranche of the convertible-note placement closed: C$6.04M in total. Notably, CEO Mendes subscribed C$2.76M and Chamath's SC Master Holdings (Social Capital) C$2.78M - strong insider alignment, but potential dilution.", "ticker": "PINK"}, {"date": "2026-06-04", "headline": "GeneDx 49% Drop Triggers Investor Scrutiny Over Fabric Genomics Acquisition", "source": "Hagens Berman / PR Newswire", "url": "https://www.prnewswire.com/", "summary": "The start of a broad wave of class-action lawsuits following the 49% share-price crash (May 5) and a $31.2M writedown (roughly 94% of the purchase price) on the Fabric Genomics acquisition. Legal risk and reputational pressure weigh on the stock.", "ticker": "WGS"}, {"date": "2026-05-31", "headline": "Caribou Biosciences (CRBU) Gets a Higher Target as Confidence in Its Pipeline Grows", "source": "Yahoo Finance / Insider Monkey", "url": "https://finance.yahoo.com/quote/CRBU/", "summary": "Sell-side analysts raised targets citing growing pipeline confidence after FDA alignment on ANTLER-3 and CB-011's RMAT designation. Reflects improving analyst sentiment into the EHA catalysts.", "ticker": "CRBU"}, {"date": "2026-05-28", "headline": "NRXS: Record Q1 revenue and expanded coverage drive growth in pediatric and VA neuromodulation markets", "source": "Zacks Small-Cap Research", "url": "https://scr.zacks.com/", "summary": "Analyst update: record Q1 revenue and growing insurance coverage drive the business; alongside pediatrics, the Veterans Affairs market is also cited as a growth area. It confirms the bullish analyst view following the CPT code launch.", "ticker": "NRXS"}, {"date": "2026-05-28", "headline": "Perimeter Announces First Quarter 2026 Financial Results", "source": "Perimeter IR / PR Newswire", "url": "https://ir.perimetermed.com/news-events/press-releases/detail/209/", "summary": "Q1: revenue ~$385k (recurring only, +14% YoY recurring), opex -30% to $3.2M, net loss improved to $3.0M. Critical: cash at end of March only ~$421k - before the ~$7.5M from the LIFE offering in May. First two commercial Claire placements, funnel at ~50 qualified leads.", "ticker": "PINK"}, {"date": "2026-05-27", "headline": "ClearPoint Neuro Enters 10-year Focused Ultrasound Partnership with Sungkyunkwan University, South Korea", "source": "ACCESS Newswire / IR ClearPoint", "url": "https://ir.clearpointneuro.com/", "summary": "A ten-year development partnership in focused ultrasound for opening the blood-brain barrier, expanding the drug-delivery ecosystem and global presence (Asia). It builds out the long-term platform beyond pure navigation.", "ticker": "CLPT"}, {"date": "2026-05-26", "headline": "REZOLVE-AA 16-Week Treatment Extension Data Drives Analyst Price-Target Hikes", "source": "Investing.com / Seeking Alpha", "url": "https://www.investing.com/news/analyst-ratings/jefferies-raises-nektar-therapeutics-price-target-on-alopecia-data-93CH-4630214", "summary": "Strong 16-week extension data from the Phase 2b REZOLVE-AA study in severe alopecia areata triggered several price-target hikes (Jefferies $150, H.C. Wainwright $185, Piper Sandler /* ---- KPI tiles ---- */
function renderKpis(){

  const tiles=[
    {lab:'Portfolio Value', val:fmtUsd(d.totalValue), note:'USD · '+(d.holdings.length-1)+' positions · net cash '+fmtUsd(d.cashValue)+' (PP)'},
    {lab:'Unrealized Gain', val:fmtUsd(d.netGainUnrealized), note:'current holdings · '+fmtPct(d.unrealizedReturn||0), cls:gn?'up':'down'},
    {lab:'Realized Gain', val:fmtUsd(d.realizedAllTime), note:'booked from closed trades', cls:rz?'up':'down'},
    {lab:'Return YTD', val:fmtPct(d.ttwrorYtd||0), note:'since inception (2022) '+fmtPct(d.since2022!=null?d.since2022:(d.pp&&d.pp.ppReferenceTtwror)||0)+'<br>IRR '+(d.izf||0).toFixed(1)+'%', cls:(d.ttwrorYtd||0)>=0?'up':'down'},
  ];

/* ---- portfolio line chart (time-based x-axis with year/month labels) ---- */
function renderChart(){
  const svg=document.getElementById('chart'), tip=document.getElementById('tip');
  const box=svg.getBoundingClientRect(); const W=box.width||900, H=220;
  const pad={l:0,r:0,t:14,b:22};
  const pts=(DATA.chartSeries||DATA.chartYtd).filter(p=>p.v>0);
  if(pts.length<2){svg.innerHTML='';return;}
  const T=d=>new Date(d).getTime();
  const t0=T(pts[0].d), t1=T(pts[pts.length-1].d), tspan=(t1-t0)||1;
  const spanDays=tspan/86400000;
  const vs=pts.map(p=>p.v); const vmin=Math.min(...vs), vmax=Math.max(...vs);
  const X=d=>pad.l + (T(d)-t0)/tspan*(W-pad.l-pad.r);
  const Y=v=>pad.t + (1-(v-vmin)/(vmax-vmin||1))*(H-pad.t-pad.b);
  const line=pts.map((p,i)=>`${i?'L':'M'}${X(p.d).toFixed(1)},${Y(p.v).toFixed(1)}`).join(' ');
  const area=line+` L${X(pts[pts.length-1].d).toFixed(1)},${H-pad.b} L${X(pts[0].d).toFixed(1)},${H-pad.b} Z`;
  const acc=cvar('--accent'), gc=cvar('--grid'), mc=cvar('--muted');
  // y gridlines (value)
  let grid='';
  for(let k=0;k<=3;k++){const v=vmin+(vmax-vmin)*k/3; const y=Y(v).toFixed(1);
    grid+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="${gc}" stroke-width="1"/>`+
          `<text x="4" y="${(+y-4)}" fill="${mc}" font-size="10.5" font-family="system-ui">${fmtUsd(v)}</text>`;}
  // x time axis: year ticks for long spans, month ticks for short
  let xlab='';
  const yb=H-pad.b, ybt=H-5;
  if(spanDays>420){
    const y0=new Date(pts[0].d).getUTCFullYear(), y1=new Date(pts[pts.length-1].d).getUTCFullYear();
    for(let yr=y0+1;yr<=y1;yr++){ const dx=X(yr+'-01-01T00:00:00Z'); if(dx<8||dx>W-8)continue;
      xlab+=`<line x1="${dx.toFixed(1)}" y1="${pad.t}" x2="${dx.toFixed(1)}" y2="${yb}" stroke="${gc}" stroke-width="1" stroke-dasharray="2 3"/>`+
            `<text x="${(dx+3).toFixed(1)}" y="${ybt}" fill="${mc}" font-size="10.5" font-family="system-ui">${yr}</text>`;}
  } else {
    const step = spanDays>200?2:1;   // months between labels
    let cur=new Date(pts[0].d); cur=new Date(Date.UTC(cur.getUTCFullYear(),cur.getUTCMonth()+1,1));
    const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    while(cur.getTime()<=t1){ const dx=X(cur.toISOString()); if(dx>8&&dx<W-8){
      xlab+=`<line x1="${dx.toFixed(1)}" y1="${pad.t}" x2="${dx.toFixed(1)}" y2="${yb}" stroke="${gc}" stroke-width="1" stroke-dasharray="2 3"/>`+
            `<text x="${(dx+3).toFixed(1)}" y="${ybt}" fill="${mc}" font-size="10.5" font-family="system-ui">${MN[cur.getUTCMonth()]}${cur.getUTCMonth()===0?" '"+String(cur.getUTCFullYear()).slice(2):''}</text>`;}
      cur=new Date(Date.UTC(cur.getUTCFullYear(),cur.getUTCMonth()+step,1)); }
  }
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML = grid + xlab +
    `<defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
       <stop offset="0" stop-color="${acc}" stop-opacity="0.18"/>
       <stop offset="1" stop-color="${acc}" stop-opacity="0"/></linearGradient></defs>`+
    `<path d="${area}" fill="url(#g)"/>`+
    `<path d="${line}" fill="none" stroke="${acc}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>`+
    `<circle cx="${X(pts[pts.length-1].d).toFixed(1)}" cy="${Y(pts[pts.length-1].v).toFixed(1)}" r="4" fill="${acc}" stroke="${cvar('--surface')}" stroke-width="2"/>`+
    `<line class="cross" id="cx" x1="0" y1="${pad.t}" x2="0" y2="${yb}" style="opacity:0"/>`+
    `<circle id="cd" r="4.5" fill="${acc}" stroke="${cvar('--surface')}" stroke-width="2" style="opacity:0"/>`;
  const cx=svg.querySelector('#cx'), cd=svg.querySelector('#cd');
  function move(e){
    const r=svg.getBoundingClientRect();
    const mx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const targT=t0 + Math.max(0,Math.min(1,mx/r.width))*tspan;
    let bi=0,bd=1e18; for(let i=0;i<pts.length;i++){const dd=Math.abs(T(pts[i].d)-targT); if(dd<bd){bd=dd;bi=i;}}
    const p=pts[bi], px=X(p.d), py=Y(p.v);
    cx.setAttribute('x1',px);cx.setAttribute('x2',px);cx.style.opacity=1;
    cd.setAttribute('cx',px);cd.setAttribute('cy',py);cd.style.opacity=1;
    tip.style.opacity=1; tip.style.left=(px/W*r.width)+'px'; tip.style.top=(py/H*r.height)+'px';
    const dt=new Date(p.d).toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'});
    tip.innerHTML=`<span class="tv">${fmtUsd(p.v)}</span> · ${dt}`;
  }
  svg.addEventListener('mousemove',move);
  svg.addEventListener('touchmove',move,{passive:true});
  svg.addEventListener('mouseleave',()=>{cx.style.opacity=0;cd.style.opacity=0;tip.style.opacity=0;});
}

/* ---- sparkline (per card) ---- */
function sparkSvg(spark, up){
  if(!spark||spark.length<2) return '';
  const W=200,H=34,p=3;
  const mn=Math.min(...spark), mx=Math.max(...spark);
  const X=i=>p+(i/(spark.length-1))*(W-2*p);
  const Y=v=>p+(1-(v-mn)/(mx-mn||1))*(H-2*p);
  const col=up?cvar('--up'):cvar('--down');
  const d=spark.map((v,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="${col}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${X(spark.length-1).toFixed(1)}" cy="${Y(spark[spark.length-1]).toFixed(1)}" r="2.6" fill="${col}"/></svg>`;
}

/* ---- allocation donut ---- */
function renderAlloc(){
  const el=document.getElementById('allocdonut'); if(!el) return;
  const hs=[...DATA.holdings].filter(h=>h.value>0).sort((a,b)=>b.value-a.value);
  const total=hs.reduce((s,h)=>s+h.value,0)||1;
  const cx=90,cy=90,r=78,rin=50; let a0=-Math.PI/2, segs='';
  const colOf=h=>h.assetType==='cash'?cvar('--muted'):colorFor(tIdx(h.ticker));
  hs.forEach(h=>{
    const frac=h.value/total, a1=a0+frac*2*Math.PI;
    const gap=frac>0.008?0.018:0;                       // small surface gap between slices
    const b0=a0+gap, b1=a1-gap;
    const x0=cx+r*Math.cos(b0), y0=cy+r*Math.sin(b0), x1=cx+r*Math.cos(b1), y1=cy+r*Math.sin(b1);
    const xi1=cx+rin*Math.cos(b1), yi1=cy+rin*Math.sin(b1), xi0=cx+rin*Math.cos(b0), yi0=cy+rin*Math.sin(b0);
    const laf=(b1-b0)>Math.PI?1:0;
    segs+=`<path d="M${x0.toFixed(2)},${y0.toFixed(2)} A${r},${r} 0 ${laf} 1 ${x1.toFixed(2)},${y1.toFixed(2)} L${xi1.toFixed(2)},${yi1.toFixed(2)} A${rin},${rin} 0 ${laf} 0 ${xi0.toFixed(2)},${yi0.toFixed(2)} Z" fill="${colOf(h)}"/>`;
    a0=a1;
  });
  const legend=hs.map(h=>`<div class="lg"><span class="dot" style="background:${colOf(h)}"></span>
    <span class="lt">${esc(h.ticker)}</span><span class="lp tnum">${(100*h.value/total).toFixed(1)}%</span></div>`).join('');
  el.innerHTML=`<div class="donutwrap">
    <svg viewBox="0 0 180 180" class="donut">${segs}
      <text x="90" y="86" text-anchor="middle" fill="${cvar('--ink')}" font-size="20" font-weight="700" font-family="system-ui">${fmtUsd(total).replace('$','$')}</text>
      <text x="90" y="104" text-anchor="middle" fill="${cvar('--muted')}" font-size="11" font-family="system-ui">${hs.length} positions</text></svg>
    <div class="legend">${legend}</div></div>`;
}

      <div class="pfbar"><div class="pfmid"></div>
        <div class="pffill" style="${up?'left:50%':'right:50%'};width:${w}%;background:${col}"></div></div>
      <div class="pfv tnum ${up?'up':'down'}">${fmtPct(v)}</div></div>`;
  }).join('');
}

/* ---- catalyst timeline ---- */
function catKey(w){
  w=(w||'').toLowerCase().trim();
  let m;
  if(m=w.match(/(20\d{2})-(\d{2})-(\d{2})/)) return m[1]+m[2]+m[3];          // exact date
  if(m=w.match(/(20\d{2})-(\d{2})(?!\d)/)) return m[1]+m[2]+'15';            // year-month
  if(m=w.match(/(20\d{2})[ -]*q([1-4])/)) return m[1]+['','03','06','09','12'][+m[2]]+'15';
  if(m=w.match(/q([1-4])[ -]*(20\d{2})/)) return m[2]+['','03','06','09','12'][+m[1]]+'15';
  const yr=(w.match(/(20\d{2})/)||[])[1];
  const mo={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  if(yr && (m=w.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/))){
    let d=15; if(/early/.test(w))d=5; else if(/late/.test(w))d=25;
    return yr+String(mo[m[1]]).padStart(2,'0')+String(d).padStart(2,'0');
  }
  if(yr){
    if(/h2|2h|second half/.test(w)) return yr+'0815';
    if(/h1|1h|first half/.test(w)) return yr+'0215';
    if(/\bend\b|year[- ]?end/.test(w)) return yr+'1215';
    if(/early/.test(w)) return yr+'0215';
    if(/mid/.test(w)) return yr+'0630';
    return yr+'1231';        // vague (bare year / ongoing / FY / multi-year) -> after concrete dates in that year
  }
  return '99999999';
}
function renderTimeline(){
  const cats=[...DATA.catalysts].sort((a,b)=>catKey(a.when).localeCompare(catKey(b.when)));
  document.getElementById('timeline').innerHTML = cats.map(c=>{

}

async function fetchYahoo(sym){
  // BARE path (no query string) — jina reliably proxies this; querystring URLs get
  // rate-blocked. Default range is 1d intraday, so we get a live today-sparkline +
  // meta.chartPreviousClose for the day-change.
  const url=JINA+"https://query1.finance.yahoo.com/v8/finance/chart/"+sym;
  const r=await fetch(url); const t=await r.text();
  const j=t.indexOf('{"chart"'); if(j<0) throw new Error('nojson');
  const d=JSON.parse(t.slice(j)); const res=d.chart.result[0]; const m=res.meta;
  const cl=(res.indicators.quote[0].close||[]).filter(x=>x!=null);
  const step=Math.max(1,Math.floor(cl.length/40));
  const spark=[]; for(let k=0;k<cl.length;k+=step) spark.push(+cl[k].toFixed(4));
  if(cl.length && spark[spark.length-1]!==+cl[cl.length-1].toFixed(4)) spark.push(+cl[cl.length-1].toFixed(4));
  return {price:m.regularMarketPrice, prevClose:m.chartPreviousClose,
          hi52:m.fiftyTwoWeekHigh, lo52:m.fiftyTwoWeekLow, spark, ccy:m.currency};
}

async function refreshPrices(){
  const secs=DATA.holdings.filter(h=>h.assetType!=='cash');
  if(secs.some(h=>h.liveCcy&&h.liveCcy!=='USD')){
    try{const fx=await fetchYahoo("CAD=X"); if(fx.price) liveState.fx=fx.price;}catch(e){}
  }
  // Yahoo is now COSMETIC only: intraday % + sparkline + 52w range. Values/returns come from Parqet.
  const results=await Promise.allSettled(secs.map(h=>fetchYahoo(h.ySym)));
  let any=false;
  results.forEach((r,idx)=>{
    if(r.status!=='fulfilled'||!r.value.price) return;
    any=true; const h=secs[idx], y=r.value;
    h.livePrice=+y.price.toFixed(y.price<1?4:2);
    const pc=y.prevClose||y.price;
    h.dayChange = pc? +(((y.price-pc)/pc)*100).toFixed(2):0;
    if(y.hi52) h.hi52=y.hi52; if(y.lo52) h.lo52=y.lo52;
    if(h.hi52&&h.lo52&&h.hi52>h.lo52) h.pos52=+(((y.price-h.lo52)/(h.hi52-h.lo52))*100).toFixed(1);
    if(y.spark&&y.spark.length>1) h.spark=y.spark;
  });
  if(!any) return;
  liveState.lastPrice=new Date();
  renderHoldings(); setBadge();
}

/* ---- LIVE PORTFOLIO from Parqet (holdings, values, gains, IRR) ---- */
async function refreshParqet(){
  const r=await fetch("https://api.parqet.com/v1/portfolios/assemble?useInclude=true&include=xirr&include=ttwror",
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({portfolioIds:[DATA.portfolioId],timeframe:"max",currency:"USD"})});
  if(!r.ok) return;
  const j=await r.json(); const P=j.performance||{};
  const byId={}; (j.holdings||[]).forEach(h=>{ if(h.position&&h.position.currentValue>0) byId[h._id]=h; });
  // portfolio-level (total is recomputed below: Parqet securities + PP cash + option)
  if(P.unrealized){ DATA.netGainUnrealized=Math.round(P.unrealized.gainNet); DATA.unrealizedReturn=+P.unrealized.returnNet.toFixed(1); }
  if(P.realized) DATA.realizedAllTime=Math.round(P.realized.gainNet);
  // NOTE: return figures (ttwrorYtd / since2022 / izf) come from the PP-exact
  // engine (pp_sync.py over depot.xml) and are NOT overwritten by Parqet
  // anymore (Rafael 2026-07-11: "Parqet rechnet falsch").
  // per-holding from Parqet (cash + NVO option stay as built from Portfolio Performance)
  DATA.holdings.forEach(h=>{
    const pq=byId[h.pid]; if(!pq) return;
    h.value=Math.round(pq.position.currentValue);
    const up=pq.performance&&pq.performance.unrealized;
    if(up){ h.unrealizedReturn=+up.returnNet.toFixed(1); h.totalGainNet=Math.round(up.gainNet); }
  });
  // total = live Parqet securities + PP option + PP net cash (can be negative = margin)
  DATA.totalValue=Math.round(DATA.holdings.reduce((s,h)=>s+h.value,0));
  DATA.cashPct=+(100*DATA.cashValue/DATA.totalValue).toFixed(1);
  DATA.holdings.forEach(h=>{ h.alloc=+(100*h.value/DATA.totalValue).toFixed(1); });
  liveState.lastParqet=new Date();
  renderKpis(); renderAlloc(); renderPerfBars(); renderHoldings(); setBadge();
}

const TFS=[{k:'max',l:'Since inception'},{k:'ytd',l:'YTD'},{k:'1y',l:'1Y'},{k:'6m',l:'6M'},{k:'3m',l:'3M'},{k:'1m',l:'1M'}];

async function refreshChart(tf){
  const r=await fetch("https://api.parqet.com/v1/portfolios/assemble?useInclude=true&include=ttwror&include=performance_charts",
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({portfolioIds:[DATA.portfolioId],timeframe:tf,currency:"USD"})});
  if(!r.ok) return;
  const j=await r.json();
  const series=(j.charts||[]).map(c=>({d:c.date.slice(0,10), v:c.values&&c.values.history})).filter(p=>p.v>0);
  if(series.length>1){ DATA.chartSeries=series; renderChart(); }
  const tw=j.performance&&j.performance.ttwror;
  const lab=(TFS.find(t=>t.k===tf)||{}).l||tf;
  const el=document.getElementById('chart-ret');
  if(el && tw!=null){ const up=tw>=0;
    el.innerHTML=`<span class="rl">TTWROR ${esc(lab)}</span> <span class="rv ${up?'up':'down'}">${fmtPct(tw)}</span>`; }
}

function gdeltDate(s){ return (s&&s.length>=8)? s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8):''; }
async function fetchGdelt(q){
  const u="https://api.gdeltproject.org/api/v2/doc/doc?query="+encodeURIComponent('"'+q+'"')+
    "&mode=ArtList&maxrecords=12&format=json&sort=DateDesc&sourcelang=english";
  const r=await fetch(u); const j=await r.json(); return j.articles||[];
}
async function refreshNews(){
  const secs=DATA.holdings.filter(h=>h.assetType!=='cash');
  const results=await Promise.allSettled(secs.map(h=>fetchGdelt(h.gquery).then(a=>({h,a}))));
  const all=[];
  results.forEach(r=>{ if(r.status!=='fulfilled')return; const {h,a}=r.value;
    a.forEach(art=>{
      const dom=(art.domain||'').replace(/^www\./,'');
      if(!NEWS_DOMAINS.has(dom)) return;
      const title=(art.title||'').trim(); if(title.length<15) return;
      all.push({ticker:h.ticker, headline:title, url:art.url, source:dom, date:gdeltDate(art.seendate)});
    });
  });
  // Merge fresh GDELT headlines on top of the curated research feed (curated is
  // always substantive; GDELT adds whatever is newer). Dedupe by title, newest first.
  const combined=[...all, ...DATA.latestNews];
  combined.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const seen=new Set(), dedup=[];
  for(const n of combined){ const k=(n.headline||'').slice(0,55).toLowerCase().replace(/[^a-z0-9]/g,'');
    if(!k||seen.has(k))continue; seen.add(k); dedup.push(n); if(dedup.length>=25)break; }
  liveState.news=dedup; liveState.lastNews=new Date();
  renderFeed(); setBadge();
}

/* ---- Social feed (Stocktwits via jina proxy) ---- */
function relTime(iso){
  const then=new Date(iso).getTime(), now=Date.now(), m=Math.round((now-then)/60000);
  if(m<1)return 'now'; if(m<60)return m+'m'; const h=Math.round(m/60); if(h<24)return h+'h'; return Math.round(h/24)+'d';
}
async function fetchStocktwits(tk){
  const r=await fetch(JINA+"https://api.stocktwits.com/api/2/streams/symbol/"+tk+".json");
  const t=await r.text(); const i=t.indexOf('{"symbol"'); if(i<0) throw new Error('no');
  const d=JSON.parse(t.slice(i)); return d.messages||[];
}
function renderSocial(){
  const items=(liveState.social||[]).slice(0,24);
  const el=document.getElementById('social'); if(!el) return;
  el.classList.add('feedmax');
  if(!items.length){ el.innerHTML='<div class="fm" style="padding:8px 2px;color:var(--muted)">Loading live Stocktwits…</div>'; return; }
  el.innerHTML=items.map(m=>{
    const i=tIdx(m.ticker), col=i>=0?colorFor(i):cvar('--muted');
    const sent=m.sentiment==='Bullish'?'<span class="sent bull">BULL</span>':m.sentiment==='Bearish'?'<span class="sent bear">BEAR</span>':'';
    return `<div class="si">
      <div class="sm"><span class="tkr" style="background:${col}">${esc(m.ticker)}</span>
        <span class="su">@${esc(m.user)}</span>${sent}<span class="stime">${relTime(m.time)}</span></div>
      <div class="sb">${esc(m.body)}</div></div>`;
  }).join('');
}
let _socialIdx=0;
async function refreshSocial(){
  // ROUND-ROBIN: the jina proxy rate-limits bursts (429), so fetch only 3 tickers
  // per cycle (sequential, small gap) and cache per ticker. Full rotation ~8 min;
  // every ticker stays fresh without tripping the limiter.
  const secs=DATA.holdings.filter(h=>h.assetType!=='cash'&&h.assetType!=='option');
  liveState.socialBy=liveState.socialBy||{};
  const batch=[];
  for(let k=0;k<3&&k<secs.length;k++) batch.push(secs[(_socialIdx+k)%secs.length]);
  _socialIdx=(_socialIdx+3)%Math.max(1,secs.length);
  let gotAny=false;
  for(const h of batch){
    try{
      const a=await fetchStocktwits(h.ticker);
      const msgs=[];
      a.forEach(m=>{
        const body=(m.body||'').trim();
        if((body.match(/\$[A-Za-z.]+/g)||[]).length>4) return;   // spammy multi-ticker blasts
        if(body.length<8) return;
        msgs.push({ticker:h.ticker, user:m.user&&m.user.username, body,
          time:m.created_at, sentiment:m.entities&&m.entities.sentiment&&m.entities.sentiment.basic,
          likes:(m.likes&&m.likes.total)||0});
      });
      if(msgs.length){ liveState.socialBy[h.ticker]=msgs; gotAny=true; }
    }catch(e){}
    await new Promise(r=>setTimeout(r,700));
  }
  if(!gotAny && !Object.keys(liveState.socialBy).length) return;
  const all=Object.values(liveState.socialBy).flat();
  all.sort((a,b)=>new Date(b.time)-new Date(a.time));
  liveState.social=all.slice(0,40); liveState.lastSocial=new Date();
  renderSocial(); setBadge();
}

function startLive(){
  // initial pulls + intervals; each guarded so one failure never breaks the page
  refreshParqet().catch(()=>{}); refreshChart(curTf).catch(()=>{});
  refreshPrices().catch(()=>{}); refreshNews().catch(()=>{}); refreshSocial().catch(()=>{});
  setInterval(()=>refreshParqet().catch(()=>{}), 120000);   // portfolio (Parqet) every 2 min
  setInterval(()=>refreshChart(curTf).catch(()=>{}), 300000); // value curve refresh every 5 min
  setInterval(()=>refreshPrices().catch(()=>{}), 180000);   // intraday prices (Yahoo) every 3 min
  setInterval(()=>refreshSocial().catch(()=>{}), 120000);   // social (Stocktwits) every 2 min
  setInterval(()=>refreshNews().catch(()=>{}), 900000);     // news (GDELT) every 15 min
}
