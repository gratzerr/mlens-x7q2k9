/* ===== PERFORMANCE TAB: configurable widget dashboard (modeled on PP's WidgetFactory) =====
   Every widget carries its own settings: a full PP-style reporting period (relative,
   specific year, since-date, from–to), benchmarks (incl. user-added tickers), colors.
   Reorder via drag & drop. Layout persists in localStorage 'pc-pfw'. Formulas: PP Risk.java. */
const BENCH_BASE={SPY:{label:'S&P 500',col:'#6d92c4'},QQQ:{label:'Nasdaq 100',col:'#bd93b4'},
  XBI:{label:'Biotech (XBI)',col:'#f0a955'},'VWCE.DE':{label:'All-World',col:'#5bb98c'}};

  let ci=0;

const PF_REL=[['all','All data'],['ytd','Year to date'],['1m','1 month'],['3m','3 months'],['6m','6 months'],['1y','1 year'],['2y','2 years'],['3y','3 years'],['5y','5 years']];
const PF_SCHEMES=[['classic','Green / Red'],['traffic','Traffic light'],['blue','Blue / Orange'],['mono','Monochrome']];

/* ---- reporting periods (PP ReportingPeriod equivalents) ---- */
function normP(p){
  if(!p) return {k:'rel',v:'all'};
  if(typeof p==='string') return {k:'rel',v:(p==='max'?'all':p)};
  return p;
}
function pLabel(p){
  p=normP(p);
  if(p.k==='rel') return (PF_REL.find(x=>x[0]===p.v)||['','All data'])[1];
  if(p.k==='year') return 'Year '+p.y;
  if(p.k==='since') return 'since '+p.from;
  if(p.k==='range') return p.from+' → '+p.to;
  return 'All data';
}
function pfSliceP(p){
  p=normP(p);
  const s=(DATA.chartPP||[]).filter(x=>x.v>0);
  if(!s.length) return s;
  const last=s[s.length-1].d;
  let from=null, to=null;
  if(p.k==='rel'){
    if(p.v==='all') return s;
    if(p.v==='ytd') from=last.slice(0,4)+'-01-01';
    else{ const days={'1m':30,'3m':91,'6m':182,'1y':365,'2y':730,'3y':1095,'5y':1825}[p.v]||0;
      from=new Date(new Date(last).getTime()-days*86400000).toISOString().slice(0,10); }
  } else if(p.k==='year'){ from=p.y+'-01-01'; to=p.y+'-12-31'; }
  else if(p.k==='since'){ from=p.from; }
  else if(p.k==='range'){ from=p.from; to=p.to; }
  let arr=s;
  if(to) arr=arr.filter(x=>x.d<=to);
  if(from){ const i=arr.findIndex(x=>x.d>=from); arr=i<=0?arr:arr.slice(i-1); }
  return arr;
}
function isWeekday(d){ const wd=new Date(d+'T00:00:00Z').getUTCDay(); return wd>=1&&wd<=5; }
function ppVolatility(rets){   // PP Risk.java: stddev of log returns, scaled sqrt(n)
  if(rets.length<2) return {vol:0,semi:0,daily:0,n:0};
  const logs=rets.map(r=>Math.log(1+r));
  const avg=logs.reduce((a,b)=>a+b,0)/logs.length;
  let s=0, semi=0;
  logs.forEach(l=>{ const a=(l-avg)*(l-avg); s+=a; if(l<avg) semi+=a; });
  const n=logs.length;
  return {vol:Math.sqrt(s/(n-1)*n), semi:Math.sqrt(semi/(n-1)*n), daily:Math.sqrt(s/(n-1)), n};
}
function ppDrawdown(pts){      // PP Risk.java: peak tracking on (1+accumulated return)
  let peak=-1e18, peakDate=null, maxDD=0, ddFrom=null, ddTo=null, maxDur=0, durFrom=null, durTo=null;
  let lastPeakDate=pts.length?pts[0].d:null;
  const serie=[];
  pts.forEach(p=>{
    const v=1+p.r;
    if(v>peak){
      const dur=(new Date(p.d)-new Date(lastPeakDate))/86400000;
      if(dur>maxDur){ maxDur=dur; durFrom=lastPeakDate; durTo=p.d; }
      peak=v; peakDate=p.d; lastPeakDate=p.d; serie.push({d:p.d,y:0});
    }else{
      const dd=(peak-v)/peak;
      serie.push({d:p.d,y:-dd*100});
      if(dd>maxDD){ maxDD=dd; ddFrom=peakDate; ddTo=p.d; }
      const dur=(new Date(p.d)-new Date(lastPeakDate))/86400000;
      if(dur>maxDur){ maxDur=dur; durFrom=lastPeakDate; durTo=p.d; }
    }
  });
  const cur=serie.length?-serie[serie.length-1].y/100:0;
  return {maxDD, ddFrom, ddTo, maxDur:Math.round(maxDur), durFrom, durTo, serie, cur};
}
function benchSeries(sym,pts){
  const raw=(DATA.bench||{})[sym]; if(!raw||!raw.length||!pts.length) return null;
  const start=pts[0].d, end=pts[pts.length-1].d;
  let base=null; const out=[];
  for(const [d,c] of raw){
    if(d<start){ base=c; continue; }
    if(d>end) break;
    if(base===null) base=c;
    out.push({d, r:c/base-1});
  }
  return out.length>5?out:null;
}
function pfMetrics(p){
  const pts=pfSliceP(p); if(pts.length<2) return null;
  const val=x=>(_ccy==='EUR'&&x.e!=null)?x.e:x.v;
  const contrib=x=>(_ccy==='EUR'?(x.k||0):(x.c||0));
  const r0=pts[0].r, r1=pts[pts.length-1].r;
  const tt=(1+r1)/(1+r0)-1;
  const days=(new Date(pts[pts.length-1].d)-new Date(pts[0].d))/86400000;
  const rets=[]; for(let i=1;i<pts.length;i++){ if(isWeekday(pts[i].d)) rets.push((1+pts[i].r)/(1+pts[i-1].r)-1); }
  const v=ppVolatility(rets.filter(r=>r!==0));
  const dd=ppDrawdown(pts);
  let li=pts.length-1; while(li>1&&pts[li].r===pts[li-1].r) li--;
  return {pts, tt, days, ann:days>90?Math.pow(1+tt,365/days)-1:null,
    absCh:val(pts[pts.length-1])-val(pts[0]),
    delta:(val(pts[pts.length-1])-val(pts[0]))-(contrib(pts[pts.length-1])-contrib(pts[0])),
    endVal:val(pts[pts.length-1]),
    vol:v.vol, semi:v.semi, volDaily:v.daily, dd,
    lastR:(1+pts[li].r)/(1+pts[li-1].r)-1, lastAbs:val(pts[li])-val(pts[li-1]), lastD:pts[li].d};
}
function heatColor(scheme,v){
  const x=Math.max(-15,Math.min(15,v)), dark=isDarkTheme();
  if(scheme==='traffic'){
    const h=v>=0?Math.min(120,90+v*4):Math.max(0,60+v*6);
    return `hsl(${h} 70% ${dark?30:62}%)`;
  }
  if(scheme==='blue') return v>=0?`hsl(214 60% ${dark?28+(15-x)*1.5:90-x*2.6}%)`:`hsl(28 80% ${dark?26+(15+x)*1.2:90+x*2.4}%)`;
  if(scheme==='mono') return `hsl(214 10% ${dark?20+(x+15)*1.2:95-(x+15)*1.4}%)`;
  return v>=0?`hsl(145 65% ${dark?22+(15-x)*1.4:88-x*2.4}%)`:`hsl(0 70% ${dark?24+(15+x)*1.2:88+x*2.2}%)`;
}

/* owner: persist the custom benchmark list for everyone (cloud fetches it) */
async function saveBenchList(list){
  if(!_user) return false;
  try{
    const body={fields:{benchmarks:{arrayValue:{values:list.map(s=>({stringValue:s}))}}}};
    const r=await fetch(FS_DOC+'?updateMask.fieldPaths=benchmarks&key='+FB_CFG.apiKey,
      {method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+await _user.getIdToken()},
       body:JSON.stringify(body)});
    if(r.ok){ _cfg.benchmarks=list; return true; }
  }catch(e){}
  return false;
}
function renderPerf(){
  const grid=document.getElementById('pf-grid'); if(!grid) return;
  grid.innerHTML=pfW.map((w,i)=>{
    const def=PF_WIDGETS[w.t];
    const per=def.opts.includes('p')?`<span class="pfw-per">${pLabel(w.p)}</span>`:'';
    return `<div class="panel pfw ${def.big?'pfw-b':'pfw-s'}" data-wi="${i}" draggable="true">
      <div class="pfw-head"><h2 style="margin:0">${def.lab} ${per}</h2>
        <span class="pfw-ctl">
          ${def.opts.length?'<button data-cfg title="settings">⚙</button>':''}
          <button data-rm title="remove">×</button></span></div>
      <div class="pfw-body">${def.render(w)}</div>
      <div class="pfw-pop" style="display:none"></div>
    </div>`;
  }).join('');
  // drag & drop reorder
  let dragI=null;
  grid.querySelectorAll('.pfw').forEach(card=>{
    card.addEventListener('dragstart',e=>{ dragI=+card.dataset.wi; card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move'; });
    card.addEventListener('dragend',()=>{ card.classList.remove('dragging');
      grid.querySelectorAll('.pfw').forEach(c=>c.classList.remove('dragover')); });
    card.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move';
      if(+card.dataset.wi!==dragI) card.classList.add('dragover'); });
    card.addEventListener('dragleave',()=>card.classList.remove('dragover'));
    card.addEventListener('drop',e=>{
      e.preventDefault();
      const j=+card.dataset.wi;
      if(dragI===null||j===dragI) return;
      const [mv]=pfW.splice(dragI,1); pfW.splice(j,0,mv);
      dragI=null; pfSave(); renderPerf();
    });
  });
  // per-widget handlers
  grid.querySelectorAll('.pfw').forEach(card=>{
    const i=+card.dataset.wi, w=pfW[i], def=PF_WIDGETS[w.t];
    if(def.after) def.after(w,card);
    card.querySelector('[data-rm]').addEventListener('click',()=>{ pfW.splice(i,1); pfSave(); renderPerf(); });
    const cfgBtn=card.querySelector('[data-cfg]');
    if(cfgBtn) cfgBtn.addEventListener('click',e=>{
      e.stopPropagation();
      const pop=card.querySelector('.pfw-pop');
      if(pop.style.display!=='none'){ pop.style.display='none'; return; }
      const p=normP(w.p);
      let html='';
      if(def.opts.includes('p')){
        const yearsAvail=[...new Set((DATA.chartPP||[]).map(x=>x.d.slice(0,4)))];
        html+=`<div class="pfw-lbl">Reporting period</div><select data-per>
          <optgroup label="Relative">${PF_REL.map(([k,l])=>`<option value="rel:${k}" ${p.k==='rel'&&p.v===k?'selected':''}>${l}</option>`).join('')}</optgroup>
          <optgroup label="Year">${yearsAvail.map(y=>`<option value="year:${y}" ${p.k==='year'&&String(p.y)===y?'selected':''}>Year ${y}</option>`).join('')}</optgroup>
          <optgroup label="Custom"><option value="since" ${p.k==='since'?'selected':''}>Since date…</option>
          <option value="range" ${p.k==='range'?'selected':''}>From – to…</option></optgroup></select>
          <div class="pfw-dates" style="display:${p.k==='since'||p.k==='range'?'block':'none'}">
            <input type="date" data-from value="${p.from||''}" style="margin-bottom:4px">
            <input type="date" data-to value="${p.to||''}" style="display:${p.k==='range'?'block':'none'}">
          </div>`;
      }
      if(def.opts.includes('bench')){
        const BM=benchMeta();
        html+=`<div class="pfw-lbl">Benchmarks</div>`+Object.entries(BM).map(([s,m])=>{
          const has=!!(DATA.bench||{})[s];
          return `<label style="display:flex;gap:7px;align-items:center;padding:2px 0;font-size:12.5px">
            <input type="checkbox" data-bch="${s}" ${(w.bench||[]).includes(s)?'checked':''} ${has?'':'disabled'}>
            <span style="color:${m.col}">●</span> ${esc(m.label)}${has?'':' <span style="color:var(--muted)">(loading…)</span>'}
            ${m.custom&&isOwner()?`<button data-bdel="${s}" style="border:0;background:none;color:var(--muted);cursor:pointer;margin-left:auto">×</button>`:''}</label>`;
        }).join('')+
        `<div style="display:flex;gap:6px;margin-top:6px">
           <input type="text" data-bnew placeholder="+ ticker (e.g. IWM, DAX…)" maxlength="12" style="flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font:inherit;font-size:12px;color:var(--ink)">
         </div>
         <div data-bmsg style="font-size:11px;color:var(--muted);margin-top:4px">${isOwner()?'Enter drücken — Kurse laden in wenigen Minuten':'sign in as owner to add benchmarks'}</div>`;
      }
      if(def.opts.includes('scheme')) html+=`<div class="pfw-lbl">Colors</div><select data-scheme>${PF_SCHEMES.map(([k,l])=>`<option value="${k}" ${w.scheme===k?'selected':''}>${l}</option>`).join('')}</select>`;
      pop.innerHTML=html; pop.style.display='block';
      pop.addEventListener('click',e2=>e2.stopPropagation());
      const applyPeriod=()=>{
        const sel=pop.querySelector('[data-per]'); if(!sel) return;
        const v=sel.value, from=pop.querySelector('[data-from]'), to=pop.querySelector('[data-to]');
        const dates=pop.querySelector('.pfw-dates');
        if(v.startsWith('rel:')){ w.p={k:'rel',v:v.slice(4)}; dates.style.display='none'; pfSave(); renderPerf(); }
        else if(v.startsWith('year:')){ w.p={k:'year',y:+v.slice(5)}; dates.style.display='none'; pfSave(); renderPerf(); }
        else if(v==='since'){ dates.style.display='block'; to.style.display='none';
          if(from.value){ w.p={k:'since',from:from.value}; pfSave(); renderPerf(); } }
        else if(v==='range'){ dates.style.display='block'; to.style.display='block';

      const perSel=pop.querySelector('[data-per]');
      if(perSel){ perSel.addEventListener('change',applyPeriod);
        pop.querySelectorAll('[data-from],[data-to]').forEach(x=>x.addEventListener('change',applyPeriod)); }
      const sch=pop.querySelector('[data-scheme]');
      if(sch) sch.addEventListener('change',()=>{ w.scheme=sch.value; pfSave(); renderPerf(); });
      pop.querySelectorAll('[data-bch]').forEach(c=>c.addEventListener('change',()=>{
        w.bench=[...pop.querySelectorAll('[data-bch]')].filter(x=>x.checked).map(x=>x.dataset.bch);
        pfSave(); renderPerf(); }));
      pop.querySelectorAll('[data-bdel]').forEach(b=>b.addEventListener('click',async()=>{
        const list=(_cfg.benchmarks||[]).filter(s=>s!==b.dataset.bdel);
        if(await saveBenchList(list)) renderPerf();
      }));
      const bnew=pop.querySelector('[data-bnew]');
      if(bnew) bnew.addEventListener('keydown',async e2=>{
        if(e2.key!=='Enter') return;
        const sym=bnew.value.trim().toUpperCase(); if(!sym) return;
        const msg=pop.querySelector('[data-bmsg]');
        if(!isOwner()){ msg.textContent='sign in as owner first'; msg.style.color='var(--down)'; return; }
        const list=[...new Set([...(_cfg.benchmarks||[]),sym])];
        msg.textContent='saving…';
        if(await saveBenchList(list)){ msg.textContent='✓ added — data live in a few minutes'; msg.style.color='var(--up)';
          w.bench=[...new Set([...(w.bench||[]),sym])]; pfSave(); }
        else { msg.textContent='save failed'; msg.style.color='var(--down)'; }
      });
    });
  });
}

    let pop=document.getElementById('pfw-addpop');
    if(pop){ pop.remove(); return; }
    pop=document.createElement('div'); pop.id='pfw-addpop'; pop.className='htpop';
    pop.style.cssText='display:block;position:absolute;right:0;top:38px;max-height:320px;overflow-y:auto;z-index:60';
    pop.innerHTML=Object.entries(PF_WIDGETS).map(([k,d])=>
      `<div class="pfw-additem" data-add="${k}">${d.lab}</div>`).join('');
    add.parentElement.style.position='relative';
    add.parentElement.appendChild(pop);
    pop.querySelectorAll('[data-add]').forEach(x=>x.addEventListener('click',()=>{
      const t=x.dataset.add, def=PF_WIDGETS[t];
      const w={t}; if(def.opts.includes('p')) w.p={k:'rel',v:'all'};
      if(def.opts.includes('bench')) w.bench=['SPY'];
      if(def.opts.includes('scheme')) w.scheme='classic';
      pfW.push(w); pfSave(); pop.remove(); renderPerf();
    }));
  });
  document.getElementById('pfw-reset').addEventListener('click',()=>{
    pfW=JSON.parse(JSON.stringify(PF_DEFAULT)); pfSave(); renderPerf();
  });
  document.addEventListener('click',()=>{
    const p=document.getElementById('pfw-addpop'); if(p) p.remove();
    document.querySelectorAll('.pfw-pop').forEach(x=>x.style.display='none');
  });
}
function drawPerfChart(w,card){
  const svg=card.querySelector('svg.pfw-chart'), tip=card.querySelector('.tip');
  const m=pfMetrics(w.p); if(!m) return;
  const pts=m.pts, r0=pts[0].r, BM=benchMeta();
  const lines=[{name:'Portfolio',col:cvar('--ink'),pts:pts.map(p=>({d:p.d,y:((1+p.r)/(1+r0)-1)*100})),w:2.4}];
  (w.bench||[]).forEach(s=>{ const b=benchSeries(s,pts);
    if(b&&BM[s]) lines.push({name:BM[s].label,col:BM[s].col,pts:b.map(p=>({d:p.d,y:p.r*100})),w:1.8}); });
  drawLines(svg,tip,lines,pts);
  const lg=card.querySelector('.pfw-legend');
  if(lg) lg.innerHTML=lines.map(l=>{ const last=l.pts[l.pts.length-1];
    return `<span><span style="display:inline-block;width:16px;height:3px;background:${l.col};border-radius:2px;vertical-align:3px;margin-right:6px"></span>${esc(l.name)} <b class="tnum ${last.y>=0?'up':'down'}">${fmtPct(last.y)}</b></span>`; }).join('');
}
function drawDDChart(w,card){
  const svg=card.querySelector('svg.pfw-chart'), tip=card.querySelector('.tip');
  const m=pfMetrics(w.p); if(!m) return;
  drawLines(svg,tip,[{name:'Drawdown',col:cvar('--down'),pts:m.dd.serie,w:1.8,fill:true}],m.pts);
}
function drawLines(svg,tip,lines,pts){
  const W=svg.getBoundingClientRect().width||900, H=parseFloat(svg.style.height)||230, pad={t:12,b:20};
  const all=lines.flatMap(l=>l.pts.map(p=>p.y));
  const ymin=Math.min(0,...all), ymax=Math.max(0,...all);
  const T=d=>new Date(d).getTime();
  const t0=T(pts[0].d), t1=T(pts[pts.length-1].d), ts=(t1-t0)||1;
  const X=d=>(T(d)-t0)/ts*W, Y=v=>pad.t+(1-(v-ymin)/(ymax-ymin||1))*(H-pad.t-pad.b);
  const gc=cvar('--grid'), mc=cvar('--muted');
  let grid='';
  const span=ymax-ymin, step=[5,10,20,25,50,100,200,400].find(s=>span/s<=6)||400;
  for(let v=Math.ceil(ymin/step)*step; v<=ymax; v+=step)
    grid+=`<line x1="0" y1="${Y(v).toFixed(1)}" x2="${W}" y2="${Y(v).toFixed(1)}" stroke="${gc}" stroke-width="${v===0?1.6:1}"/>`+
      `<text x="4" y="${(Y(v)-4).toFixed(1)}" fill="${mc}" font-size="10.5" font-family="system-ui">${v>0?'+':''}${v}%</text>`;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML=grid+lines.map(l=>{
    const d=l.pts.map((p,i)=>`${i?'L':'M'}${X(p.d).toFixed(1)},${Y(p.y).toFixed(1)}`).join(' ');
    const fill=l.fill?`<path d="${d} L${X(l.pts[l.pts.length-1].d).toFixed(1)},${Y(0)} L${X(l.pts[0].d).toFixed(1)},${Y(0)} Z" fill="${l.col}" opacity="0.12"/>`:'';
    return fill+`<path d="${d}" fill="none" stroke="${l.col}" stroke-width="${l.w}" stroke-linejoin="round" stroke-linecap="round"/>`;
  }).join('')+`<line class="cross pfw-cx" x1="0" y1="${pad.t}" x2="0" y2="${H-pad.b}" style="opacity:0"/>`;
  if(!tip) return;
  const cx=svg.querySelector('.pfw-cx');
  const move=e=>{
    const rct=svg.getBoundingClientRect();
    const fx=(e.touches?e.touches[0].clientX:e.clientX)-rct.left;
    const targ=t0+Math.max(0,Math.min(1,fx/rct.width))*ts;
    const px=(targ-t0)/ts*W;
    cx.setAttribute('x1',px); cx.setAttribute('x2',px); cx.style.opacity=1;
    const vals=lines.map(l=>{ let best=l.pts[0];
      for(const p of l.pts){ if(T(p.d)<=targ) best=p; else break; }
      return `${esc(l.name)}: <b>${fmtPct(best.y)}</b>`; });
    tip.style.opacity=1; tip.style.left=(px/W*rct.width)+'px'; tip.style.top='14px';
    tip.innerHTML=new Date(targ).toISOString().slice(0,10)+'<br>'+vals.join('<br>');
  };
  svg.addEventListener('mousemove',move);
  svg.addEventListener('touchmove',move,{passive:true});
  svg.addEventListener('mouseleave',()=>{cx.style.opacity=0;tip.style.opacity=0;});
}

/* ===== start: public build boots instantly; private build gates on Google sign-in ===== */
(async function start(){
  if(DATA){ boot(); fbInit(); return; }               // public: baked data, auth lazily for owner edits
  // private build: no data in the page at all — everything comes from Firestore
  document.querySelector('.wrap').style.display='none';
  initTheme(); _cfg.public=false; applyVisibility();  // lock screen with "Owner sign in" button
  await fbInit();                                     // onAuthStateChanged -> fsLoadData() when owner
})();
